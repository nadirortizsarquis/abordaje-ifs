          }}>Cerrar</button>
        </header>

        <div style={{ padding: '18px 22px', overflowY: 'auto', flex: 1 }}>

          <Section id="arranque" title="1. Primer arranque · Vistas principales">
            <p>La app tiene tres pestañas centrales en la barra de pestañas:</p>
            <ul style={{ paddingLeft: 18, margin: '6px 0' }}>
              <Li><strong>Lista de abordaje:</strong> tu pool de prospectos. Acá ves nombre, teléfono, referente, detalle, próximas gestiones y el estado actual.</Li>
              <Li><strong>Tareas:</strong> tablero Kanban con columnas (Abordar / Pendiente / etc.) para organizar pendientes que no son una llamada formal pero querés tener anotados.</Li>
              <Li><strong>Calendario:</strong> vista Mes / Semana / Hoy con todos los eventos (citas, tareas con fecha, agendas standalone).</Li>

          </Section>

            <ul style={{ paddingLeft: 18, margin: '6px 0' }}>
              <Li>Botón <strong>+ Nuevo prospect</strong> arriba a la derecha de la Lista: cargás nombre y datos de contacto. Solo el nombre es obligatorio.</Li>
              <Li>Al hacer click en un prospect se abre un <strong>panel lateral</strong> con sus datos completos, historial de gestiones, observaciones y el botón para registrar una nueva gestión.</Li>
              <Li>El campo <strong>Detalle</strong> es la descripción corta. El campo <strong>Observaciones</strong> es libre y largo: usalo para contexto de la conversación, recordatorios, etc.</Li>

          <Section id="etiquetas" title="3. Etiquetas de abordaje (gestiones)">

          <Section id="calendario" title="5. Calendario y Google Calendar">
            <ul style={{ paddingLeft: 18, margin: '6px 0' }}>
              <Li>Tres vistas: <strong>Mes</strong>, <strong>Semana</strong> y <strong>Hoy</strong>. El último elegido queda guardado al refrescar.</Li>
              <Li><strong>Click sobre un slot vacío</strong> abre el chooser "Nueva agenda / Nueva tarea".</Li>

          </Section>

          <Section id="notificaciones" title="6. Notificaciones">
            <p>La campanita del header lista los contactos y agendas vencidas o de hoy. Click sobre un ítem te lleva directo al prospect o tarea correspondiente.</p>

          <Section id="asistente" title="7. Gestión con asistente">

          <Section id="ajustes" title="8. Ajustes personales">

              <Li><strong>Horario laboral:</strong> rango horario por defecto del calendario.</Li>

              <Li>Abrí <strong>abordaje.broker-ifs.com</strong> en <strong>Chrome</strong> (o cualquier browser basado en Chromium).</Li>

  );

// ── MODAL: CAMBIAR CONTRASEÑA PROPIA ───────────────────────────
// El user en sesión cambia su propio password vía supabase.auth.updateUser.
// La sesión activa prueba identidad, no se pide la contraseña actual.
function ChangePasswordModal({ displayName, onClose }) {
  const [pwd, setPwd]   = useState('');
  const [pwd2, setPwd2] = useState('');
  const [err, setErr]   = useState('');
  const [ok, setOk]     = useState(false);
  const [busy, setBusy] = useState(false);
  const firstInput = useRef(null);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    setTimeout(() => firstInput.current?.focus(), 40);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr('');
    if (pwd.length < 8) { setErr('Mínimo 8 caracteres.'); return; }
    if (pwd !== pwd2)   { setErr('Las contraseñas no coinciden.'); return; }
    setBusy(true);
    const { error } = await sb.auth.updateUser({ password: pwd });
    setBusy(false);
    if (error) { setErr(error.message || 'No se pudo actualizar.'); return; }
    setOk(true);
    setTimeout(onClose, 1300);
  };

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <form className="modal" role="dialog" aria-modal="true" aria-labelledby="change-password-title" onSubmit={submit}>
        <div className="modal-header">
          <h3 id="change-password-title">Cambiar contraseña</h3>
          <button type="button" className="modal-close" onClick={onClose} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          {displayName && (
            <div style={{ fontSize: '0.84rem', color: 'var(--texto-suave)', marginBottom: 12 }}>
              {displayName}
            </div>
          )}
          <div className="field">
            <label>Nueva contraseña</label>
            <input ref={firstInput} type="password" autoComplete="new-password"
              value={pwd} onChange={e => setPwd(e.target.value)}
              placeholder="Mínimo 8 caracteres" />
          </div>
          <div className="field">
            <label>Confirmar</label>
            <input type="password" autoComplete="new-password"
              value={pwd2} onChange={e => setPwd2(e.target.value)}
              placeholder="Repetí la nueva contraseña" />
          </div>
          {err && <div className="field-error" style={{ marginTop: 6 }}>{err}</div>}
          {ok  && <div style={{
            background: '#f0fdf4', border: '1px solid #bbf7d0',
            color: '#15803d', borderRadius: 6, padding: '8px 12px',
            fontSize: '0.85rem', fontWeight: 600, marginTop: 6,
          }}>Contraseña actualizada.</div>}
        </div>
        <div className="modal-footer">
          <button type="button" className="btn-secondary" onClick={onClose} disabled={busy}>Cancelar</button>
          <button type="submit" className="btn-primary" disabled={busy || ok}>
            {busy ? 'Guardando…' : ok ? 'Listo' : 'Guardar'}
          </button>
        </div>
      </form>
    </div>
  );
}

// ── MODAL: EDITAR AGENDA STANDALONE ──────────────────────────────
// Click sobre un evento del calendar que es una "Nueva agenda" (sin prospect).
// Permite cambiar fecha/hora/título/observación + Eliminar. El sync a Google
// Calendar se dispara automáticamente desde storage.updateAgendado/deleteAgendado.
function EditAgendaModal({ agenda, readOnly, onCancel, onSave, onDelete }) {
  // agenda puede venir en dos formatos:
  //   - modo piloto: { googleEvent: <calendar.event> } — la fuente es Google.
  //   - non-piloto: { id, fecha, nota } — la fuente es abordaje_agendados.
  const isGoogle = !!agenda.googleEvent;
  const initialDate = isGoogle
    ? new Date(agenda.googleEvent.start?.dateTime || agenda.googleEvent.start?.date)
    : new Date(agenda.fecha);
  const initialNota = isGoogle
    ? [agenda.googleEvent.summary || '', agenda.googleEvent.description || ''].filter(Boolean).join('\n\n')
    : (agenda.nota || '');
  const lines = initialNota.split(/\r?\n+/);
  const [fecha, setFecha] = useState(
    `${initialDate.getFullYear()}-${pad2(initialDate.getMonth()+1)}-${pad2(initialDate.getDate())}`
  );
  const [hora, setHora] = useState(`${pad2(initialDate.getHours())}:${pad2(initialDate.getMinutes())}`);
  const [titulo, setTitulo] = useState(lines[0] || '');
  const [observacion, setObservacion] = useState(lines.slice(1).join('\n'));
  const [err, setErr] = useState('');

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const submit = (e) => {
    if (e) e.preventDefault();
    if (readOnly) return;
    setErr('');
    if (!titulo.trim()) { setErr('Falta el título.'); return; }
    const [y, m, d] = fecha.split('-').map(Number);
    const [hh, mm] = hora.split(':').map(Number);
    if (!y || !m || !d || isNaN(hh) || isNaN(mm)) { setErr('Fecha u hora inválida.'); return; }
    const local = new Date(y, m - 1, d, hh, mm, 0);
    const nota = titulo.trim() + (observacion.trim() ? `\n\n${observacion.trim()}` : '');
    onSave({ fecha: local.toISOString(), nota });
  };

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <form className="modal" role="dialog" aria-modal="true" aria-labelledby="edit-agenda-title" onSubmit={submit} style={{ maxWidth: 460 }}>
        <div className="modal-header">
          <h3 id="edit-agenda-title">{readOnly ? 'Detalle de agenda' : 'Editar agenda'}</h3>
          <button type="button" className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>Título / Asunto</label>
            <input type="text" value={titulo} readOnly={readOnly} autoFocus={!readOnly}
              onChange={e => setTitulo(e.target.value)}
              placeholder="Ej: Reunión equipo" />
          </div>
          <div className="field-row">
            <div className="field">
              <label>Fecha</label>
              <input type="date" value={fecha} readOnly={readOnly}
                onChange={e => setFecha(e.target.value)} />
            </div>
            <div className="field">
              <label>Hora</label>
              <input type="time" value={hora} readOnly={readOnly}
                onChange={e => setHora(e.target.value)} />
            </div>
          </div>
          <div className="field">
            <label>Observación</label>
            <textarea value={observacion} readOnly={readOnly}
              onChange={e => setObservacion(e.target.value)}
              placeholder="Notas / agenda de la reunión..." rows={3} />
          </div>
          {err && <div className="field-error">{err}</div>}
        </div>
        <div className="modal-footer" style={{ justifyContent: readOnly ? 'flex-end' : 'space-between' }}>
          {!readOnly && <button type="button" className="btn-danger" onClick={onDelete}>Eliminar</button>}
          <div style={{ display: 'flex', gap: 10 }}>
            <button type="button" className="btn-secondary" onClick={onCancel}>{readOnly ? 'Cerrar' : 'Cancelar'}</button>
            {!readOnly && <button type="submit" className="btn-primary">Guardar</button>}
          </div>
        </div>
      </form>
    </div>
  );
}

// ── MODAL: NUEVA AGENDA (desde click en celda del calendario) ───────
// Form simple. Por defecto crea sólo un agendado standalone (sin prospect).
// Si el user tilda "Vincular a un prospecto nuevo", pide el nombre y se crea
// el prospect + un primer contacto agendado para ese horario.
function NuevaAgendaModal({ slot, onCancel, onSave }) {
  const [titulo, setTitulo] = useState('');
  const [observacion, setObservacion] = useState('');
  const [crearProspect, setCrearProspect] = useState(false);
  const [prospectoNombre, setProspectoNombre] = useState('');
  const [err, setErr] = useState('');
  // Fecha + hora editables; arrancan con los valores del slot clickeado.
  const [fecha, setFecha] = useState(
    `${slot.date.getFullYear()}-${pad2(slot.date.getMonth()+1)}-${pad2(slot.date.getDate())}`
  );
  const [hora, setHora] = useState(`${pad2(slot.hour)}:${pad2(slot.minute)}`);
  // Guard contra doble submit (Enter + click rápido) que generaba eventos duplicados.
  const [submitting, setSubmitting] = useState(false);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const submit = async (e) => {
    if (e) e.preventDefault();
    if (submitting) return;
    setErr('');
    if (!titulo.trim()) { setErr('Poné un título / asunto para la agenda.'); return; }
    if (!fecha) { setErr('Elegí una fecha.'); return; }
    if (!hora) { setErr('Elegí una hora.'); return; }
    if (crearProspect && !prospectoNombre.trim()) { setErr('Falta el nombre del prospecto.'); return; }
    setSubmitting(true);
    try {
      await onSave({ titulo, observacion, crearProspect, prospectoNombre, fecha, hora });
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <form className="modal" role="dialog" aria-modal="true" aria-labelledby="nueva-agenda-title" onSubmit={submit} style={{ maxWidth: 460 }}>
        <div className="modal-header">
          <h3 id="nueva-agenda-title">Nueva agenda</h3>
          <button type="button" className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <div className="field-row field-row-prominente">
            <div className="field">
              <label>Fecha <span className="req">*</span></label>
              <input type="date" value={fecha} onChange={e => setFecha(e.target.value)} />
            </div>
            <div className="field">
              <label>Hora <span className="req">*</span></label>
              <input type="time" value={hora} onChange={e => setHora(e.target.value)} />
            </div>
          </div>
          <div className="field">
            <label>Título / Asunto <span className="req">*</span></label>
            <input type="text" value={titulo} autoFocus
              onChange={e => setTitulo(e.target.value)}
              placeholder="Ej: Reunión equipo, Cita con Pérez..." />
          </div>
          <div className="field">
            <label>Observación</label>
            <textarea value={observacion}
              onChange={e => setObservacion(e.target.value)}
              placeholder="Notas, agenda de la reunión..." rows={3} />
          </div>
          <label style={{ display: 'flex', gap: 8, alignItems: 'center', fontSize: '0.86rem', cursor: 'pointer', marginTop: 6 }}>
            <input type="checkbox" checked={crearProspect}
              onChange={e => setCrearProspect(e.target.checked)} />
            <span>Vincular a un prospecto nuevo (se crea en la lista de Abordaje)</span>
          </label>
          {crearProspect && (
            <div className="field" style={{ marginTop: 8 }}>
              <label>Nombre del prospecto <span className="req">*</span></label>
              <input type="text" value={prospectoNombre}
                onChange={e => setProspectoNombre(e.target.value)}
                placeholder="Ej: Juan Pérez" />
            </div>
          )}
          {err && <div className="field-error" style={{ marginTop: 8 }}>{err}</div>}
        </div>
        <div className="modal-footer">
          <button type="button" className="btn-secondary" onClick={onCancel} disabled={submitting}>Cancelar</button>
          <button type="submit" className="btn-primary" disabled={submitting}>
            {submitting ? 'Guardando…' : 'Guardar'}
          </button>
        </div>
      </form>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────
function LoginScreen({ onLoggedIn }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

// ── ROOT (decide entre login y app) ───────────────────────────
function Root() {
  const [user, setUser] = useState(null);
  const [authChecking, setAuthChecking] = useState(true);

  useEffect(() => {
    let mounted = true;
    auth.getUser().then(u => {
      if (!mounted) return;
      setUser(u);
      setAuthChecking(false);
    }).catch(() => {
      if (!mounted) return;
      setAuthChecking(false);
    });
    const { data } = auth.onChange((event, session) => {
      if (!mounted) return;
      if (event === 'SIGNED_OUT') {
        // Invalida el cache del profile (assistant_of_id, role, etc.) para
        // que un próximo login con user distinto en la misma tab no use el
        // cacheado del anterior por un instante.
        auth.invalidateProfileCache();
        setUser(null);
      }
      else if (session?.user) setUser(session.user);
    });
    return () => { mounted = false; data?.subscription?.unsubscribe?.(); };
  }, []);

  // Toggle de visibilidad: appContent vs loginRoot. Lo hago por efecto
  // para que el header IFS solo aparezca cuando hay sesión.
  useEffect(() => {
    const appEl = document.getElementById('appContent');
    if (!appEl) return;
    if (user) appEl.style.display = '';
    else appEl.style.display = 'none';
  }, [user]);

  if (authChecking) {
    return <div className="login-spinner-wrap"><div className="login-spinner"></div></div>;
  }

  if (!user) {
    return <LoginScreen onLoggedIn={setUser} />;
  }

  return null; // App() se monta en reactRoot por separado (ver más abajo)
}

// AppShell se monta dentro de #reactRoot (que vive dentro de #appContent).
// Lo separamos de Root porque #reactRoot es hijo de #appContent y queremos
// que el header IFS solo se renderice cuando hay sesión.
function AppShell() {
  const [user, setUser] = useState(null);
  const [agente, setAgente] = useState(null);  // perfil con rol/nombre
  const [viewAs, setViewAs] = useState(null);  // perfil seleccionado para "Ver como"

  useEffect(() => {
    let mounted = true;
    auth.getUser().then(u => { if (mounted) setUser(u); });
    const { data } = auth.onChange((event, session) => {
      if (!mounted) return;
      if (event === 'SIGNED_OUT') {
        auth.invalidateProfileCache();
        setUser(null); setAgente(null); setViewAs(null);
      }
      else if (session?.user) setUser(session.user);
    });
    return () => { mounted = false; data?.subscription?.unsubscribe?.(); };
  }, []);

  useEffect(() => {
    if (!user) { setAgente(null); return; }
    let cancel = false;
    // Buscar el profile por id. Si Supabase tiene 'Enable identity linking'
    // activado, el id del user de Google coincide con el id de profiles
    // (mismo email = mismo auth.users.id).
    sb.from('profiles').select('id,email,display_name,role,advisor_name_ole,abordaje_settings,gcal_enabled,assistant_of_id,shares_calendar_with_assistant').eq('id', user.id).maybeSingle()
      .then(async ({ data }) => {
        if (cancel) return;
        if (data) { setAgente(data); return; }
        // No hay profile para este user → email no autorizado (caso típico:
        // alguien con Gmail random intentó entrar con Google sin estar
        // pre-cargado en profiles por el admin).
        try { await sb.auth.signOut(); } catch (_) {}
        const url = new URL(window.location.href);
        url.searchParams.set('error', 'not_authorized');
        url.searchParams.delete('code');
        url.hash = '';
        window.location.replace(url.toString());
      })
      .catch(() => {});
    return () => { cancel = true; };
  }, [user?.id]);

  const handleLogout = async () => {
    await auth.signOut();
    setUser(null);
    setAgente(null);
    setViewAs(null);
  };

  if (!user) return null;
  // key incluye viewAs.id para forzar re-mount cuando cambia el "Ver como" — esto
  // resetea state interno (filtros, selección, etc.) limpiamente.
  const appKey = `${user.id}|${viewAs?.id || 'self'}`;
  return (
    <App
      key={appKey}
      user={user}
      agente={agente}
      setAgente={setAgente}
      viewAs={viewAs}
      onViewAs={setViewAs}
      onExitViewAs={() => setViewAs(null)}
      onLogout={handleLogout}
    />
  );
}

window.__abordajeMount = function() {
  const loginEl = document.getElementById('loginRoot');
  const appEl = document.getElementById('reactRoot');
  if (loginEl) ReactDOM.createRoot(loginEl).render(<Root />);
  if (appEl) ReactDOM.createRoot(appEl).render(<AppShell />);
};

window.__abordajeMount();
</script>
