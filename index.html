      target.appendChild(mk('Salir', 'Cerrar sesión', onLogout));
    }
  }, [user, esAdmin, displayName, notifCount, onLogout, onOpenSettings, onChangePassword, onToggleBell]);
  return null;
}

// ── FILTER BAR ─────────────────────────────────────────────────
// Por default los filtros van plegados — ocupan menos espacio en pantalla.
// Se despliegan al tocar el toggle "Filtros". Si hay filtros activos, el
// toggle muestra un badge con la cantidad activos y queda destacado.
function FilterBar({ filterEstado, setFilterEstado, filterFecha, setFilterFecha, filterEtiqueta = [], setFilterEtiqueta, ordenFecha = 'ninguno', setOrdenFecha, mostrandoCount, totalCount, extraActions = null }) {
  const etiquetasArr = Array.isArray(filterEtiqueta) ? filterEtiqueta : [];
  const filtrosCount =
    (filterEstado !== 'todos' ? 1 : 0)
    + (filterFecha !== 'todos' ? 1 : 0)
    + (etiquetasArr.length > 0 ? 1 : 0)
    + (ordenFecha !== 'ninguno' ? 1 : 0);
  const hayFiltros = filtrosCount > 0;
  const [open, setOpen] = useState(false);
  return (
    <div className="filter-bar-wrap">
      <div className="filter-bar-header">
        <button type="button"
          className={`filter-bar-toggle${hayFiltros ? ' has-filters' : ''}${open ? ' is-open' : ''}`}
          onClick={() => setOpen(o => !o)}
          aria-expanded={open}>
          <span>Filtros</span>
          {hayFiltros && <span className="filter-bar-toggle-badge">{filtrosCount}</span>}
          <span className="filter-bar-toggle-caret" aria-hidden="true">▾</span>
        </button>
        {hayFiltros && (
          <button className="btn-mini"
            onClick={() => {
              setFilterEstado('todos');
              setFilterFecha('todos');
              if (setFilterEtiqueta) setFilterEtiqueta([]);
              if (setOrdenFecha) setOrdenFecha('ninguno');
            }}>
            Limpiar
          </button>
        )}
        <div className="filter-count">
          {hayFiltros ? `Mostrando ${mostrandoCount} de ${totalCount}` : `${totalCount} ${totalCount === 1 ? 'prospecto' : 'prospectos'}`}
        </div>
        {extraActions && <div className="filter-bar-extras">{extraActions}</div>}
      </div>
      {open && (
        <div className="filter-bar">
          <div className="filter-group">
            <label>Estado</label>
            <select value={filterEstado} onChange={e => setFilterEstado(e.target.value)}>
              <option value="todos">Todos</option>
              <option value="nuevo">Nuevos</option>
              <option value="pendiente">En gestión</option>
              <option value="programado">Programados</option>
              <option value="agendado">Agendados</option>
              <option value="rechazado">Rechazados</option>
            </select>
          </div>
          {setFilterEtiqueta && (
            <div className="filter-group">
              <label>Etiqueta</label>
              <MultiSelectEtiqueta value={etiquetasArr} onChange={setFilterEtiqueta} />
            </div>
          )}
          <div className="filter-group">
            <label>Próximo contacto</label>
            <select value={filterFecha} onChange={e => setFilterFecha(e.target.value)}>
              <option value="todos">Cualquier momento</option>
              <option value="vencidos">Vencidos</option>
              <option value="hoy">Hoy</option>
              <option value="semana">Próximos 7 días</option>
              <option value="sin_fecha">Sin fecha</option>
            </select>
          </div>
          {setOrdenFecha && (
            <div className="filter-group">
              <label>Ordenar</label>
              <select value={ordenFecha} onChange={e => setOrdenFecha(e.target.value)}>
                <option value="ninguno">Sin orden</option>
                <option value="asc">Más próximas primero</option>
                <option value="desc">Más lejanas primero</option>
              </select>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Dropdown con checkboxes para seleccionar varias etiquetas a la vez. value
// es array (vacío = todas). Acepta 'sin_etiqueta' como pseudo-etiqueta para
// prospectos que aún no tienen ninguna gestión registrada.
function MultiSelectEtiqueta({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  useEffect(() => {
    const onClick = (e) => {
      if (!wrapRef.current) return;
      if (!wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, []);
  const toggle = (id) => {
    if (value.includes(id)) onChange(value.filter(x => x !== id));
    else onChange([...value, id]);
  };
  const label = value.length === 0
    ? 'Todas'
    : value.length === 1
      ? (value[0] === 'sin_etiqueta' ? 'Sin etiqueta' : (TIPOS_CONTACTO.find(t => t.id === value[0])?.label || value[0]))
      : `${value.length} seleccionadas`;
  return (
    <div className="multi-select-wrap" ref={wrapRef}>
      <button type="button" className="multi-select-btn" onClick={() => setOpen(!open)} aria-expanded={open}>
        <span className="multi-select-label">{label}</span>
        <span className="multi-select-caret" aria-hidden="true">▾</span>
      </button>
      {open && (
        <div className="multi-select-dropdown" role="menu">
          <label className="multi-select-item">
            <input type="checkbox" checked={value.includes('sin_etiqueta')}
              onChange={() => toggle('sin_etiqueta')} />
            <span>Sin etiqueta</span>
          </label>
          {TIPOS_CONTACTO.map(t => (
            <label key={t.id} className="multi-select-item">
              <input type="checkbox" checked={value.includes(t.id)}
                onChange={() => toggle(t.id)} />
              <span>{t.label}</span>
            </label>
          ))}
          {value.length > 0 && (
            <button type="button" className="multi-select-clear" onClick={() => onChange([])}>
              Limpiar selección
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function FilaProspecto({ prospecto, onClick }) {
  const estado = deriveEstado(prospecto);
  const meta = ESTADO_META[estado];
  // Si el próximo contacto está agendado a más de 3 meses, el row no es urgente:
  // tint gris (sobreescribe pendiente/programado/agendado/nuevo). Rechazado mantiene su gris-rojo.
  let tint = meta.tint;
  if (estado !== 'rechazado' && prospecto.proximoContacto) {
    const prox = parseFechaLocal(prospecto.proximoContacto);
    const ahora = new Date();
    const enTresMeses = new Date();
    enTresMeses.setMonth(enTresMeses.getMonth() + 3);
    if (prox > enTresMeses) tint = 'tint-futuro-lejos';
  }
  return (
    <tr className={`fila-clickeable ${tint}`} onClick={onClick}>
      <td className="col-nombre">
        <ActorStar item={prospecto} />
        {prospecto.nombre || <em style={{color:'var(--texto-suave)',fontWeight:400}}>(sin nombre)</em>}
      </td>
      <td className="col-telefono">{prospecto.telefono || '—'}</td>
      <td className="estado-cell"><BadgeEstado prospecto={prospecto} /></td>
      <td className="col-detalle">
        {prospecto.detalle || <span style={{color:'var(--texto-suave)'}}>—</span>}
      </td>
      <td><TimelineCell contactos={prospecto.contactos || []} /></td>
      <td className="col-referente">{prospecto.referente || <span style={{color:'var(--texto-suave)'}}>—</span>}</td>
      <td className="col-pref">
        {prospecto.preferenciaContacto
          ? <span className="badge-pref">{prospecto.preferenciaContacto}</span>
          : <span style={{color:'var(--texto-suave)'}}>—</span>
        }
      </td>
    </tr>
  );
}

// ── BADGE ESTADO ───────────────────────────────────────────────
function BadgeEstado({ prospecto }) {
  const estado = deriveEstado(prospecto);
  const meta = ESTADO_META[estado];
  const proximo = describeProximo(prospecto.proximoContacto);
  const subClass = proximo.urgencia === 'pasado' ? 'urgente'
                  : proximo.urgencia === 'hoy' ? 'hoy' : '';
  return (
    <div className="estado-badge-wrap">
      <span className="estado-badge" style={{ color: meta.color, background: meta.bg }}>
        {meta.label}
      </span>
      {proximo.texto && (
        <span className={`estado-subtxt ${subClass}`}>{proximo.texto}</span>
      )}
    </div>
  );
}

// ── TIMELINE CELL ──────────────────────────────────────────────
function TimelineCell({ contactos }) {
  if (!contactos || contactos.length === 0) {
    return <span className="timeline-vacio">Sin contactos aún</span>;
  }
  const ultimos = [...contactos].reverse().slice(0, 3);
  const restantes = contactos.length - ultimos.length;
  return (
    <div className="timeline-cell">
      {ultimos.map((c, i) => {
        const cfg = tipoConfig(c.tipo);
        const fechaReg = c.createdAt || c.fecha;
        const tooltipObj = c.tipo === 'agendado' ? 'Cita' : 'Próximo contacto';
        return (
          <div key={c.id} className="timeline-row" style={{ marginLeft: i * 14 + 'px' }}>
            <span className="timeline-fecha-reg" title="Registrado el">{formatFechaCorta(fechaReg)}</span>
            <span className="chip" style={{color: cfg?.color, background: cfg?.bg}}>
              {cfg?.label || c.tipo}
            </span>
            <ActorStar item={c} />
            {c.agendadoPara && (
              <span className="timeline-fecha-obj" title={tooltipObj}>{formatFechaHora(c.agendadoPara)}</span>
            )}
            {c.observacion && (
              <span className="timeline-obs" title={c.observacion}>{c.observacion}</span>
            )}
          </div>
        );
      })}
      {restantes > 0 && (
        <div className="timeline-mas">… y {restantes} {restantes === 1 ? 'gestión más' : 'gestiones más'}</div>
      )}
    </div>
  );
}

// ── PANEL LATERAL (gestión arriba, datos abajo, historial abajo) ─
function PanelLateral({ prospecto, settings, readOnly, onClose, onUpdate, onDelete, onAddContacto, onEditContacto, onDeleteContacto }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  return (
    <div className="panel-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="panel-side" role="dialog" aria-modal="true">
        <div className="panel-header">
          <h2>{prospecto.nombre || '(sin nombre)'}</h2>
          <button className="panel-close" onClick={onClose} aria-label="Cerrar">×</button>
        </div>

        {!readOnly && (
          <div className="panel-section">
            <h4>Registrar gestión</h4>
            <RegistrarGestion onSubmit={onAddContacto} settings={settings} />
          </div>
        )}

        <div className="panel-section">
          <h4>Historial de gestiones</h4>
          <HistorialList
            contactos={prospecto.contactos || []}
            settings={settings}
            readOnly={readOnly}
            onEdit={onEditContacto}
            onDelete={onDeleteContacto}
          />
        </div>

        <div className="panel-section">
          <h4>Datos del prospecto</h4>
          <FieldsProspecto prospecto={prospecto} readOnly={readOnly} onUpdate={onUpdate} />
        </div>

        {!readOnly && (
          <div className="panel-section" style={{display:'flex', justifyContent:'flex-end'}}>
            <button className="btn-danger" onClick={onDelete}>Eliminar prospecto</button>
          </div>
        )}

        {/* Footer sticky con Cancelar (secundario, blanco/borde azul) +
            Guardar (primario, azul degradé). Mismo formato que el resto de
            los modales del proyecto para coherencia visual. Los cambios ya
            se guardan on-blur en los inputs, así que ambos botones cierran
            el panel — el "Cancelar" no descarta nada, solo cierra. */}
        <div className="panel-footer-sticky">
          <button className="btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={onClose}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ── FIELDS PROSPECTO (autosave on blur) ────────────────────────
function FieldsProspecto({ prospecto, readOnly, onUpdate }) {
  const [draft, setDraft] = useState({
    nombre: prospecto.nombre || '',
    telefono: prospecto.telefono || '',
    preferenciaContacto: prospecto.preferenciaContacto || '',
    detalle: prospecto.detalle || '',
    referente: prospecto.referente || '',
    observaciones: prospecto.observaciones || ''
  });

  useEffect(() => {
    setDraft({
      nombre: prospecto.nombre || '',
      telefono: prospecto.telefono || '',
      preferenciaContacto: prospecto.preferenciaContacto || '',
      detalle: prospecto.detalle || '',
      referente: prospecto.referente || '',
      observaciones: prospecto.observaciones || ''
    });
  }, [prospecto.id]);

  const upd = (k, v) => setDraft(d => ({...d, [k]: v}));
  const commit = (k) => { if (draft[k] !== prospecto[k]) onUpdate({ [k]: draft[k] }); };

  return (
    <div>
      <div className="field-inline">
        <label>Nombre</label>
        <input type="text" value={draft.nombre} readOnly={readOnly}
          onChange={e => upd('nombre', e.target.value)}
          onBlur={() => commit('nombre')} />
      </div>
      <div className="field-inline-row">
        <div className="field-inline">
          <label>Teléfono</label>
          <input type="tel" value={draft.telefono} readOnly={readOnly}
            onChange={e => upd('telefono', e.target.value)}
            onBlur={() => commit('telefono')} />
        </div>
        <div className="field-inline">
          <label>Preferencia</label>
          <select value={draft.preferenciaContacto} disabled={readOnly}
            onChange={e => { upd('preferenciaContacto', e.target.value); setTimeout(() => onUpdate({ preferenciaContacto: e.target.value }), 0); }}>
            <option value="">— Seleccionar —</option>
            {PREFS_CONTACTO.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
        </div>
      </div>
      <div className="field-inline">
        <label>Detalle <span style={{fontWeight:400, color:'var(--texto-suave)', fontSize:'0.72rem'}}>(visible en tablero)</span></label>
        <input type="text" value={draft.detalle} readOnly={readOnly}
          onChange={e => upd('detalle', e.target.value)}
          onBlur={() => commit('detalle')} />
      </div>
      <div className="field-inline">
        <label>Referente</label>
        <input type="text" value={draft.referente} readOnly={readOnly}
          onChange={e => upd('referente', e.target.value)}
          onBlur={() => commit('referente')} />
      </div>
      <div className="field-inline">
        <label>Observaciones generales</label>
        <textarea value={draft.observaciones} readOnly={readOnly}
          onChange={e => upd('observaciones', e.target.value)}
          onBlur={() => commit('observaciones')} />
      </div>
    </div>
  );
}

// ── REGISTRAR GESTIÓN (autofill fecha/hora, inputs flexibles) ──
function RegistrarGestion({ onSubmit, settings }) {
  const defaultDur = settings?.slotDurationMin || 60;
  const [tipoSel, setTipoSel] = useState(null);
  const [observacion, setObservacion] = useState('');
  const [fechaIso, setFechaIso] = useState('');
  const [hora, setHora] = useState('');
  const [cantidad, setCantidad] = useState(1);
  const [unidad, setUnidad] = useState('horas');
  const [duracionMin, setDuracionMin] = useState(defaultDur);

  const cfg = tipoSel ? tipoConfig(tipoSel) : null;

  const reset = () => {
    setTipoSel(null);
    setObservacion('');
    setFechaIso(''); setHora('');
    setCantidad(1); setUnidad('horas');
    setDuracionMin(defaultDur);
  };

  const onTipoClick = (id) => {
    if (tipoSel === id) { reset(); return; }
    setTipoSel(id);
    setObservacion('');
    const c = tipoConfig(id);
    const today = new Date();
    if (c.input === 'fecha' || c.input === 'fechahora') {
      setFechaIso(dateToYMD(today));
    } else {
      setFechaIso('');
    }
    if (c.input === 'fechahora') {
      setHora(`${pad2(today.getHours())}:${pad2(today.getMinutes())}`);
      setDuracionMin(defaultDur);
    } else {
      setHora('');
    }
  };

  const confirmar = () => {
    let agendadoPara = null;
    let extraDur = null;
    if (cfg.input === 'plazo') {
      const d = new Date();
      const n = parseInt(cantidad, 10) || 0;
      if (unidad === 'minutos') d.setMinutes(d.getMinutes() + n);
      else if (unidad === 'horas') d.setHours(d.getHours() + n);
      else if (unidad === 'dias') d.setDate(d.getDate() + n);
      // dateToLocalIso preserva la hora local. toISOString() lo convertía a
      // UTC y todo el flow downstream (DB, lista, calendar) terminaba con la
      // hora desfasada en +3hs (ARG → UTC).
      agendadoPara = dateToLocalIso(d);
    } else if (cfg.input === 'fecha') {
      if (!fechaIso) { alert('Falta la fecha'); return; }
      // Local string directo, sin pasar por Date → toISOString.
      agendadoPara = `${fechaIso}T10:00`;
    } else if (cfg.input === 'fechahora') {
      if (!fechaIso) { alert('Falta la fecha'); return; }
      if (!hora) { alert('Falta la hora'); return; }
      // Local string directo. La hora ya está en formato "HH:MM" desde HoraTexto.
      agendadoPara = `${fechaIso}T${hora}`;
      extraDur = parseInt(duracionMin, 10) || defaultDur;
    } else {
      agendadoPara = calcAgendadoPara(tipoSel, null);
    }
    const payload = {
      fecha: new Date().toISOString(),
      tipo: tipoSel,
      observacion: observacion.trim(),
      agendadoPara
    };
    if (extraDur != null) payload.duracionMin = extraDur;
    onSubmit(payload);
    reset();
  };

  return (
    <div>
      <div className="tipos-grid">
        {TIPOS_CONTACTO.map(t => {
          const selected = tipoSel === t.id;
          return (
            <button
              key={t.id}
              className="tipo-button"
              onClick={() => onTipoClick(t.id)}
              style={{
                borderColor: t.color,
                color: t.color,
                background: selected ? t.bg : 'white'
              }}
            >
              {t.label}
            </button>
          );
        })}
      </div>

      {cfg && (
        <form className="gestion-form" onSubmit={(e) => { e.preventDefault(); confirmar(); }}>
          <div className="gestion-form-title">
            <span>Confirmar gestión:</span>
            <span className="chip" style={{
              color: cfg.color, background: cfg.bg,
              padding:'3px 10px', borderRadius:10, fontSize:'0.7rem',
              fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px'
            }}>{cfg.label}</span>
          </div>

          {cfg.input === 'plazo' && (
            <div className="field-inline-row">
              <div className="field-inline">
                <label>Cantidad</label>
                <input type="number" min="1" value={cantidad}
                  onChange={e => setCantidad(e.target.value)} />
              </div>
              <div className="field-inline">
                <label>Unidad</label>
                <select value={unidad} onChange={e => setUnidad(e.target.value)}>
                  <option value="minutos">Minutos</option>
                  <option value="horas">Horas</option>
                  <option value="dias">Días</option>
                </select>
              </div>
            </div>
          )}

          {cfg.input === 'fecha' && (
            <div className="field-inline">
              <label>Fecha exacta para llamar</label>
              <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
            </div>
          )}

          {cfg.input === 'fechahora' && (
            <>
              <div className="field-inline-row">
                <div className="field-inline">
                  <label>Fecha</label>
                  <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
                </div>
                <div className="field-inline">
                  <label>Hora (24h)</label>
                  <HoraTexto value={hora} onChange={setHora} />
                </div>
              </div>
              <div className="field-inline">
                <label>Duración (minutos)</label>
                <input type="number" min="15" step="15" value={duracionMin}
                  onChange={e => setDuracionMin(e.target.value)} />
              </div>
            </>
          )}

          <div className="field-inline">
            <label>Observación (opcional)</label>
            <textarea value={observacion}
              onChange={e => setObservacion(e.target.value)}
              placeholder="Notas de esta llamada..." />
          </div>

          <div className="actions">
            <button type="button" className="btn-mini" onClick={reset}>Cancelar</button>
            <button type="submit" className="btn-mini primary">Registrar</button>
          </div>
        </form>
      )}
    </div>
  );
}

function HistorialList({ contactos, settings, readOnly, onEdit, onDelete }) {
  if (!contactos || contactos.length === 0) {
    return <div className="historial-vacio">Sin gestiones registradas todavía.</div>;
  }
  const ordenados = [...contactos].reverse();
  return (
    <div className="historial-list">
      {ordenados.map(c => (
        <HistorialItem key={c.id} contacto={c} settings={settings} readOnly={readOnly}
          onSave={(patch) => onEdit(c.id, patch)}
          onDelete={() => onDelete(c.id)} />

  );
}

function HistorialItem({ contacto, settings, readOnly, onSave, onDelete }) {
  const [editing, setEditing] = useState(false);

function HistorialEditForm({ contacto, settings, onSave, onCancel }) {
  const cfg = tipoConfig(contacto.tipo);
  const hasAgendado = !!contacto.agendadoPara;
  const hasHora = cfg && cfg.input === 'fechahora';
  const defaultDur = settings?.slotDurationMin || 60;

  const [observacion, setObservacion] = useState(contacto.observacion || '');
  const initialFecha = hasAgendado ? new Date(contacto.agendadoPara) : null;
  const [fechaIso, setFechaIso] = useState(initialFecha ? dateToYMD(initialFecha) : '');
  const [hora, setHora] = useState(initialFecha && hasHora
    ? `${pad2(initialFecha.getHours())}:${pad2(initialFecha.getMinutes())}` : '');
  const [duracionMin, setDuracionMin] = useState(contacto.duracionMin || defaultDur);

  const save = () => {
    const patch = { observacion: observacion.trim() };
    if (hasAgendado) {
      if (!fechaIso) { alert('Falta la fecha'); return; }
      if (hasHora) {
        if (!hora) { alert('Falta la hora'); return; }
        patch.agendadoPara = new Date(fechaIso + 'T' + hora + ':00').toISOString();
        patch.duracionMin = parseInt(duracionMin, 10) || defaultDur;
      } else {
        // Días completos sin hora específica → default 09:00
        patch.agendadoPara = new Date(fechaIso + 'T09:00:00').toISOString();
      }
      // Si la fecha cambió respecto al original, la etiqueta original ya no aplica.
      // Convertimos automáticamente a "fecha_exacta" (salvo que ya sea agendado, que mantiene tipo).
      const cambioFecha = patch.agendadoPara !== contacto.agendadoPara;
      if (cambioFecha && contacto.tipo !== 'agendado' && contacto.tipo !== 'fecha_exacta') {
        patch.tipo = 'fecha_exacta';
      }
    }
    onSave(patch);
  };

  return (
    <div className="historial-edit-form">
      <div className="historial-edit-tipo">
        <span>Editando:</span>
        <span className="chip" style={{
          color: cfg?.color, background: cfg?.bg,
          padding:'3px 10px', borderRadius:10, fontSize:'0.7rem',
          fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px'
        }}>{cfg?.label}</span>
        <span style={{marginLeft:'auto', fontSize:'0.74rem', color:'var(--texto-suave)'}}>
          registrada {formatFechaHora(contacto.fecha)}
        </span>
      </div>

      {hasAgendado && (
        hasHora ? (
          <>
            <div className="field-inline-row">
              <div className="field-inline">
                <label>Fecha del agendamiento</label>
                <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
              </div>
              <div className="field-inline">
                <label>Hora (24h)</label>
                <HoraTexto value={hora} onChange={setHora} />
              </div>
            </div>
            <div className="field-inline">
              <label>Duración (minutos)</label>
              <input type="number" min="15" step="15" value={duracionMin}
                onChange={e => setDuracionMin(e.target.value)} />
            </div>
          </>
        ) : (
          <div className="field-inline">
            <label>Fecha del próximo contacto</label>
            <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
          </div>
        )
      )}

      <div className="field-inline">
        <label>Observación</label>
        <textarea value={observacion}
          onChange={e => setObservacion(e.target.value)} />
      </div>

      <div className="actions">
        <button className="btn-mini" onClick={onCancel}>Cancelar</button>
        <button className="btn-mini primary" onClick={save}>Guardar</button>
      </div>
    </div>
  );
}

function NuevoProspectoModal({ onCancel, onSave, slotInfo }) {
  const [form, setForm] = useState({
    nombre: '', telefono: '', preferenciaContacto: '',
    detalle: '', referente: '', observaciones: ''
  });
  const [errors, setErrors] = useState({});
  const slotLabel = slotInfo
    ? (() => {
        const d = slotInfo.date;
        const dow = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][d.getDay()];
        return `${dow} ${d.getDate()} de ${NOMBRES_MES[d.getMonth()]} · ${pad2(slotInfo.hour)}:${pad2(slotInfo.minute)}`;

  const upd = (k, v) => setForm(f => ({...f, [k]: v}));

  const submit = () => {
    const errs = {};
    if (!form.nombre.trim()) errs.nombre = 'Ingresá un nombre';

            }}>
              Se agendará para <strong>{slotLabel}</strong> apenas se guarde.

              <select value={form.preferenciaContacto}

// ── CALENDARIO HELPERS ────────────────────────────────────────
const NOMBRES_MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DOW_CORTOS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
}
function isToday(d) { return isSameDay(d, new Date()); }

// Devuelve la grilla del mes: array de 35-42 celdas con { date, outOfMonth }
function buildMonthGrid(year, month) {
  const first = new Date(year, month, 1);
  // offset del lunes: 0=Lun, 1=Mar, ..., 6=Dom
  const offset = (first.getDay() + 6) % 7;
  const lastDay = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = offset; i > 0; i--) {
    cells.push({ date: new Date(year, month, 1 - i), outOfMonth: true });
  }
  for (let i = 1; i <= lastDay; i++) {
    cells.push({ date: new Date(year, month, i), outOfMonth: false });
  }
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1].date;
    const d = new Date(last); d.setDate(d.getDate() + 1);
    cells.push({ date: d, outOfMonth: true });
  }
  return cells;
}

// Extrae eventos de los prospectos (uno por prospecto si tiene proximoContacto y no está rechazado)
function extractCalendarEvents(prospectos, tareasState, agendados) {
  const events = [];
  // Eventos de prospectos (proximoContacto) — SOLO si el último contacto es
  // una cita formal (tipo 'agendado'). Para los otros tipos (llamar_X,
  // contestador, fecha_exacta) ya hay una tarea auto-generada que cubre el
  // mismo evento, así evitamos duplicación visual en el calendario.
  for (const p of prospectos) {
    if (!p.proximoContacto) continue;
    if (deriveEstado(p) === 'rechazado') continue;
    const ultimoAgendado = [...(p.contactos || [])].reverse().find(c => c.agendadoPara);
    if (ultimoAgendado?.tipo !== 'agendado') continue;
    events.push({
      id: p.id + '_proximo',
      kind: 'prospecto',
      prospectoId: p.id,
      label: p.nombre || '(sin nombre)',
      prospectoNombre: p.nombre || '(sin nombre)',
      fecha: p.proximoContacto,
      tipo: 'agendado',
      observacion: ultimoAgendado?.observacion || '',
      duracionMin: ultimoAgendado?.duracionMin || null,
      actorId: ultimoAgendado?.actorId || p.actorId || null,
      agenteId: ultimoAgendado?.agenteId || p.agenteId || null,
      updatedAt: p.updatedAt || null
    });
  }
  // Agendados standalone (sin prospect): los creados desde "Nueva agenda"
  // en el calendario. Vienen de abordaje_agendados con prospecto_id NULL.
  for (const a of (agendados || [])) {
    if (a.prospectoId) continue; // los de prospect ya están arriba
    const lines = (a.nota || '').split(/\r?\n+/).filter(Boolean);
    events.push({
      id: a.id + '_agenda',
      kind: 'agenda',
      agendaData: a,
      label: lines[0] || 'Agenda',
      fecha: a.fecha,
      tipo: 'agendado',
      observacion: lines.slice(1).join('\n') || '',
      duracionMin: null,
      actorId: a.actorId || null,
      agenteId: a.agenteId || null,
      updatedAt: a.createdAt || null
    });
  }
  // Eventos de tareas (con fechaRecordatorio).
  // Si la tarea es auto-generada (tiene prospectoId), heredamos el tipo del
  // último contacto del prospect para que el color del calendario sea
  // coherente con la etiqueta de la gestión.
  if (tareasState && Array.isArray(tareasState.items)) {
    for (const t of tareasState.items) {
      if (!t.fechaRecordatorio) continue;
      const fechaIso = t.horaRecordatorio
        ? `${t.fechaRecordatorio}T${t.horaRecordatorio}:00`
        : `${t.fechaRecordatorio}T09:00:00`;
      let tipoContacto = null;
      if (t.prospectoId) {
        const prosp = prospectos.find(x => x.id === t.prospectoId);
        const ultimo = prosp ? [...(prosp.contactos || [])].reverse().find(c => c.agendadoPara) : null;
        tipoContacto = ultimo?.tipo || null;
      }
      events.push({
        id: t.id + '_tarea',
        kind: 'tarea',
        tareaData: t,
        tipo: tipoContacto,
        label: t.titulo || '(tarea sin título)',
        fecha: fechaIso,
        observacion: t.observacion || '',
        duracionMin: null,
        actorId: t.actorId || null,
        agenteId: t.agenteId || null,
        updatedAt: t.updatedAt || null,
      });
    }
  }
  return events.sort((a, b) => a.fecha.localeCompare(b.fecha));
}

// ── MODO PILOTO: helpers para Google Calendar ──────────────────
// Calcula el rango (timeMin, timeMax) a pedir a Google según el mode visible.
// Pedimos un poco más que el rango exacto para que las navegaciones cortas
// no necesiten refetch inmediato.
function calcRangeForGcal(mode, cursor) {
  const start = new Date(cursor);
  let end;
  if (mode === 'mes') {
    start.setDate(1); start.setHours(0,0,0,0);
    end = new Date(start);
    end.setMonth(end.getMonth() + 1);
  } else if (mode === 'semana') {
    // cursor ya está en startOfWeek
    end = new Date(start);
    end.setDate(end.getDate() + 7);
  } else { // 'hoy'
    start.setHours(0,0,0,0);
    end = new Date(start);
    end.setDate(end.getDate() + 1);
  }
  // Margen para que la navegación previa/siguiente no recargue de inmediato
  start.setDate(start.getDate() - 3);
  end.setDate(end.getDate() + 3);
  return { timeMin: start.toISOString(), timeMax: end.toISOString() };
}

// Mapea eventos de Google Calendar al formato interno del calendar de Abordaje.
// Propaga `gcalColor` (background del calendar de origen) y `gcalCalendarName`
// para pintar eventos externos con el color/nombre del calendario en Google.
// `tareasItems` se usa para detectar eventos huérfanos: eventos con
// `abordaje_tarea_id` cuya tarea ya no existe en state O cuya tarea apunta
// a otro evento (típicamente eventos viejos que quedaron en Google después
// de editar la fecha de la tarea cuando había un bug de sync). Los huérfanos
// se marcan con `isOrphan=true` y el click abre un modal específico que
// permite borrarlos sin tocar la tarea.
function extractGcalEventsForCalendar(gcalEvents, prospectos, tareasItems) {
  const events = [];
  const tareasById = new Map((tareasItems || []).map(t => [t.id, t]));
  // Deduplicate por id (eventos compartidos pueden aparecer en varios calendars).
  const seen = new Set();
  for (const ev of (gcalEvents || [])) {
    if (ev.status === 'cancelled') continue;
    if (seen.has(ev.id)) continue;
    seen.add(ev.id);
    const start = ev.start?.dateTime || ev.start?.date;
    if (!start) continue;
    const ext = ev.extendedProperties?.private || {};
    const prospectoId = ext.abordaje_prospect_id || null;
    const tareaId = ext.abordaje_tarea_id || null;
    let kind = 'agenda';
    let prospectoNombre = null;
    let isOrphan = false;
    // Distinguimos "creado desde Abordaje" de "evento externo del calendar
    // personal" mirando el tag `abordaje_agente_id` (lo inyecta gcalApi._decorate
    // en cualquier create/update de Abordaje). Sin esto, las agendas standalone
    // creadas en "Nueva agenda" (que no tienen prospectId/tareaId) se mezclan
    // con eventos personales del calendar y heredan su color celeste.
    const createdByAbordaje = !!ev?.extendedProperties?.private?.abordaje_agente_id;
    if (prospectoId) {
      kind = 'prospecto';
      const p = prospectos.find(x => x.id === prospectoId);
      prospectoNombre = p?.nombre || '(prospect eliminado)';
      // Si el prospect ya no existe, es huérfano.
      if (!p) isOrphan = true;
    } else if (tareaId) {
      kind = 'tarea';
      const tarea = tareasById.get(tareaId);
      // Huérfano si: la tarea ya no existe, O existe pero apunta a otro evento
      // (duplicación de sync histórica antes del fix de googleEventId).
      if (!tarea || (tarea.googleEventId && tarea.googleEventId !== ev.id)) {
        isOrphan = true;
      }
    }
    events.push({
      id: ev.id,
      kind,
      googleEvent: ev,
      prospectoId,
      tareaId,
      prospectoNombre,
      isOrphan,
      label: prospectoNombre || ev.summary || '(sin título)',
      fecha: start,
      tipo: 'agendado',
      observacion: ev.description || '',
      duracionMin: null,
      gcalColor: ev._gcalColor || null,
      gcalCalendarName: ev._gcalSummary || null,
      // External = sin vínculo a entidad Abordaje Y no fue creado por Abordaje.
      // Las agendas standalone creadas via "Nueva agenda" (sin prospect/tarea)
      // pero con tag abordaje_agente_id se consideran "nuestras" → kind=agenda
      // → color verde (regla por tipo en colorCalendarEvento), no celeste.
      isExternalGcal: !prospectoId && !tareaId && !createdByAbordaje,
      // Actor/agente inyectados al crear/editar desde Abordaje (extendedProperties.private)
      actorId: ext.abordaje_actor_id || null,
      agenteId: ext.abordaje_agente_id || null,
      updatedAt: ev.updated || null,
    });
  }
  return events.sort((a, b) => a.fecha.localeCompare(b.fecha));
}

// Color del evento en calendario — paleta reducida y consistente:
//   agendado (cita) → verde
//   contestador → gris
//   mensaje sin respuesta → azul
//   llamar_* / fecha_exacta → amarillo claro
//   tarea manual (sin prospecto vinculado) → violeta
const CAL_COLOR_VERDE    = { color: '#065f46', bg: '#d1fae5', border: '#065f46' };
const CAL_COLOR_GRIS     = { color: '#374151', bg: '#e5e7eb', border: '#374151' };
const CAL_COLOR_AZUL     = { color: '#1e40af', bg: '#dbeafe', border: '#1e40af' };
const CAL_COLOR_AMARILLO = { color: '#a16207', bg: '#fef9c3', border: '#a16207' };
const CAL_COLOR_VIOLETA  = { color: '#6d28d9', bg: 'rgba(124,58,237,0.14)', border: '#7c3aed' };

// Convierte un color HEX (#RRGGBB) en una versión clarita (bg) y oscura (text).
function deriveColorsFromGcalHex(hex) {
  if (!hex || typeof hex !== 'string') return null;
  const m = hex.replace('#', '').match(/^([0-9a-f]{6})$/i);
  if (!m) return null;
  const n = parseInt(m[1], 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  const bg = `rgba(${r},${g},${b},0.18)`;
  // Texto: oscurecer el color un poco para contraste sobre el bg pastel.
  const dark = (c) => Math.max(0, Math.floor(c * 0.55));
  const color = `rgb(${dark(r)},${dark(g)},${dark(b)})`;
  return { color, bg, border: hex };
}

function colorCalendarEvento(e, colorsMap, calendarColors) {
  // 1. Override manual (click derecho) — máxima prioridad.
  let overrideId = null;
  if (colorsMap) {
    const k = buildEventKey(e);
    if (k) overrideId = colorsMap[k];
  }
  if (overrideId && EVENT_COLOR_PALETTE[overrideId]) {
    return EVENT_COLOR_PALETTE[overrideId];
  }
  // 2. Override por calendar de Google (configurado en CalendarPicker).
  //    Cada calendar puede definir un color para "agendas" (kind=agenda/prospecto)
  //    y otro para "tareas" (kind=tarea). Gana sobre las reglas automáticas
  //    pero queda debajo del override manual de evento puntual.
  const gcalId = e?.googleEvent?._gcalId;
  if (gcalId && calendarColors && calendarColors[gcalId]) {
    const cfg = calendarColors[gcalId];
    if (e.kind === 'tarea' && cfg.tarea && EVENT_COLOR_PALETTE[cfg.tarea]) {
      return EVENT_COLOR_PALETTE[cfg.tarea];
    }
    if ((e.kind === 'prospecto' || e.kind === 'agenda') && cfg.agenda && EVENT_COLOR_PALETTE[cfg.agenda]) {
      return EVENT_COLOR_PALETTE[cfg.agenda];
    }
  }
  // 3. Eventos externos de Google (no creados desde Abordaje): usar el color del
  // calendario de origen para que match con lo que el user ve en Google Calendar.
  if (e?.isExternalGcal && e.gcalColor) {
    const c = deriveColorsFromGcalHex(e.gcalColor);
    if (c) return c;
  }
  // Regla de origen: si el evento nace de una tarea del Kanban (manual o
  // auto-generada desde una gestión), su color es violeta — coherente con la
  // identidad visual de las tareas (cards lila). Esto se impone aunque la
  // tarea tenga prospectoId y el último contacto del prospect sea 'agendado'.
  if (e?.kind === 'tarea') return CAL_COLOR_VIOLETA;
  const t = e?.tipo;
  if (t === 'agendado') return CAL_COLOR_VERDE;
  if (t === 'contestador') return CAL_COLOR_GRIS;
  if (t === 'mensaje_sin_respuesta') return CAL_COLOR_AZUL;
  if (t === 'fecha_exacta' || (typeof t === 'string' && t.startsWith('llamar_'))) {
    return CAL_COLOR_AMARILLO;
  }
  // Tarea manual sin tipo derivado del prospect → violeta default.
  return CAL_COLOR_VIOLETA;
}

// Lunes como inicio de semana
function startOfWeek(d) {
  const x = new Date(d); x.setHours(0,0,0,0);
  const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow);
  return x;
}
function addDays(d, n) {
  const x = new Date(d); x.setDate(x.getDate() + n); return x;
}

function eventsByDayKey(events) {
  const m = {};
  for (const e of events) {
    const d = new Date(e.fecha);
    const key = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    if (!m[key]) m[key] = [];
    m[key].push(e);
  }
  return m;
}

function dayKey(date) {
  return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`;
}

function formatHHMM(iso) {
  const d = new Date(iso);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function formatLargeDate(d) {
  const dow = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][d.getDay()];
  return `${dow} ${d.getDate()} de ${NOMBRES_MES[d.getMonth()]}`;
}

// ── CALENDARIO VIEW ───────────────────────────────────────────
function CalendarioView({ prospectos, tareasState, agendados, settings, isPilot, gcalReloadKey, onSelectProspecto, onSelectProspectoEvent, onSelectTarea, onSelectAgenda, onSelectOrphan, onMoveEvent, onSlotClick, onGcalActorIdsLoaded, onOpenSettings, calendarColors, onSetCalendarColor, onResetCalendarColors }) {
  const [mode, setMode] = useState('semana'); // 'mes' | 'semana' | 'hoy' — default 'semana' de la semana actual
  const [cursor, setCursor] = useState(() => startOfWeek(new Date()));
  const [selectedDay, setSelectedDay] = useState(null);
  // Eventos de Google Calendar para modo piloto. Se refrescan al cambiar
  // rango o cuando el padre bumpea `gcalReloadKey` (post create/update/delete).
  const [gcalEvents, setGcalEvents] = useState([]);
  const [gcalLoading, setGcalLoading] = useState(false);
  // true cuando la edge function gcal-events devolvió `skip` (token revocado
  // por el user en Google o sin gcal_enabled). Muestra banner para reconectar.
  const [gcalDisconnected, setGcalDisconnected] = useState(false);

  const { timeMin, timeMax } = useMemo(() => calcRangeForGcal(mode, cursor), [mode, cursor]);
  useEffect(() => {
    if (!isPilot) return;
    let cancelled = false;
    setGcalLoading(true);
    gcalApi.list(timeMin, timeMax)
      .then(evts => {
        if (cancelled) return;
        // gcalApi.list devuelve null cuando la edge function respondió skip
        // (token expirado, revocado o sin gcal_enabled). Distinto a [] que
        // significa "fetch OK pero sin eventos en el rango".
        if (evts === null) {
          setGcalDisconnected(true);
          setGcalEvents([]);
          return;
        }
        setGcalDisconnected(false);
        setGcalEvents(evts);
        // Propaga al padre los actor_ids encontrados en los eventos de Google
        // — App los necesita para que ActorStar muestre el nombre real del
        // asistente (en lugar del fallback "asistente") cuando creó el evento.
        if (onGcalActorIdsLoaded) {
          const ids = new Set();
          for (const ev of evts) {
            const aid = ev?.extendedProperties?.private?.abordaje_actor_id;
            if (aid) ids.add(aid);
          }
          if (ids.size > 0) onGcalActorIdsLoaded(ids);
        }
      })
      .catch(err => console.warn('gcal list:', err?.message || err))
      .finally(() => { if (!cancelled) setGcalLoading(false); });
    return () => { cancelled = true; };
  }, [isPilot, timeMin, timeMax, gcalReloadKey, onGcalActorIdsLoaded]);

  // Filtro de calendars de Google (replica el checkbox de "mostrar/ocultar
  // calendario" que tiene Google Calendar). Es solo visual en Abordaje: no
  // toca el share en Google, persiste por dispositivo en localStorage.
  // El calendar primary nunca se puede ocultar (sino se pierden los eventos
  // de Abordaje creados desde acá).
  const [hiddenCalendars, setHiddenCalendars] = useState(() => {
    try {
      const stored = localStorage.getItem('abordaje_hidden_calendars');
      return stored ? new Set(JSON.parse(stored)) : new Set();
    } catch { return new Set(); }
  });
  const [showCalendarPicker, setShowCalendarPicker] = useState(false);

  const toggleCalendar = useCallback((calId) => {
    setHiddenCalendars(prev => {
      const next = new Set(prev);
      if (next.has(calId)) next.delete(calId);
      else next.add(calId);
      try { localStorage.setItem('abordaje_hidden_calendars', JSON.stringify([...next])); } catch {}
      return next;
    });
  }, []);
  const mostrarTodosLosCalendars = useCallback(() => {
    setHiddenCalendars(new Set());
    try { localStorage.removeItem('abordaje_hidden_calendars'); } catch {}
  }, []);

  // Calendars únicos detectados en los eventos de Google. Se actualiza con
  // cada fetch. Primary primero, después alfabético.
  const detectedCalendars = useMemo(() => {
    const map = new Map();
    for (const ev of (gcalEvents || [])) {
      if (!ev._gcalId) continue;
      if (!map.has(ev._gcalId)) {
        map.set(ev._gcalId, {
          id: ev._gcalId,
          name: ev._gcalSummary || '(sin nombre)',
          color: ev._gcalColor || '#0098DA',
          primary: !!ev._gcalPrimary,
        });
      }
    }
    return [...map.values()].sort((a, b) => {
      if (a.primary !== b.primary) return a.primary ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
  }, [gcalEvents]);

  const events = useMemo(() => {
    if (isPilot) {
      const filtered = (gcalEvents || []).filter(ev => !ev._gcalId || !hiddenCalendars.has(ev._gcalId));
      return extractGcalEventsForCalendar(filtered, prospectos, tareasState?.items);
    }
    return extractCalendarEvents(prospectos, tareasState, agendados);
  }, [isPilot, gcalEvents, prospectos, tareasState, agendados, hiddenCalendars]);
  const eventsByKey = useMemo(() => eventsByDayKey(events), [events]);

  // Dispatcher: cada evento del calendario sabe a dónde abre cuando se clickea.
  // En piloto los eventos provienen de Google y portan googleEvent/tareaId/prospectoId.
  // En non-piloto vienen del state local con tareaData/agendaData/prospectoId.
  const onSelectEvent = useCallback((e) => {
    // Si es huérfano (evento Google con tareaId/prospectoId que no matchea
    // el state actual), no abrimos el modal de la entidad subyacente sino
    // un modal específico que ofrece borrarlo del calendar. Sino sería
    // confuso: el modal mostraría datos de OTRO evento (el actual de la tarea).
    if (e.isOrphan && onSelectOrphan) {
      onSelectOrphan(e);
      return;
    }
    if (e.kind === 'tarea' && onSelectTarea) {
      if (e.tareaData) onSelectTarea(e.tareaData);
      else if (e.tareaId) {
        const t = tareasState?.items?.find(x => x.id === e.tareaId);
        if (t) onSelectTarea(t);
      }
    } else if (e.kind === 'agenda' && onSelectAgenda) {
      onSelectAgenda(e.googleEvent ? { googleEvent: e.googleEvent } : e.agendaData);
    } else if (e.kind === 'prospecto') {
      // Si hay handler específico para eventos de prospect, lo usamos (abre
      // un modal con opciones: eliminar la gestión, abrir ficha, etc.).
      // Sino, fallback al comportamiento viejo de abrir el panel directo.
      if (onSelectProspectoEvent) onSelectProspectoEvent(e);
      else if (onSelectProspecto) onSelectProspecto(e.prospectoId);
    }
  }, [onSelectProspecto, onSelectProspectoEvent, onSelectTarea, onSelectAgenda, onSelectOrphan, tareasState]);

  // Cuando cambia el mode, ajustar cursor a un anchor sensato
  useEffect(() => {
    if (mode === 'mes') {
      const d = new Date(cursor); d.setDate(1); setCursor(d);
    } else if (mode === 'semana') {
      setCursor(startOfWeek(cursor));
    } else if (mode === 'hoy') {
      const d = new Date(); d.setHours(0,0,0,0); setCursor(d);
    }
    setSelectedDay(null);
  }, [mode]);

  const goPrev = () => {
    const d = new Date(cursor);
    if (mode === 'mes') d.setMonth(d.getMonth() - 1);
    else if (mode === 'semana') d.setDate(d.getDate() - 7);
    else if (mode === 'hoy') d.setDate(d.getDate() - 1);
    setCursor(d); setSelectedDay(null);
  };
  const goNext = () => {
    const d = new Date(cursor);
    if (mode === 'mes') d.setMonth(d.getMonth() + 1);
    else if (mode === 'semana') d.setDate(d.getDate() + 7);
    else if (mode === 'hoy') d.setDate(d.getDate() + 1);
    setCursor(d); setSelectedDay(null);
  };
  const goToday = () => {
    if (mode === 'mes') {
      const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); setCursor(d);
      setSelectedDay(dayKey(new Date()));
    } else if (mode === 'semana') {
      setCursor(startOfWeek(new Date()));
      setSelectedDay(null);
    } else {
      const d = new Date(); d.setHours(0,0,0,0); setCursor(d);
      setSelectedDay(null);
    }
  };

  // Saltar a un mes/año específico desde el picker del título
  const jumpTo = (year, month) => {
    const d = new Date(year, month, 1); d.setHours(0,0,0,0);
    if (mode === 'mes') setCursor(d);
    else if (mode === 'semana') setCursor(startOfWeek(d));
    else { const t = new Date(year, month, 1); t.setHours(0,0,0,0); setCursor(t); }
    setSelectedDay(null);
  };

  const subTabs = (
    <div className="cal-sub-tabs">
      <button className={`cal-sub-tab ${mode==='mes'?'active':''}`} onClick={() => setMode('mes')}>Mes</button>
      <button className={`cal-sub-tab ${mode==='semana'?'active':''}`} onClick={() => setMode('semana')}>Semana</button>
      <button className={`cal-sub-tab ${mode==='hoy'?'active':''}`} onClick={() => setMode('hoy')}>Hoy</button>
      {isPilot && detectedCalendars.length > 1 && (
        <div className="cal-picker-wrap">
          <button type="button"
            className={`cal-sub-tab cal-picker-btn ${hiddenCalendars.size > 0 ? 'has-hidden' : ''}`}
            onClick={() => setShowCalendarPicker(s => !s)}
            title="Mostrar / ocultar calendars de Google">
            Calendarios
            {hiddenCalendars.size > 0 && (
              <span className="cal-picker-badge" aria-label={`${hiddenCalendars.size} ocultos`}>
                {hiddenCalendars.size}
              </span>
            )}
          </button>
          {showCalendarPicker && (
            <CalendarPicker
              calendars={detectedCalendars}
              hidden={hiddenCalendars}
              onToggle={toggleCalendar}
              onShowAll={mostrarTodosLosCalendars}
              onClose={() => setShowCalendarPicker(false)}
              calendarColors={calendarColors || {}}
              onSetCalendarColor={onSetCalendarColor}
              onResetCalendarColors={onResetCalendarColors}
            />
          )}
        </div>
      )}
    </div>
  );

  // Render del calendar según mode. Se envuelve más abajo con el banner de
  // desconexión Google si aplica.
  let calendarNode;
  if (mode === 'mes') {
    calendarNode = <MonthCalendar
      cursor={cursor}
      events={events}
      eventsByKey={eventsByKey}
      selectedDay={selectedDay}
      setSelectedDay={setSelectedDay}
      onSelectEvent={onSelectEvent}
      goPrev={goPrev} goNext={goNext} goToday={goToday}
      onJumpTo={jumpTo}
      subTabs={subTabs}
    />;
  } else if (mode === 'semana') {
    calendarNode = <WeekCalendar
      anchorDate={cursor}
      events={events}
      settings={settings}
      onSelectEvent={onSelectEvent}
      onSlotClick={onSlotClick}
      onMoveEvent={onMoveEvent}
      goPrev={goPrev} goNext={goNext} goToday={goToday}
      onJumpTo={jumpTo}
      subTabs={subTabs}
      ndays={settings.includeWeekends ? 7 : 5}
    />;
  } else {
    // mode === 'hoy'
    calendarNode = <WeekCalendar
      anchorDate={cursor}
      events={events}
      settings={settings}
      onSelectEvent={onSelectEvent}
      onSlotClick={onSlotClick}
      onMoveEvent={onMoveEvent}
      goPrev={goPrev} goNext={goNext} goToday={goToday}
      onJumpTo={jumpTo}
      subTabs={subTabs}
      ndays={1}
      singleDay={true}
    />;
  }
  return (
    <>
      {gcalDisconnected && (
        <div className="gcal-disconnected-banner" role="alert">
          <span className="gcal-disconnected-icon" aria-hidden="true">⚠</span>
          <span className="gcal-disconnected-text">
            La conexión con Google Calendar se interrumpió (token expirado o revocado). Reconectá para ver y sincronizar tus eventos.
          </span>
          {onOpenSettings && (
            <button type="button" className="gcal-disconnected-cta" onClick={onOpenSettings}>
              Reconectar
            </button>
          )}
        </div>
      )}
      {calendarNode}
    </>
  );
}

// ── CALENDAR PICKER ───────────────────────────────────────────
// Popover con: (a) checkboxes para mostrar/ocultar calendars de Google
// (visual, no toca el share, persiste localStorage por device); (b) opción
// de configurar colores fijos por calendar para Agendas y Tareas (persiste
// en profiles.abordaje_settings, sigue al user entre devices). El calendar
// primary no se puede ocultar — sino se pierden los eventos de Abordaje.
function CalendarPicker({ calendars, hidden, onToggle, onShowAll, onClose,
                          calendarColors, onSetCalendarColor, onResetCalendarColors }) {
  const [expandedId, setExpandedId] = useState(null);
  useEffect(() => {
    const onDocClick = (e) => {
      if (!e.target.closest('.cal-picker-pop, .cal-picker-btn')) onClose();
    };
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    setTimeout(() => document.addEventListener('mousedown', onDocClick), 0);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDocClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [onClose]);

  return (
    <div className="cal-picker-pop" role="dialog" aria-label="Calendarios">
      <div className="cal-picker-head">
        <span>Calendarios</span>
        {hidden.size > 0 && (
          <button type="button" className="cal-picker-all" onClick={onShowAll}>
            Mostrar todos
          </button>
        )}
      </div>
      <div className="cal-picker-list">
        {calendars.map(cal => {
          const isHidden = hidden.has(cal.id);
          const disabled = !!cal.primary;
          const isExpanded = expandedId === cal.id;
          const cfg = (calendarColors && calendarColors[cal.id]) || {};
          const hasOverride = !!(cfg.agenda || cfg.tarea);
          return (
            <div key={cal.id} className="cal-picker-item-wrap">
              <div className={`cal-picker-item ${disabled ? 'disabled' : ''}`}>
                <input
                  type="checkbox"
                  checked={!isHidden}
                  disabled={disabled}
                  onChange={() => onToggle(cal.id)}
                  title={disabled ? 'Tu calendar principal siempre está visible' : ''}
                />
                <span className="cal-picker-swatch" style={{ background: cal.color }}></span>
                <span className="cal-picker-name">{cal.name}</span>
                {cal.primary && <span className="cal-picker-tag">principal</span>}
                <button type="button"
                  className={`cal-picker-cfg ${isExpanded ? 'open' : ''} ${hasOverride ? 'has' : ''}`}
                  onClick={() => setExpandedId(isExpanded ? null : cal.id)}
                  title="Configurar colores fijos para este calendar"
                  aria-label="Configurar colores">
                  {hasOverride ? '🎨' : '⋯'}
                </button>
              </div>
              {isExpanded && (
                <div className="cal-picker-colors">
                  <ColorSelectorRow label="Agendas" value={cfg.agenda || null}
                    onChange={(v) => onSetCalendarColor(cal.id, 'agenda', v)} />
                  <ColorSelectorRow label="Tareas" value={cfg.tarea || null}
                    onChange={(v) => onSetCalendarColor(cal.id, 'tarea', v)} />
                  {hasOverride && (
                    <button type="button" className="cal-picker-reset"
                      onClick={() => onResetCalendarColors(cal.id)}>
                      Restablecer (automático)
                    </button>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Fila con selector de color: label + 8 swatches de la paleta + opción "auto".
function ColorSelectorRow({ label, value, onChange }) {
  return (
    <div className="cal-color-row">
      <span className="cal-color-label">{label}</span>
      <div className="cal-color-swatches">
        <button type="button"
          className={`cal-color-swatch auto ${!value ? 'selected' : ''}`}
          onClick={() => onChange(null)}
          title="Automático (color por defecto)">
          A
        </button>
        {EVENT_COLOR_ORDER.map(id => {
          const pal = EVENT_COLOR_PALETTE[id];
          return (
            <button key={id} type="button"
              className={`cal-color-swatch ${value === id ? 'selected' : ''}`}
              style={{ background: pal.bg, borderColor: pal.border }}
              onClick={() => onChange(id)}
              title={pal.label} aria-label={pal.label} />
          );
        })}
      </div>
    </div>
  );
}

function MonthYearPicker({ year, month, onPick, onClose }) {
  const [picYear, setPicYear] = useState(year);

    const onDocClick = (e) => {
      if (!e.target.closest('.myp-pop, .cal-title.clickable')) onClose();
    };

    setTimeout(() => document.addEventListener('mousedown', onDocClick), 0);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDocClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [onClose]);
  return (
    <div className="myp-pop">
      <div className="myp-year">
        <button className="myp-year-btn" onClick={() => setPicYear(y => y - 1)}>‹</button>

// Marca visual (estrella) cuando la última modificación la hizo alguien
// distinto al agente dueño del workspace. Item necesita actorId y agenteId.
// Tooltip "Modificado por NOMBRE · DD/MM HH:MM" usando el cache de actors.
function ActorStar({ item }) {
  const { actors } = useContext(ActorContext);
  if (!item?.actorId || !item?.agenteId) return null;
  if (item.actorId === item.agenteId) return null;
  const info = actors[item.actorId];
  const name = info?.display_name || info?.email || 'asistente';
  const ts = item.updatedAt || item.createdAt;
  const tsStr = formatActorTimestamp(ts);
  const title = tsStr ? `Modificado por ${name} · ${tsStr}` : `Modificado por ${name}`;
  return <span className="actor-star" title={title}>★</span>;
}
