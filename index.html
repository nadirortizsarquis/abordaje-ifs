          {items.length} {items.length === 1 ? 'evento' : 'eventos'}
        </span>
      </div>
      {grupos.length === 0 && (
        <div className="bell-empty">Sin eventos pendientes 🎉</div>
      )}
      {grupos.map(g => {
        const meta = URGENCIA_META[g.urgencia];
        return (
          <div key={g.urgencia} className="bell-group">
            <div className="bell-group-header" style={{color: meta.color, background: meta.bg}}>
              {meta.emoji} {meta.label} <span className="bell-group-count">{g.items.length}</span>
            </div>
            {g.items.map(it => {
              const dt = it.fecha;
              const hh = String(dt.getHours()).padStart(2,'0');
              const mm = String(dt.getMinutes()).padStart(2,'0');
              const hoy = isToday(dt);
              const fechaStr = hoy
                ? `${hh}:${mm}`
                : `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${hh}:${mm}`;
              const catLabel = it.tipo === 'agendado' ? 'Calendario' : 'Tarea';
              return (
                <div key={it.key} className="bell-item" onClick={() => onClickItem(it)}>
                  <div className="bell-item-body">
                    <div className="bell-item-titulo">
                      <span className="bell-item-cat">{catLabel} —</span> {it.titulo}
                    </div>
                    {it.detalle && <div className="bell-item-detalle">{it.detalle}</div>}
                  </div>
                  <div className="bell-item-fecha">{fechaStr}</div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App({ user, agente, viewAs, onViewAs, onExitViewAs, onLogout }) {
  const readOnly = !!viewAs;
  const [state, setState] = useState(() => emptyState());
  const [loading, setLoading] = useState(true);

  // Guard común para handlers de escritura: bloquea si estamos viendo como otro
  const guardReadOnly = () => {
    if (readOnly) {
      showToast('Vista de solo lectura — volvé a tu vista para editar');
      return true;
    }
    return false;
  };

  // Cuando el agente llega con abordaje_settings (puede tardar un instante por la
  // consulta a profiles), sincronizamos el state con eso. Si es null usamos el
  // cache local (que ya se cargó en useState inicial).
  useEffect(() => {
    if (agente?.abordaje_settings) {
      const merged = { ...DEFAULT_SETTINGS, ...agente.abordaje_settings };
      setSettings(merged);
      try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(merged)); } catch {}
    }
  }, [agente?.id]);

  // Tick cada 60s para que las urgencias de notificaciones se recalculen
  // (ej. "Llamar en 15min" → cuando pasen los 15 min pasa de "Hoy" a "Vencido"
  // sin necesidad de recargar la página).
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60 * 1000);
    return () => clearInterval(id);
  }, []);

  const notificaciones = useMemo(() => calcularNotificaciones(state), [state, tick]);
  const notifUrgentes = notificaciones.filter(n => n.urgencia === 'vencido' || n.urgencia === 'hoy').length;
  const [settings, setSettings] = useState(() => loadSettings());
  const [showAddModal, setShowAddModal] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [bellOpen, setBellOpen] = useState(false);
  const [tick, setTick] = useState(0);  // re-render cada 60s para recalcular urgencias
  const [tareaEditando, setTareaEditando] = useState(null);
  const [convertirTareaId, setConvertirTareaId] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [view, setView] = useState('lista');
  const [filterEstado, setFilterEstado] = useState('todos');
  const [filterFecha, setFilterFecha] = useState('todos');

  // Carga inicial desde Supabase. Si hay viewAs, filtra por su id.
  useEffect(() => {
    let cancel = false;
    setLoading(true);
    (async () => {
      try {
        const s = await storage.loadState(viewAs?.id);
        if (!cancel) setState(s);
      } catch (e) {
        console.error('loadState:', e);
        showToast('Error al cargar datos: ' + (e.message || e), { duration: 5000 });
      } finally {
        if (!cancel) setLoading(false);
      }
    })();
    return () => { cancel = true; };
  }, [viewAs?.id]);

  const handleErr = (e, ctx) => {
    console.error(ctx, e);
    showToast(`Error: ${e.message || e}`, { duration: 4000 });
  };

  const upsertProspecto = useCallback(async (id, patch) => {
    if (readOnly) { showToast('Vista de solo lectura'); return; }
    const prevList = state.prospectos;
    // Optimistic update
    setState(s => ({
      ...s,
      prospectos: s.prospectos.map(p =>
        p.id === id ? { ...p, ...patch, updatedAt: new Date().toISOString() } : p
      )
    }));
    try {
      await storage.updateProspecto(id, patch);
    } catch (e) {
      handleErr(e, 'updateProspecto');
      setState(s => ({ ...s, prospectos: prevList }));
    }
  }, [state.prospectos, readOnly]);

  const handleAdd = async (data) => {
    if (guardReadOnly()) return;
    try {
      const prospecto = await storage.createProspecto(data);
      setState(s => ({ ...s, prospectos: [prospecto, ...s.prospectos] }));
      setShowAddModal(false);
      showToast('Prospecto agregado');
    } catch (e) { handleErr(e, 'createProspecto'); }
  };

  const handleDelete = async (id) => {
    if (guardReadOnly()) return;
    if (!confirm('¿Eliminar este prospecto? No se puede deshacer.')) return;
    const prev = state.prospectos;
    setState(s => ({ ...s, prospectos: s.prospectos.filter(p => p.id !== id) }));
    try {
      await storage.deleteProspecto(id);
      setSelectedId(null);
      showToast('Prospecto eliminado');
    } catch (e) {
      handleErr(e, 'deleteProspecto');
      setState(s => ({ ...s, prospectos: prev }));
    }
  };

  // Sincroniza la tarea (Abordar) y/o el agendado del prospect según el contacto activo.
  // contactoActivo: el contacto que define el seguimiento vigente. Si null/sin agendadoPara,
  // sólo limpia (no crea nada).
  const sincronizarSeguimiento = async (prospectoId, contactoActivo, prevState) => {
    // 1. Limpiar tareas auto-generadas del prospect
    const tareasAuto = (prevState.tareas?.items || []).filter(t => t.prospectoId === prospectoId);
    for (const t of tareasAuto) {
      try { await storage.deleteTarea(t.id); }
      catch (e) { console.error('limpieza tarea auto:', e); }
    }
    // 2. Limpiar agendados anteriores del prospect que NO estén vencidos
    const ahora = new Date();
    const agendadosNoVencidos = (prevState.agendados || []).filter(a => {
      if (a.prospectoId !== prospectoId) return false;
      return new Date(a.fecha) >= ahora;
    });
    for (const a of agendadosNoVencidos) {
      try { await storage.deleteAgendado(a.id); }
      catch (e) { console.error('limpieza agendado:', e); }
    }
    const idsTareasBorradas = new Set(tareasAuto.map(t => t.id));
    const idsAgendadosBorrados = new Set(agendadosNoVencidos.map(a => a.id));
    setState(s => ({
      ...s,
      tareas: { ...s.tareas, items: s.tareas.items.filter(t => !idsTareasBorradas.has(t.id)) },
      agendados: s.agendados.filter(a => !idsAgendadosBorrados.has(a.id))
    }));

    // 3. Si no hay contacto activo o no tiene fecha objetivo, salir
    if (!contactoActivo || !contactoActivo.agendadoPara) return;

    // 4. Generar lo nuevo según el tipo
    if (contactoActivo.tipo === 'agendado') {
      try {
        const ag = await calendarApi.agendar(prospectoId, contactoActivo.agendadoPara, contactoActivo.observacion || '');
        setState(s => ({ ...s, agendados: [...s.agendados, ag] }));
      } catch (e) { console.error('agendar:', e); }
    } else {
      const colAbordar = (prevState.tareas?.columnas || []).find(c => c.slug === 'abordar');
      if (!colAbordar) { console.warn('No hay columna Abordar'); return; }
      const prospect = prevState.prospectos.find(p => p.id === prospectoId);
      const titulo = prospect?.nombre || 'Seguimiento';
      const { fecha, hora } = splitFechaHora(contactoActivo.agendadoPara);
      const cfgTipo = tipoConfig(contactoActivo.tipo);
      const obsTarea = [cfgTipo?.label, contactoActivo.observacion]
        .filter(Boolean).join(' — ');
      try {
        const tarea = await storage.createTarea({
          columnaId: colAbordar.id,
          prospectoId,
          titulo,
          fechaRecordatorio: fecha,
          horaRecordatorio: hora,
          observacion: obsTarea
        });
        setState(s => ({ ...s, tareas: { ...s.tareas, items: [...s.tareas.items, tarea] } }));
      } catch (e) { console.error('crear tarea auto:', e); }
    }
  };

  const handleAddContacto = async (prospectoId, contacto) => {
    if (guardReadOnly()) return;
    try {
      const nuevo = await storage.createContacto(prospectoId, contacto);
      const nuevoEstado = tipoConfig(nuevo.tipo)?.estado || 'nuevo';
      const nuevoProx = nuevo.agendadoPara || null;

      // Update local: agregar contacto al prospecto + estado/próximoContacto derivados
      setState(s => ({
        ...s,
        prospectos: s.prospectos.map(p => p.id === prospectoId
          ? { ...p, contactos: [...(p.contactos || []), nuevo], proximoContacto: nuevoProx, estado: nuevoEstado, updatedAt: new Date().toISOString() }
          : p)
      }));
      await storage.updateProspecto(prospectoId, { estado: nuevoEstado, proximoContacto: nuevoProx });

      // Sincronización tarea/agenda automática (solo si trae fecha objetivo)
      if (contacto.agendadoPara) {
        await sincronizarSeguimiento(prospectoId, nuevo, state);
      }

      showToast('Gestión registrada');
    } catch (e) { handleErr(e, 'createContacto'); }
  };

  const handleEditContacto = async (prospectoId, contactoId, patch) => {
    if (guardReadOnly()) return;
    try {
      await storage.updateContacto(contactoId, patch);

      // Reconstruir el contacto con el patch aplicado (para usarlo en sincronización)
      const prevState = state;
      const prospectAnterior = prevState.prospectos.find(x => x.id === prospectoId);
      if (!prospectAnterior) return;
      const contactosAct = (prospectAnterior.contactos || []).map(c => {
        if (c.id !== contactoId) return c;
        const merged = { ...c, ...patch };
        if ('agendadoPara' in patch) {
          merged.agendadoPara = patch.agendadoPara;
        } else if ('fecha' in patch || 'hora' in patch) {
          merged.agendadoPara = merged.fecha
            ? (merged.hora ? `${merged.fecha}T${merged.hora}` : merged.fecha)
            : null;
        }
        return merged;
      });
      const ultimo = contactosAct[contactosAct.length - 1];
      const proxNuevo = ultimo?.agendadoPara || null;
      const estadoNuevo = ultimo ? (tipoConfig(ultimo.tipo)?.estado || 'nuevo') : 'nuevo';

      setState(s => ({
        ...s,
        prospectos: s.prospectos.map(p => p.id === prospectoId
          ? { ...p, contactos: contactosAct, proximoContacto: proxNuevo, estado: estadoNuevo, updatedAt: new Date().toISOString() }
          : p)
      }));
      await storage.updateProspecto(prospectoId, { estado: estadoNuevo, proximoContacto: proxNuevo });

      // Si el contacto editado es el último (define el seguimiento vigente),
      // resincronizamos tarea/agenda con la versión nueva.
      const editadoEsUltimo = ultimo?.id === contactoId;
      if (editadoEsUltimo) {
        await sincronizarSeguimiento(prospectoId, ultimo, prevState);
      }

      showToast('Gestión actualizada');
    } catch (e) { handleErr(e, 'updateContacto'); }
  };

  const handleDeleteContacto = async (prospectoId, contactoId) => {
    if (guardReadOnly()) return;
    if (!confirm('¿Eliminar este registro de gestión?')) return;
    try {
      const prevState = state;
      const prospectAnterior = prevState.prospectos.find(x => x.id === prospectoId);
      if (!prospectAnterior) return;

      // Determinar si el contacto borrado era el último (define el seguimiento vigente)
      const contactosPrev = prospectAnterior.contactos || [];
      const eraUltimo = contactosPrev[contactosPrev.length - 1]?.id === contactoId;

      await storage.deleteContacto(contactoId);

      // Lista nueva de contactos + último nuevo
      const contactosNuevos = contactosPrev.filter(c => c.id !== contactoId);
      const nuevoUltimo = contactosNuevos[contactosNuevos.length - 1] || null;
      const proxNuevo = nuevoUltimo?.agendadoPara || null;
      const estadoNuevo = nuevoUltimo ? (tipoConfig(nuevoUltimo.tipo)?.estado || 'nuevo') : 'nuevo';

      setState(s => ({
        ...s,
        prospectos: s.prospectos.map(p => p.id === prospectoId
          ? { ...p, contactos: contactosNuevos, proximoContacto: proxNuevo, estado: estadoNuevo, updatedAt: new Date().toISOString() }
          : p)
      }));
      await storage.updateProspecto(prospectoId, { estado: estadoNuevo, proximoContacto: proxNuevo });

      // Si el contacto borrado era el último, resincronizamos tarea/agenda.
      // sincronizarSeguimiento con nuevoUltimo (puede ser null → solo limpia).
      if (eraUltimo) {
        await sincronizarSeguimiento(prospectoId, nuevoUltimo, prevState);
      }
    } catch (e) { handleErr(e, 'deleteContacto'); }
  };


  // ── TAREAS HANDLERS ──
  const handleAddTarea = async (columnaId, titulo = '') => {
    if (guardReadOnly()) return;
    try {
      const tarea = await storage.createTarea({ columnaId, titulo: titulo.trim() });
      setState(s => ({
        ...s,
        tareas: { ...s.tareas, items: [...s.tareas.items, tarea] }
      }));
    } catch (e) { handleErr(e, 'createTarea'); }
  };

  const handleMoveTarea = async (tareaId, nuevaColumnaId) => {
    if (guardReadOnly()) return;
    const tarea = state.tareas.items.find(t => t.id === tareaId);
    if (!tarea || tarea.columnaId === nuevaColumnaId) return;
    // Optimistic
    setState(s => ({
      ...s,
      tareas: {
        ...s.tareas,
        items: s.tareas.items.map(t => t.id === tareaId
          ? { ...t, columnaId: nuevaColumnaId, updatedAt: new Date().toISOString() }
          : t)
      }
    }));
    try {
      await storage.updateTarea(tareaId, { columnaId: nuevaColumnaId });
    } catch (e) {
      handleErr(e, 'moveTarea');
      // Rollback
      setState(s => ({
        ...s,
        tareas: {
          ...s.tareas,
          items: s.tareas.items.map(t => t.id === tareaId
            ? { ...t, columnaId: tarea.columnaId } : t)
        }
      }));
    }
  };

  const handleUpdateTarea = async (id, patch) => {
    if (guardReadOnly()) return;
    const prev = state.tareas.items.find(t => t.id === id);
    setState(s => ({
      ...s,
      tareas: {
        ...s.tareas,
        items: s.tareas.items.map(t => t.id === id
          ? { ...t, ...patch, updatedAt: new Date().toISOString() } : t)
      }
    }));
    try {
      await storage.updateTarea(id, patch);
    } catch (e) {
      handleErr(e, 'updateTarea');
      if (prev) setState(s => ({
        ...s,
        tareas: { ...s.tareas, items: s.tareas.items.map(t => t.id === id ? prev : t) }
      }));
    }
  };

  const handleDeleteTarea = async (id) => {
    if (guardReadOnly()) return;
    if (!confirm('¿Eliminar esta tarea?')) return;
    const prev = state.tareas.items;
    setState(s => ({ ...s, tareas: { ...s.tareas, items: s.tareas.items.filter(t => t.id !== id) } }));
    try {
      await storage.deleteTarea(id);
      setTareaEditando(null);
      showToast('Tarea eliminada');
    } catch (e) {
      handleErr(e, 'deleteTarea');
      setState(s => ({ ...s, tareas: { ...s.tareas, items: prev } }));
    }
  };

  const handleAddColumna = async () => {
    if (guardReadOnly()) return;
    const titulo = prompt('Nombre de la nueva columna:');
    if (!titulo || !titulo.trim()) return;
    try {
      const orden = state.tareas.columnas.length;
      const c = await storage.createColumna(titulo.trim(), orden);
      setState(s => ({
        ...s,
        tareas: { ...s.tareas, columnas: [...s.tareas.columnas, c] }
      }));
    } catch (e) { handleErr(e, 'createColumna'); }
  };

  const handleMoveColumna = async (columnaId, targetColumnaId, position) => {
    if (guardReadOnly()) return;
    if (columnaId === targetColumnaId) return;
    const prev = state.tareas.columnas;
    const ordenadas = [...prev].sort((a, b) => (a.orden ?? 999) - (b.orden ?? 999));
    const moving = ordenadas.find(c => c.id === columnaId);
    if (!moving) return;
    const sinMover = ordenadas.filter(c => c.id !== columnaId);
    const targetIdx = sinMover.findIndex(c => c.id === targetColumnaId);
    if (targetIdx === -1) return;
    const insertIdx = position === 'after' ? targetIdx + 1 : targetIdx;
    sinMover.splice(insertIdx, 0, moving);
    const nuevas = sinMover.map((c, i) => ({ ...c, orden: i }));
    setState(s => ({ ...s, tareas: { ...s.tareas, columnas: nuevas } }));
    try {
      for (const c of nuevas) {
        const previo = prev.find(p => p.id === c.id);
        if (previo && previo.orden !== c.orden) {
          await storage.updateColumna(c.id, { orden: c.orden });
        }
      }
    } catch (e) {
      handleErr(e, 'moveColumna');
      setState(s => ({ ...s, tareas: { ...s.tareas, columnas: prev } }));
    }
  };

  const handleRenameColumna = async (columnaId, nuevoTitulo) => {
    if (guardReadOnly()) return;
    if (!nuevoTitulo || !nuevoTitulo.trim()) return;
    const col = state.tareas.columnas.find(c => c.id === columnaId);
    if (col?.protegida) {
      showToast('La columna "Abordar" no se puede renombrar');
      return;
    }
    const prev = state.tareas.columnas;
    setState(s => ({
      ...s,
      tareas: {
        ...s.tareas,
        columnas: s.tareas.columnas.map(c => c.id === columnaId ? { ...c, titulo: nuevoTitulo.trim() } : c)
      }
    }));
    try {
      await storage.updateColumna(columnaId, { titulo: nuevoTitulo.trim() });
    } catch (e) {
      handleErr(e, 'renameColumna');
      setState(s => ({ ...s, tareas: { ...s.tareas, columnas: prev } }));
    }
  };

  const handleDeleteColumna = async (columnaId) => {
    if (guardReadOnly()) return;
    const col = state.tareas.columnas.find(c => c.id === columnaId);
    if (col?.protegida) {
      showToast('La columna "Abordar" no se puede eliminar');
      return;
    }
    const tareasEnCol = state.tareas.items.filter(t => t.columnaId === columnaId).length;
    let msg = '¿Eliminar esta columna?';
    if (tareasEnCol > 0) {
      msg = `Esta columna tiene ${tareasEnCol} tarea${tareasEnCol === 1 ? '' : 's'}. Si la eliminás, esas tareas también se eliminan. ¿Continuar?`;
    }
    if (!confirm(msg)) return;
    try {
      // El cascade del FK en DB borra las tareas asociadas
      await storage.deleteColumna(columnaId);
      setState(s => ({
        ...s,
        tareas: {
          ...s.tareas,
          columnas: s.tareas.columnas.filter(c => c.id !== columnaId),
          items: s.tareas.items.filter(t => t.columnaId !== columnaId)
        }
      }));
    } catch (e) { handleErr(e, 'deleteColumna'); }
  };

  const handleConvertirTareaAProspect = async (tareaId, nombre, apellido) => {
    if (guardReadOnly()) return;
    const tarea = state.tareas.items.find(t => t.id === tareaId);
    if (!tarea) return;
    const notasParts = [];
    if (tarea.titulo) notasParts.push(`Tarea original: ${tarea.titulo}`);
    if (tarea.observacion) notasParts.push(tarea.observacion);
    const observaciones = notasParts.join('\n\n');

    let proximoContacto = null;
    if (tarea.fechaRecordatorio) {
      proximoContacto = tarea.horaRecordatorio
        ? `${tarea.fechaRecordatorio}T${tarea.horaRecordatorio}:00`
        : tarea.fechaRecordatorio;
    }

    const nombreCompleto = `${(nombre || '').trim()} ${(apellido || '').trim()}`.trim();

    try {
      const prospect = await storage.createProspecto({
        nombre: nombreCompleto,
        observaciones,
        proximoContacto
      });
      await storage.deleteTarea(tareaId);
      setState(s => ({
        ...s,
        prospectos: [prospect, ...s.prospectos],
        tareas: { ...s.tareas, items: s.tareas.items.filter(t => t.id !== tareaId) }
      }));
      setTareaEditando(null);
      setConvertirTareaId(null);
      showToast('Prospecto creado desde tarea');
    } catch (e) { handleErr(e, 'convertirTarea'); }
  };

  const selectedProspecto = state.prospectos.find(p => p.id === selectedId) || null;

  const filtrados = useMemo(
    () => aplicarFiltros(state.prospectos, filterEstado, filterFecha),
    [state.prospectos, filterEstado, filterFecha]
  );
  const hayFiltros = filterEstado !== 'todos' || filterFecha !== 'todos';

  // Handler común para click en notifs y en buscador.
  // IMPORTANTE: declarado ANTES del early return de loading para no violar
  // Rules of Hooks (un useCallback debe llamarse siempre en el mismo orden).
  const handleNavToItem = useCallback((it) => {
    if (it.categoria === 'tarea' || it.tipo === 'tarea') {
      const t = state.tareas.items.find(x => x.id === it.tareaId);
      if (t) setTareaEditando(t);
    } else if (it.categoria === 'calendario' || it.tipo === 'agendado') {
      if (it.prospectoId) setSelectedId(it.prospectoId);
      else setView('calendario');
    } else if (it.categoria === 'lista' && it.prospectoId) {
      setSelectedId(it.prospectoId);
    }
  }, [state.tareas, state.prospectos]);

  if (loading) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 20px',color:'var(--texto-suave)'}}>
        <div className="login-spinner" style={{borderColor:'rgba(62,64,149,0.25)',borderRightColor:'transparent'}}></div>
        <div style={{marginLeft:14}}>Cargando datos…</div>
      </div>
    );
  }

  return (
    <>
      <HeaderActions
        user={user}
        agente={agente}
        viewAs={viewAs}
        onExitViewAs={onExitViewAs}
        onLogout={onLogout}
        onOpenSettings={() => setShowSettings(true)}
        notifCount={notifUrgentes}
        onToggleBell={() => setBellOpen(o => !o)}
      />
      <MountInSlot slotId="headerSearch">
        <BuscadorGlobal state={state} onClickItem={handleNavToItem} />
      </MountInSlot>
      {bellOpen && (
        <NotificacionesDropdown
          items={notificaciones}
          onClose={() => setBellOpen(false)}
          onClickItem={(it) => { setBellOpen(false); handleNavToItem(it); }}
        />
      )}
      {viewAs && (
        <div className="view-as-banner">
          <div>
            👁 Estás viendo Abordaje como <strong>{viewAs.display_name || viewAs.email}</strong>
            <span className="view-as-readonly"> · solo lectura</span>
          </div>
          <button className="view-as-exit-btn" onClick={onExitViewAs}>← Volver a tu vista</button>
        </div>
      )}

      <div className="main-head">
        <h1>{viewAs ? `Lista de ${viewAs.display_name || viewAs.email}` : 'Mi lista de abordaje'}</h1>
        <div className="main-head-actions">
          <button className="btn-export" onClick={() => exportarProspectosExcel(state.prospectos)} title="Descargar lista en Excel">
            Excel
          </button>
          <button className="btn-export" onClick={() => exportarProspectosPDF(state.prospectos, user)} title="Descargar lista en PDF">
            PDF
          </button>
          {!readOnly && (
            <button className="btn-primary" onClick={() => setShowAddModal(true)}>
              + Nuevo prospecto
            </button>
          )}
        </div>
      </div>

      <ViewTabs view={view} setView={setView} />

      {view === 'lista' && (
        state.prospectos.length === 0 ? (
          <EmptyState onAdd={() => setShowAddModal(true)} />
        ) : (
          <>
            <FilterBar
              filterEstado={filterEstado}
              setFilterEstado={setFilterEstado}
              filterFecha={filterFecha}
              setFilterFecha={setFilterFecha}
              mostrandoCount={filtrados.length}
              totalCount={state.prospectos.length}
            />
            {filtrados.length === 0 ? (
              <div className="empty">
                <div className="empty-title">Ningún prospecto coincide con los filtros</div>
                <div className="empty-text">Ajustá los filtros o limpiálos para ver toda la lista.</div>
                <button className="btn-secondary"
                  onClick={() => { setFilterEstado('todos'); setFilterFecha('todos'); }}>
                  Limpiar filtros
                </button>
              </div>
            ) : (
              <ProspectosTable prospectos={filtrados} onSelect={setSelectedId} />
            )}
          </>
        )
      )}

      {view === 'tareas' && (
        <TareasView
          tareasState={state.tareas}
          readOnly={readOnly}
          onAddTarea={handleAddTarea}
          onMoveTarea={handleMoveTarea}
          onEditarTarea={(t) => setTareaEditando(t)}
          onAddColumna={handleAddColumna}
          onRenameColumna={handleRenameColumna}
          onDeleteColumna={handleDeleteColumna}
          onMoveColumna={handleMoveColumna}
        />
      )}

      {view === 'calendario' && (
        <>
          <FilterBar
            filterEstado={filterEstado}
            setFilterEstado={setFilterEstado}
            filterFecha={filterFecha}
            setFilterFecha={setFilterFecha}
            mostrandoCount={filtrados.length}
            totalCount={state.prospectos.length}
          />
          <CalendarioView
            prospectos={filtrados}
            tareasState={state.tareas}
            settings={settings}
            onSelectProspecto={setSelectedId}
            onSelectTarea={(t) => setTareaEditando(t)}
          />
        </>
      )}

      {showAddModal && (
        <NuevoProspectoModal
          onCancel={() => setShowAddModal(false)}
          onSave={handleAdd}
        />
      )}

      {showSettings && (
        <SettingsModal
          settings={settings}
          agente={agente}
          currentUser={user}
          onViewAs={(p) => { onViewAs(p); setShowSettings(false); }}
          onCancel={() => setShowSettings(false)}
          onSave={(s) => { setSettings(s); persistSettings(s, user.id); showToast('Ajustes guardados'); }}
        />
      )}

      {tareaEditando && (
        <TareaModal
          tarea={tareaEditando}
          columnas={state.tareas.columnas}
          readOnly={readOnly}
          onClose={() => setTareaEditando(null)}
          onSave={(patch) => { handleUpdateTarea(tareaEditando.id, patch); setTareaEditando(null); }}
          onDelete={() => handleDeleteTarea(tareaEditando.id)}
          onConvertir={() => setConvertirTareaId(tareaEditando.id)}
        />
      )}

      {convertirTareaId && (() => {
        const t = state.tareas.items.find(x => x.id === convertirTareaId);
        if (!t) { setConvertirTareaId(null); return null; }
        return (
          <ConvertirTareaModal
            tarea={t}
            onCancel={() => setConvertirTareaId(null)}
            onConfirm={(nombre, apellido) => handleConvertirTareaAProspect(t.id, nombre, apellido)}
          />
        );
      })()}

      {selectedProspecto && (
        <PanelLateral
          prospecto={selectedProspecto}
          settings={settings}
          readOnly={readOnly}
          onClose={() => setSelectedId(null)}
          onUpdate={(patch) => upsertProspecto(selectedProspecto.id, patch)}
          onDelete={() => handleDelete(selectedProspecto.id)}
          onAddContacto={(c) => handleAddContacto(selectedProspecto.id, c)}
          onEditContacto={(cid, patch) => handleEditContacto(selectedProspecto.id, cid, patch)}
          onDeleteContacto={(cid) => handleDeleteContacto(selectedProspecto.id, cid)}
        />
      )}
    </>
  );
}

// ── HEADER ACTIONS (portal al header, con backup indicator + Ajustes) ─
function HeaderActions({ user, agente, viewAs, onExitViewAs, onLogout, onOpenSettings, notifCount, onToggleBell }) {
  const esAdmin = agente?.role === 'admin';
  const displayName = agente?.display_name || user?.email || '';
  const enViewAs = !!viewAs;
  useEffect(() => {
    const target = document.getElementById('headerActions');
    if (!target) return;
    target.innerHTML = '';
    const mk = (txt, title, fn) => {
      const b = document.createElement('button');
      b.className = 'header-btn';
      b.textContent = txt;
      b.title = title;
      b.onclick = fn;
      return b;
    };
    // Campanita primero (visible para todos los users) — SVG vectorial blanco.
    // Uso createElementNS para garantizar el namespace correcto (innerHTML con
    // SVG inline a veces no renderiza porque parsea los <path> como HTML).
    if (onToggleBell) {
      const bell = document.createElement('button');
      bell.className = 'bell-btn';
      bell.title = notifCount > 0 ? `${notifCount} evento${notifCount === 1 ? '' : 's'} urgente${notifCount === 1 ? '' : 's'}` : 'Notificaciones';
      bell.onclick = onToggleBell;

      const SVG_NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(SVG_NS, 'svg');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'white');
      svg.setAttribute('stroke-width', '2');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      svg.setAttribute('width', '18');
      svg.setAttribute('height', '18');
      const p1 = document.createElementNS(SVG_NS, 'path');
      p1.setAttribute('d', 'M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9');
      const p2 = document.createElementNS(SVG_NS, 'path');
      p2.setAttribute('d', 'M13.73 21a2 2 0 0 1-3.46 0');
      svg.appendChild(p1);
      svg.appendChild(p2);
      bell.appendChild(svg);

      if (notifCount > 0) {
        const badge = document.createElement('span');
        badge.className = 'bell-badge';
        badge.textContent = notifCount > 9 ? '9+' : String(notifCount);
        bell.appendChild(badge);
      }
      target.appendChild(bell);
    }
    target.appendChild(mk('Ajustes', esAdmin ? 'Configuración y gestión de usuarios' : 'Configurar horario y vista', onOpenSettings));
    if (user) {
      const sep = document.createElement('div');
      sep.style.cssText = 'width:1px;height:22px;background:rgba(255,255,255,0.18);margin:0 4px;';
      target.appendChild(sep);
      if (esAdmin) {
        const badge = document.createElement('span');
        badge.className = 'header-admin-badge';
        badge.textContent = 'ADMIN';
        target.appendChild(badge);
      }
      const u = document.createElement('div');
      u.className = 'header-user';
      u.textContent = displayName;
      u.title = user.email;
      target.appendChild(u);
      target.appendChild(mk('Salir', 'Cerrar sesión', onLogout));
    }
  }, [user, esAdmin, displayName, notifCount, onLogout, onOpenSettings, onToggleBell]);
  return null;
}

// ── EMPTY STATE ────────────────────────────────────────────────
function EmptyState({ onAdd }) {
  return (
    <div className="empty">
      <div className="empty-icon">+</div>
      <div className="empty-title">Tu lista de abordaje está vacía</div>
      <div className="empty-text">
        Agregá el primer prospecto para empezar a planificar tus contactos de la semana.
      </div>
      <button className="btn-primary" onClick={onAdd}>+ Nuevo prospecto</button>
    </div>
  );
}

// ── FILTER BAR ─────────────────────────────────────────────────
function FilterBar({ filterEstado, setFilterEstado, filterFecha, setFilterFecha, mostrandoCount, totalCount }) {
  const hayFiltros = filterEstado !== 'todos' || filterFecha !== 'todos';
  return (
    <div className="filter-bar">
      <div className="filter-group">
        <label>Estado</label>
        <select value={filterEstado} onChange={e => setFilterEstado(e.target.value)}>
          <option value="todos">Todos</option>
          <option value="nuevo">Nuevos</option>
          <option value="pendiente">En gestión</option>
          <option value="programado">Programados</option>
          <option value="agendado">Agendados</option>
          <option value="rechazado">Rechazados</option>
        </select>
      </div>
      <div className="filter-group">
        <label>Próximo contacto</label>
        <select value={filterFecha} onChange={e => setFilterFecha(e.target.value)}>
          <option value="todos">Cualquier momento</option>
          <option value="vencidos">Vencidos</option>
          <option value="hoy">Hoy</option>
          <option value="semana">Próximos 7 días</option>
          <option value="sin_fecha">Sin fecha</option>
        </select>
      </div>
      {hayFiltros && (
        <button className="btn-mini"
          onClick={() => { setFilterEstado('todos'); setFilterFecha('todos'); }}>
          Limpiar
        </button>
      )}
      <div className="filter-count">
        {hayFiltros ? `Mostrando ${mostrandoCount} de ${totalCount}` : `${totalCount} ${totalCount === 1 ? 'prospecto' : 'prospectos'}`}
      </div>
    </div>
  );
}

// ── TABLA ──────────────────────────────────────────────────────
function ProspectosTable({ prospectos, onSelect }) {
  return (
    <div className="table-wrap">
      <table className="prospectos">
        <colgroup>
          <col />
          <col className="col-w-tel" />
          <col className="col-w-estado" />
          <col />
          <col className="col-w-referente" />
          <col className="col-w-pref" />
        </colgroup>
        <thead>
          <tr>
            <th>Nombre</th>
            <th className="col-telefono">Teléfono</th>
            <th>Estado</th>
            <th>Último contacto / Observación</th>
            <th className="col-referente">Referente</th>
            <th className="col-pref">Pref.</th>
          </tr>
        </thead>
        <tbody>
          {prospectos.map(p => (
            <FilaProspecto key={p.id} prospecto={p} onClick={() => onSelect(p.id)} />
          ))}
        </tbody>
      </table>
    </div>
  );
}

function FilaProspecto({ prospecto, onClick }) {
  const estado = deriveEstado(prospecto);
  const meta = ESTADO_META[estado];
  return (
    <tr className={`fila-clickeable ${meta.tint}`} onClick={onClick}>
      <td className="col-nombre">
        {prospecto.nombre || <em style={{color:'var(--texto-suave)',fontWeight:400}}>(sin nombre)</em>}
      </td>
      <td className="col-telefono">{prospecto.telefono || '—'}</td>
      <td className="estado-cell"><BadgeEstado prospecto={prospecto} /></td>
      <td><TimelineCell contactos={prospecto.contactos || []} /></td>
      <td className="col-referente">{prospecto.referente || <span style={{color:'var(--texto-suave)'}}>—</span>}</td>
      <td className="col-pref">
        {prospecto.preferenciaContacto
          ? <span className="badge-pref">{prospecto.preferenciaContacto}</span>
          : <span style={{color:'var(--texto-suave)'}}>—</span>
        }
      </td>
    </tr>
  );
}

// ── BADGE ESTADO ───────────────────────────────────────────────
function BadgeEstado({ prospecto }) {
  const estado = deriveEstado(prospecto);
  const meta = ESTADO_META[estado];
  const proximo = describeProximo(prospecto.proximoContacto);
  const subClass = proximo.urgencia === 'pasado' ? 'urgente'
                  : proximo.urgencia === 'hoy' ? 'hoy' : '';
  return (
    <div className="estado-badge-wrap">
      <span className="estado-badge" style={{ color: meta.color, background: meta.bg }}>
        {meta.label}
      </span>
      {proximo.texto && (
        <span className={`estado-subtxt ${subClass}`}>{proximo.texto}</span>
      )}
    </div>
  );
}

// ── TIMELINE CELL ──────────────────────────────────────────────
function TimelineCell({ contactos }) {
  if (!contactos || contactos.length === 0) {
    return <span className="timeline-vacio">Sin contactos aún</span>;
  }
  const ultimos = [...contactos].reverse().slice(0, 3);
  const restantes = contactos.length - ultimos.length;
  return (
    <div className="timeline-cell">
      {ultimos.map((c, i) => {
        const cfg = tipoConfig(c.tipo);
        const fechaReg = c.createdAt || c.fecha;
        const tooltipObj = c.tipo === 'agendado' ? 'Cita' : 'Próximo contacto';
        return (
          <div key={c.id} className="timeline-row" style={{ marginLeft: i * 14 + 'px' }}>
            <span className="timeline-fecha-reg" title="Registrado el">{formatFechaCorta(fechaReg)}</span>
            <span className="chip" style={{color: cfg?.color, background: cfg?.bg}}>
              {cfg?.label || c.tipo}
            </span>
            {c.agendadoPara && (
              <span className="timeline-fecha-obj" title={tooltipObj}>{formatFechaHora(c.agendadoPara)}</span>
            )}
            {c.observacion && (
              <span className="timeline-obs" title={c.observacion}>{c.observacion}</span>
            )}
          </div>
        );
      })}
      {restantes > 0 && (
        <div className="timeline-mas">… y {restantes} {restantes === 1 ? 'gestión más' : 'gestiones más'}</div>
      )}
    </div>
  );
}

// ── PANEL LATERAL (gestión arriba, datos abajo, historial abajo) ─
function PanelLateral({ prospecto, settings, readOnly, onClose, onUpdate, onDelete, onAddContacto, onEditContacto, onDeleteContacto }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  return (
    <div className="panel-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="panel-side" role="dialog" aria-modal="true">
        <div className="panel-header">
          <h2>{prospecto.nombre || '(sin nombre)'}</h2>
          <button className="panel-close" onClick={onClose} aria-label="Cerrar">×</button>
        </div>

        {!readOnly && (
          <div className="panel-section">
            <h4>Registrar gestión</h4>
            <RegistrarGestion onSubmit={onAddContacto} settings={settings} />
          </div>
        )}

        <div className="panel-section">
          <h4>Historial de gestiones</h4>
          <HistorialList
            contactos={prospecto.contactos || []}
            settings={settings}
            readOnly={readOnly}
            onEdit={onEditContacto}
            onDelete={onDeleteContacto}
          />
        </div>

        <div className="panel-section">
          <h4>Datos del prospecto</h4>
          <FieldsProspecto prospecto={prospecto} readOnly={readOnly} onUpdate={onUpdate} />
        </div>

        {!readOnly && (
          <div className="panel-section" style={{display:'flex', justifyContent:'flex-end'}}>
            <button className="btn-danger" onClick={onDelete}>Eliminar prospecto</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── FIELDS PROSPECTO (autosave on blur) ────────────────────────
function FieldsProspecto({ prospecto, readOnly, onUpdate }) {
  const [draft, setDraft] = useState({
    nombre: prospecto.nombre || '',
    telefono: prospecto.telefono || '',
    preferenciaContacto: prospecto.preferenciaContacto || '',
    detalle: prospecto.detalle || '',
    referente: prospecto.referente || '',
    observaciones: prospecto.observaciones || ''
  });

  useEffect(() => {
    setDraft({
      nombre: prospecto.nombre || '',
      telefono: prospecto.telefono || '',
      preferenciaContacto: prospecto.preferenciaContacto || '',
      detalle: prospecto.detalle || '',
      referente: prospecto.referente || '',
      observaciones: prospecto.observaciones || ''
    });
  }, [prospecto.id]);

  const upd = (k, v) => setDraft(d => ({...d, [k]: v}));
  const commit = (k) => { if (draft[k] !== prospecto[k]) onUpdate({ [k]: draft[k] }); };

  return (
    <div>
      <div className="field-inline">
        <label>Nombre</label>
        <input type="text" value={draft.nombre} readOnly={readOnly}
          onChange={e => upd('nombre', e.target.value)}
          onBlur={() => commit('nombre')} />
      </div>
      <div className="field-inline-row">
        <div className="field-inline">
          <label>Teléfono</label>
          <input type="tel" value={draft.telefono} readOnly={readOnly}
            onChange={e => upd('telefono', e.target.value)}
            onBlur={() => commit('telefono')} />
        </div>
        <div className="field-inline">
          <label>Preferencia</label>
          <select value={draft.preferenciaContacto} disabled={readOnly}
            onChange={e => { upd('preferenciaContacto', e.target.value); setTimeout(() => onUpdate({ preferenciaContacto: e.target.value }), 0); }}>
            <option value="">— Seleccionar —</option>
            {PREFS_CONTACTO.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
        </div>
      </div>
      <div className="field-inline">
        <label>Detalle</label>
        <input type="text" value={draft.detalle} readOnly={readOnly}
          onChange={e => upd('detalle', e.target.value)}
          onBlur={() => commit('detalle')} />
      </div>
      <div className="field-inline">
        <label>Referente</label>
        <input type="text" value={draft.referente} readOnly={readOnly}
          onChange={e => upd('referente', e.target.value)}
          onBlur={() => commit('referente')} />
      </div>
      <div className="field-inline">
        <label>Observaciones generales</label>
        <textarea value={draft.observaciones} readOnly={readOnly}
          onChange={e => upd('observaciones', e.target.value)}
          onBlur={() => commit('observaciones')} />
      </div>
    </div>
  );
}

// ── REGISTRAR GESTIÓN (autofill fecha/hora, inputs flexibles) ──
function RegistrarGestion({ onSubmit, settings }) {
  const defaultDur = settings?.slotDurationMin || 60;
  const [tipoSel, setTipoSel] = useState(null);
  const [observacion, setObservacion] = useState('');
  const [fechaIso, setFechaIso] = useState('');
  const [hora, setHora] = useState('');
  const [cantidad, setCantidad] = useState(1);
  const [unidad, setUnidad] = useState('horas');
  const [duracionMin, setDuracionMin] = useState(defaultDur);

  const cfg = tipoSel ? tipoConfig(tipoSel) : null;

  const reset = () => {
    setTipoSel(null);
    setObservacion('');
    setFechaIso(''); setHora('');
    setCantidad(1); setUnidad('horas');
    setDuracionMin(defaultDur);
  };

  const onTipoClick = (id) => {
    if (tipoSel === id) { reset(); return; }
    setTipoSel(id);
    setObservacion('');
    const c = tipoConfig(id);
    const today = new Date();
    if (c.input === 'fecha' || c.input === 'fechahora') {
      setFechaIso(dateToYMD(today));
    } else {
      setFechaIso('');
    }
    if (c.input === 'fechahora') {
      setHora(`${pad2(today.getHours())}:${pad2(today.getMinutes())}`);
      setDuracionMin(defaultDur);
    } else {
      setHora('');
    }
  };

  const confirmar = () => {
    let agendadoPara = null;
    let extraDur = null;
    if (cfg.input === 'plazo') {
      const d = new Date();
      const n = parseInt(cantidad, 10) || 0;
      if (unidad === 'minutos') d.setMinutes(d.getMinutes() + n);
      else if (unidad === 'horas') d.setHours(d.getHours() + n);
      else if (unidad === 'dias') d.setDate(d.getDate() + n);
      agendadoPara = d.toISOString();
    } else if (cfg.input === 'fecha') {
      if (!fechaIso) { alert('Falta la fecha'); return; }
      agendadoPara = new Date(fechaIso + 'T10:00:00').toISOString();
    } else if (cfg.input === 'fechahora') {
      if (!fechaIso) { alert('Falta la fecha'); return; }
      if (!hora) { alert('Falta la hora'); return; }
      agendadoPara = new Date(fechaIso + 'T' + hora + ':00').toISOString();
      extraDur = parseInt(duracionMin, 10) || defaultDur;
    } else {
      agendadoPara = calcAgendadoPara(tipoSel, null);
    }
    const payload = {
      fecha: new Date().toISOString(),
      tipo: tipoSel,
      observacion: observacion.trim(),
      agendadoPara
    };
    if (extraDur != null) payload.duracionMin = extraDur;
    onSubmit(payload);
    reset();
  };

  return (
    <div>
      <div className="tipos-grid">
        {TIPOS_CONTACTO.map(t => {
          const selected = tipoSel === t.id;
          return (
            <button
              key={t.id}
              className="tipo-button"
              onClick={() => onTipoClick(t.id)}
              style={{
                borderColor: t.color,
                color: t.color,
                background: selected ? t.bg : 'white'
              }}
            >
              {t.label}
            </button>
          );
        })}
      </div>

      {cfg && (
        <div className="gestion-form">
          <div className="gestion-form-title">
            <span>Confirmar gestión:</span>
            <span className="chip" style={{
              color: cfg.color, background: cfg.bg,
              padding:'3px 10px', borderRadius:10, fontSize:'0.7rem',
              fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px'
            }}>{cfg.label}</span>
          </div>

          {cfg.input === 'plazo' && (
            <div className="field-inline-row">
              <div className="field-inline">
                <label>Cantidad</label>
                <input type="number" min="1" value={cantidad}
                  onChange={e => setCantidad(e.target.value)} />
              </div>
              <div className="field-inline">
                <label>Unidad</label>
                <select value={unidad} onChange={e => setUnidad(e.target.value)}>
                  <option value="minutos">Minutos</option>
                  <option value="horas">Horas</option>
                  <option value="dias">Días</option>
                </select>
              </div>
            </div>
          )}

          {cfg.input === 'fecha' && (
            <div className="field-inline">
              <label>Fecha exacta para llamar</label>
              <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
            </div>
          )}

          {cfg.input === 'fechahora' && (
            <>
              <div className="field-inline-row">
                <div className="field-inline">
                  <label>Fecha</label>
                  <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
                </div>
                <div className="field-inline">
                  <label>Hora (24h)</label>
                  <HoraTexto value={hora} onChange={setHora} />
                </div>
              </div>
              <div className="field-inline">
                <label>Duración (minutos)</label>
                <input type="number" min="15" step="15" value={duracionMin}
                  onChange={e => setDuracionMin(e.target.value)} />
              </div>
            </>
          )}

          <div className="field-inline">
            <label>Observación (opcional)</label>
            <textarea value={observacion}
              onChange={e => setObservacion(e.target.value)}
              placeholder="Notas de esta llamada..." />
          </div>

          <div className="actions">
            <button className="btn-mini" onClick={reset}>Cancelar</button>
            <button className="btn-mini primary" onClick={confirmar}>Registrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── HISTORIAL ──────────────────────────────────────────────────
function HistorialList({ contactos, settings, readOnly, onEdit, onDelete }) {
  if (!contactos || contactos.length === 0) {
    return <div className="historial-vacio">Sin gestiones registradas todavía.</div>;
  }
  const ordenados = [...contactos].reverse();
  return (
    <div className="historial-list">
      {ordenados.map(c => (
        <HistorialItem key={c.id} contacto={c} settings={settings} readOnly={readOnly}
          onSave={(patch) => onEdit(c.id, patch)}
          onDelete={() => onDelete(c.id)} />
      ))}
    </div>
  );
}

function HistorialItem({ contacto, settings, readOnly, onSave, onDelete }) {
  const [editing, setEditing] = useState(false);
  const cfg = tipoConfig(contacto.tipo);

  if (editing) {
    return (
      <HistorialEditForm
        contacto={contacto}
        settings={settings}
        onSave={(patch) => { onSave(patch); setEditing(false); }}
        onCancel={() => setEditing(false)}
      />
    );
  }

  const fechaRegistro = contacto.createdAt || contacto.fecha;
  const tooltipObj = contacto.tipo === 'agendado' ? 'Cita' : 'Próximo contacto';

  return (
    <div className="historial-item">
      <div className="historial-row">
        <span className="hist-fecha-reg" title="Registrado el">{formatFechaCorta(fechaRegistro)}</span>
        <span className="chip" style={{
          color: cfg?.color, background: cfg?.bg,
          padding: '3px 10px', borderRadius: 10, fontSize: '0.7rem',
          fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.3px'
        }}>
          {cfg?.label || contacto.tipo}
        </span>
        {contacto.agendadoPara && (
          <span className="hist-fecha-obj" title={tooltipObj}>
            {formatFechaHora(contacto.agendadoPara)}
          </span>
        )}
        {contacto.observacion && (
          <span className="hist-obs" title={contacto.observacion}>{contacto.observacion}</span>
        )}
        {!readOnly && (
          <>
            <button className="btn-edit-mini" onClick={() => setEditing(true)}>Editar</button>
            <button className="btn-hist-del" onClick={onDelete} title="Eliminar este registro">×</button>
          </>
        )}
      </div>
    </div>
  );
}

function HistorialEditForm({ contacto, settings, onSave, onCancel }) {
  const cfg = tipoConfig(contacto.tipo);
  const hasAgendado = !!contacto.agendadoPara;
  const hasHora = cfg && cfg.input === 'fechahora';
  const defaultDur = settings?.slotDurationMin || 60;

  const [observacion, setObservacion] = useState(contacto.observacion || '');
  const initialFecha = hasAgendado ? new Date(contacto.agendadoPara) : null;
  const [fechaIso, setFechaIso] = useState(initialFecha ? dateToYMD(initialFecha) : '');
  const [hora, setHora] = useState(initialFecha && hasHora
    ? `${pad2(initialFecha.getHours())}:${pad2(initialFecha.getMinutes())}` : '');
  const [duracionMin, setDuracionMin] = useState(contacto.duracionMin || defaultDur);

  const save = () => {
    const patch = { observacion: observacion.trim() };
    if (hasAgendado) {
      if (!fechaIso) { alert('Falta la fecha'); return; }
      if (hasHora) {
        if (!hora) { alert('Falta la hora'); return; }
        patch.agendadoPara = new Date(fechaIso + 'T' + hora + ':00').toISOString();
        patch.duracionMin = parseInt(duracionMin, 10) || defaultDur;
      } else {
        // Días completos sin hora específica → default 09:00
        patch.agendadoPara = new Date(fechaIso + 'T09:00:00').toISOString();
      }
      // Si la fecha cambió respecto al original, la etiqueta original ya no aplica.
      // Convertimos automáticamente a "fecha_exacta" (salvo que ya sea agendado, que mantiene tipo).
      const cambioFecha = patch.agendadoPara !== contacto.agendadoPara;
      if (cambioFecha && contacto.tipo !== 'agendado' && contacto.tipo !== 'fecha_exacta') {
        patch.tipo = 'fecha_exacta';
      }
    }
    onSave(patch);
  };

  return (
    <div className="historial-edit-form">
      <div className="historial-edit-tipo">
        <span>Editando:</span>
        <span className="chip" style={{
          color: cfg?.color, background: cfg?.bg,
          padding:'3px 10px', borderRadius:10, fontSize:'0.7rem',
          fontWeight:700, textTransform:'uppercase', letterSpacing:'0.3px'
        }}>{cfg?.label}</span>
        <span style={{marginLeft:'auto', fontSize:'0.74rem', color:'var(--texto-suave)'}}>
          registrada {formatFechaHora(contacto.fecha)}
        </span>
      </div>

      {hasAgendado && (
        hasHora ? (
          <>
            <div className="field-inline-row">
              <div className="field-inline">
                <label>Fecha del agendamiento</label>
                <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
              </div>
              <div className="field-inline">
                <label>Hora (24h)</label>
                <HoraTexto value={hora} onChange={setHora} />
              </div>
            </div>
            <div className="field-inline">
              <label>Duración (minutos)</label>
              <input type="number" min="15" step="15" value={duracionMin}
                onChange={e => setDuracionMin(e.target.value)} />
            </div>
          </>
        ) : (
          <div className="field-inline">
            <label>Fecha del próximo contacto</label>
            <FechaTexto valueIso={fechaIso} onChange={setFechaIso} />
          </div>
        )
      )}

      <div className="field-inline">
        <label>Observación</label>
        <textarea value={observacion}
          onChange={e => setObservacion(e.target.value)} />
      </div>

      <div className="actions">
        <button className="btn-mini" onClick={onCancel}>Cancelar</button>
        <button className="btn-mini primary" onClick={save}>Guardar</button>
      </div>
    </div>
  );
}

// ── MODAL NUEVO PROSPECTO ──────────────────────────────────────
function NuevoProspectoModal({ onCancel, onSave }) {
  const [form, setForm] = useState({
    nombre: '', telefono: '', preferenciaContacto: '',
    detalle: '', referente: '', observaciones: ''
  });
  const [errors, setErrors] = useState({});

  const upd = (k, v) => setForm(f => ({...f, [k]: v}));

  const submit = () => {
    const errs = {};
    if (!form.nombre.trim()) errs.nombre = 'Ingresá un nombre';
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    onSave({
      nombre: form.nombre.trim(),
      telefono: form.telefono.trim(),
      preferenciaContacto: form.preferenciaContacto,
      detalle: form.detalle.trim(),
      referente: form.referente.trim(),
      observaciones: form.observaciones.trim()
    });
  };

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true">
        <div className="modal-header">
          <h3>Nuevo prospecto</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>Nombre <span className="req">*</span></label>
            <input type="text" value={form.nombre}
              onChange={e => upd('nombre', e.target.value)}
              placeholder="Ej: Juan Pérez" autoFocus />
            {errors.nombre && <div className="field-error">{errors.nombre}</div>}
          </div>
          <div className="field-row">
            <div className="field">
              <label>Teléfono</label>
              <input type="tel" value={form.telefono}
                onChange={e => upd('telefono', e.target.value)}
                placeholder="+54 11 ..." />
            </div>
            <div className="field">
              <label>Preferencia de contacto</label>
              <select value={form.preferenciaContacto}
                onChange={e => upd('preferenciaContacto', e.target.value)}>
                <option value="">— Seleccionar —</option>
                {PREFS_CONTACTO.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
          </div>
          <div className="field">
            <label>Detalle</label>
            <input type="text" value={form.detalle}
              onChange={e => upd('detalle', e.target.value)}
              placeholder="Ej: Empresario, 45 años, casado" />
          </div>
          <div className="field">
            <label>Referente</label>
            <input type="text" value={form.referente}
              onChange={e => upd('referente', e.target.value)}
              placeholder="¿Quién lo refirió?" />
          </div>
          <div className="field">
            <label>Observaciones</label>
            <textarea value={form.observaciones}
              onChange={e => upd('observaciones', e.target.value)}
              placeholder="Notas iniciales que tengas del prospecto..." />
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
          <button className="btn-primary" onClick={submit}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ── VIEW TABS (Lista | Calendario) ────────────────────────────
function ViewTabs({ view, setView }) {
  return (
    <div className="view-tabs">
      <button className={`view-tab ${view === 'lista' ? 'active' : ''}`}
        onClick={() => setView('lista')}>Lista abordaje</button>
      <button className={`view-tab ${view === 'tareas' ? 'active' : ''}`}
        onClick={() => setView('tareas')}>Tareas</button>
      <button className={`view-tab ${view === 'calendario' ? 'active' : ''}`}
        onClick={() => setView('calendario')}>Calendario</button>
    </div>
  );
}

// ── CALENDARIO HELPERS ────────────────────────────────────────
const NOMBRES_MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DOW_CORTOS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
}
function isToday(d) { return isSameDay(d, new Date()); }

// Devuelve la grilla del mes: array de 35-42 celdas con { date, outOfMonth }
function buildMonthGrid(year, month) {
  const first = new Date(year, month, 1);
  // offset del lunes: 0=Lun, 1=Mar, ..., 6=Dom
  const offset = (first.getDay() + 6) % 7;
  const lastDay = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = offset; i > 0; i--) {
    cells.push({ date: new Date(year, month, 1 - i), outOfMonth: true });
  }
  for (let i = 1; i <= lastDay; i++) {
    cells.push({ date: new Date(year, month, i), outOfMonth: false });
  }
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1].date;
    const d = new Date(last); d.setDate(d.getDate() + 1);
    cells.push({ date: d, outOfMonth: true });
  }
  return cells;
}

// Extrae eventos de los prospectos (uno por prospecto si tiene proximoContacto y no está rechazado)
function extractCalendarEvents(prospectos, tareasState) {
  const events = [];
  // Eventos de prospectos (proximoContacto)
  for (const p of prospectos) {
    if (!p.proximoContacto) continue;
    if (deriveEstado(p) === 'rechazado') continue;
    const ultimoAgendado = [...(p.contactos || [])].reverse().find(c => c.agendadoPara);
    events.push({
      id: p.id + '_proximo',
      kind: 'prospecto',
      prospectoId: p.id,
      label: p.nombre || '(sin nombre)',
      prospectoNombre: p.nombre || '(sin nombre)',
      fecha: p.proximoContacto,
      tipo: ultimoAgendado?.tipo || 'agendado',
      observacion: ultimoAgendado?.observacion || '',
      duracionMin: ultimoAgendado?.duracionMin || null
    });
  }
  // Eventos de tareas (con fechaRecordatorio)
  if (tareasState && Array.isArray(tareasState.items)) {
    for (const t of tareasState.items) {
      if (!t.fechaRecordatorio) continue;
      const fechaIso = t.horaRecordatorio
        ? `${t.fechaRecordatorio}T${t.horaRecordatorio}:00`
        : `${t.fechaRecordatorio}T09:00:00`;  // sin hora → 9:00 default para que aparezca en grid de horas
      events.push({
        id: t.id + '_tarea',
        kind: 'tarea',
        tareaData: t,
        label: t.titulo || '(tarea sin título)',
        fecha: fechaIso,
        observacion: t.observacion || '',
        duracionMin: null,
      });
    }
  }
  return events.sort((a, b) => a.fecha.localeCompare(b.fecha));
}

// Lunes como inicio de semana
function startOfWeek(d) {
  const x = new Date(d); x.setHours(0,0,0,0);
  const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow);
  return x;
}
function addDays(d, n) {
  const x = new Date(d); x.setDate(x.getDate() + n); return x;
}

function eventsByDayKey(events) {
  const m = {};
  for (const e of events) {
    const d = new Date(e.fecha);
    const key = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    if (!m[key]) m[key] = [];
    m[key].push(e);
  }
  return m;
}

function dayKey(date) {
  return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`;
}

function formatHHMM(iso) {
  const d = new Date(iso);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function formatLargeDate(d) {
  const dow = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][d.getDay()];
  return `${dow} ${d.getDate()} de ${NOMBRES_MES[d.getMonth()]}`;
}

// ── CALENDARIO VIEW ───────────────────────────────────────────
function CalendarioView({ prospectos, tareasState, settings, onSelectProspecto, onSelectTarea }) {
  const [mode, setMode] = useState('mes'); // 'mes' | 'semana' | 'hoy'
  const [cursor, setCursor] = useState(() => {
    const d = new Date(); d.setHours(0,0,0,0); return d;
  });
  const [selectedDay, setSelectedDay] = useState(null);

  const events = useMemo(() => extractCalendarEvents(prospectos, tareasState), [prospectos, tareasState]);
  const eventsByKey = useMemo(() => eventsByDayKey(events), [events]);

  // Dispatcher: cada evento del calendario sabe a dónde abre cuando se clickea.
  const onSelectEvent = useCallback((e) => {
    if (e.kind === 'tarea' && onSelectTarea) onSelectTarea(e.tareaData);
    else if (onSelectProspecto) onSelectProspecto(e.prospectoId);
  }, [onSelectProspecto, onSelectTarea]);

  // Cuando cambia el mode, ajustar cursor a un anchor sensato
  useEffect(() => {
    if (mode === 'mes') {
      const d = new Date(cursor); d.setDate(1); setCursor(d);
    } else if (mode === 'semana') {
      setCursor(startOfWeek(cursor));
    } else if (mode === 'hoy') {
      const d = new Date(); d.setHours(0,0,0,0); setCursor(d);
    }
    setSelectedDay(null);
  }, [mode]);

  const goPrev = () => {
    const d = new Date(cursor);
    if (mode === 'mes') d.setMonth(d.getMonth() - 1);
    else if (mode === 'semana') d.setDate(d.getDate() - 7);
    else if (mode === 'hoy') d.setDate(d.getDate() - 1);
    setCursor(d); setSelectedDay(null);
  };
  const goNext = () => {
    const d = new Date(cursor);
    if (mode === 'mes') d.setMonth(d.getMonth() + 1);
    else if (mode === 'semana') d.setDate(d.getDate() + 7);
    else if (mode === 'hoy') d.setDate(d.getDate() + 1);
    setCursor(d); setSelectedDay(null);
  };
  const goToday = () => {
    if (mode === 'mes') {
      const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); setCursor(d);
      setSelectedDay(dayKey(new Date()));
    } else if (mode === 'semana') {
      setCursor(startOfWeek(new Date()));
      setSelectedDay(null);
    } else {
      const d = new Date(); d.setHours(0,0,0,0); setCursor(d);
      setSelectedDay(null);
    }
  };

  // Saltar a un mes/año específico desde el picker del título
  const jumpTo = (year, month) => {
    const d = new Date(year, month, 1); d.setHours(0,0,0,0);
    if (mode === 'mes') setCursor(d);
    else if (mode === 'semana') setCursor(startOfWeek(d));
    else { const t = new Date(year, month, 1); t.setHours(0,0,0,0); setCursor(t); }
    setSelectedDay(null);
  };

  const subTabs = (
    <div className="cal-sub-tabs">
      <button className={`cal-sub-tab ${mode==='mes'?'active':''}`} onClick={() => setMode('mes')}>Mes</button>
      <button className={`cal-sub-tab ${mode==='semana'?'active':''}`} onClick={() => setMode('semana')}>Semana</button>
      <button className={`cal-sub-tab ${mode==='hoy'?'active':''}`} onClick={() => setMode('hoy')}>Hoy</button>
    </div>
  );

  if (mode === 'mes') {
    return <MonthCalendar
      cursor={cursor}
      events={events}
      eventsByKey={eventsByKey}
      selectedDay={selectedDay}
      setSelectedDay={setSelectedDay}
      onSelectEvent={onSelectEvent}
      goPrev={goPrev} goNext={goNext} goToday={goToday}
      onJumpTo={jumpTo}
      subTabs={subTabs}
    />;
  }
  if (mode === 'semana') {
    return <WeekCalendar
      anchorDate={cursor}
      events={events}
      settings={settings}
      onSelectEvent={onSelectEvent}
      goPrev={goPrev} goNext={goNext} goToday={goToday}
      onJumpTo={jumpTo}
      subTabs={subTabs}
      ndays={settings.includeWeekends ? 7 : 5}
    />;
  }
  // mode === 'hoy'
  return <WeekCalendar
    anchorDate={cursor}
    events={events}
    settings={settings}
    onSelectEvent={onSelectEvent}
    goPrev={goPrev} goNext={goNext} goToday={goToday}
    onJumpTo={jumpTo}
    subTabs={subTabs}
    ndays={1}
    singleDay={true}
  />;
}

// ── MONTH/YEAR PICKER (popover en título del calendario) ─────
function MonthYearPicker({ year, month, onPick, onClose }) {
  const [picYear, setPicYear] = useState(year);
  useEffect(() => {
    const onDocClick = (e) => {
      if (!e.target.closest('.myp-pop, .cal-title.clickable')) onClose();
    };
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    setTimeout(() => document.addEventListener('mousedown', onDocClick), 0);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDocClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [onClose]);
  return (
    <div className="myp-pop">
      <div className="myp-year">
        <button className="myp-year-btn" onClick={() => setPicYear(y => y - 1)}>‹</button>
        <input type="number" value={picYear}
          onChange={e => setPicYear(parseInt(e.target.value, 10) || picYear)} />
        <button className="myp-year-btn" onClick={() => setPicYear(y => y + 1)}>›</button>
      </div>
      <div className="myp-months">
        {NOMBRES_MES.map((m, idx) => (
          <button key={idx}
            className={`myp-month ${idx === month && picYear === year ? 'active' : ''}`}
            onClick={() => { onPick(picYear, idx); onClose(); }}>
            {m.slice(0,3)}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── VISTA MES ──────────────────────────────────────────────────
function MonthCalendar({ cursor, events, eventsByKey, selectedDay, setSelectedDay, onSelectEvent, goPrev, goNext, goToday, onJumpTo, subTabs }) {
  const [showPicker, setShowPicker] = useState(false);
  const cells = useMemo(
    () => buildMonthGrid(cursor.getFullYear(), cursor.getMonth()),
    [cursor]
  );
  const monthEvents = events.filter(e => {
    const d = new Date(e.fecha);
    return d.getFullYear() === cursor.getFullYear() && d.getMonth() === cursor.getMonth();
  });
  const detailsEvents = selectedDay ? (eventsByKey[selectedDay] || []) : [];
  const selectedDate = selectedDay ? new Date(selectedDay + 'T00:00:00') : null;

  return (
    <>
      <div className="cal-wrap">
        <div className="cal-header">
          <div style={{display:'flex', alignItems:'center', gap:14}}>
            <div className="cal-title clickable" onClick={() => setShowPicker(s => !s)}
              title="Click para saltar a otro mes/año">
              {NOMBRES_MES[cursor.getMonth()]} {cursor.getFullYear()}
              <span className="cal-title-caret">▾</span>
              {showPicker && (
                <MonthYearPicker
                  year={cursor.getFullYear()}
                  month={cursor.getMonth()}
                  onPick={onJumpTo}
                  onClose={() => setShowPicker(false)}
                />
              )}
            </div>
            {subTabs}
          </div>
          <div className="cal-nav">
            <button className="cal-nav-btn cal-nav-arrow" onClick={goPrev} title="Mes anterior">‹</button>
            <button className="cal-nav-btn" onClick={goToday}>Hoy</button>
            <button className="cal-nav-btn cal-nav-arrow" onClick={goNext} title="Mes siguiente">›</button>
          </div>
        </div>
        <div className="cal-grid">
          {DOW_CORTOS.map(d => <div key={d} className="cal-dow">{d}</div>)}
          {cells.map((cell, idx) => (
            <CalDayCell
              key={idx}
              date={cell.date}
              outOfMonth={cell.outOfMonth}
              events={eventsByKey[dayKey(cell.date)] || []}
              isSelected={selectedDay === dayKey(cell.date)}
              onClick={() => setSelectedDay(dayKey(cell.date))}
              onSelectEvent={onSelectEvent}
            />
          ))}
        </div>
        {monthEvents.length === 0 && (
          <div className="cal-empty-month">
            No hay eventos agendados en {NOMBRES_MES[cursor.getMonth()]} {cursor.getFullYear()}.
          </div>
        )}
      </div>

      {selectedDate && (
        <DayDetails
          date={selectedDate}
          events={detailsEvents}
          onClose={() => setSelectedDay(null)}
          onSelectEvent={onSelectEvent}
        />
      )}
    </>
  );
}

// ── VISTA SEMANA / HOY (grid de horas) ────────────────────────
function WeekCalendar({ anchorDate, events, settings, onSelectEvent, goPrev, goNext, goToday, onJumpTo, subTabs, ndays, singleDay }) {
  const [showPicker, setShowPicker] = useState(false);
  const HOUR_HEIGHT = 56;
  const startHour = Math.max(0, Math.min(23, settings.workStartHour ?? 9));
  const startMinSetting = Math.max(0, Math.min(59, settings.workStartMin ?? 0));
  const endHour = Math.max(startHour + 1, Math.min(24, settings.workEndHour ?? 19));
  const endMinSetting = Math.max(0, Math.min(59, settings.workEndMin ?? 0));
  // Grid de horas: redondea hacia abajo el inicio y hacia arriba el fin para mostrar siempre horas enteras
  const gridStartHour = startHour;
  const gridEndHour = endMinSetting > 0 ? endHour + 1 : endHour;
  const hours = [];
  for (let h = gridStartHour; h < gridEndHour; h++) hours.push(h);
  const slotMin = settings.slotDurationMin || 60;
  const startMinTotal = startHour * 60 + startMinSetting;
  const endMinTotal = endHour * 60 + endMinSetting;

  // Build days array
  const start = singleDay ? new Date(anchorDate) : startOfWeek(anchorDate);
  start.setHours(0,0,0,0);
  const days = [];
  for (let i = 0; i < ndays; i++) days.push(addDays(start, i));

  const lastDay = days[days.length-1];
  let title;
  if (singleDay) {
    title = formatLargeDate(start);
  } else if (start.getMonth() === lastDay.getMonth()) {
    title = `${start.getDate()} - ${lastDay.getDate()} ${NOMBRES_MES[start.getMonth()]} ${start.getFullYear()}`;
  } else {
    title = `${start.getDate()} ${NOMBRES_MES[start.getMonth()].slice(0,3)} - ${lastDay.getDate()} ${NOMBRES_MES[lastDay.getMonth()].slice(0,3)} ${lastDay.getFullYear()}`;
  }

  const totalHeight = HOUR_HEIGHT * hours.length;
  const gridCols = `60px repeat(${ndays}, 1fr)`;

  // Eventos por día (solo en rango de horas mostrado)
  const eventsByDay = days.map(d =>
    events.filter(e => isSameDay(new Date(e.fecha), d))
  );

  const now = new Date();

  // Línea del "ahora" si hoy está visible y dentro del rango horario
  const todayIdx = days.findIndex(d => isSameDay(d, now));
  let nowLineTop = null;
  if (todayIdx >= 0) {
    const nowMin = (now.getHours() - gridStartHour) * 60 + now.getMinutes();
    if (nowMin >= 0 && nowMin <= (gridEndHour - gridStartHour) * 60) {
      nowLineTop = (nowMin / 60) * HOUR_HEIGHT;
    }
  }

  return (
    <div className="cal-wrap">
      <div className="cal-header">
        <div style={{display:'flex', alignItems:'center', gap:14}}>
          <div className="cal-title clickable" onClick={() => setShowPicker(s => !s)}
            title="Click para saltar a otro mes/año">
            {title}
            <span className="cal-title-caret">▾</span>
            {showPicker && (
              <MonthYearPicker
                year={start.getFullYear()}
                month={start.getMonth()}
                onPick={onJumpTo}
                onClose={() => setShowPicker(false)}
              />
            )}
          </div>
          {subTabs}
        </div>
        <div className="cal-nav">
          <button className="cal-nav-btn cal-nav-arrow" onClick={goPrev}
            title={singleDay ? 'Día anterior' : 'Semana anterior'}>‹</button>
          <button className="cal-nav-btn" onClick={goToday}>Hoy</button>
          <button className="cal-nav-btn cal-nav-arrow" onClick={goNext}
            title={singleDay ? 'Día siguiente' : 'Semana siguiente'}>›</button>
        </div>
      </div>

      <div className="cal-week-wrap">
        <div className="cal-week-header" style={{gridTemplateColumns: gridCols}}>
          <div className="cal-week-corner"></div>
          {days.map(d => (
            <div key={d.toISOString()} className={`cal-week-day-h ${isToday(d) ? 'today' : ''}`}>
              <span className="dow">{DOW_CORTOS[(d.getDay()+6)%7]}</span>
              <span className="num">{d.getDate()}</span>
            </div>
          ))}
        </div>
        <div className="cal-week-body" style={{gridTemplateColumns: gridCols}}>
          <div className="cal-hours-col">
            {hours.map(h => (
              <div key={h} className="cal-hour-label" style={{height: HOUR_HEIGHT}}>
                {pad2(h)}:00
              </div>
            ))}
          </div>
          {days.map((d, dIdx) => (
            <div key={d.toISOString()} className="cal-day-col" style={{height: totalHeight}}>
              {hours.map(h => (
                <div key={h} className="cal-hour-cell" style={{height: HOUR_HEIGHT}}></div>
              ))}
              {dIdx === todayIdx && nowLineTop != null && (
                <div className="cal-now-line" style={{top: nowLineTop}}></div>
              )}
              {eventsByDay[dIdx].map(e => {
                const ev = new Date(e.fecha);
                const evMin = ev.getHours() * 60 + ev.getMinutes();
                const offsetMin = evMin - gridStartHour * 60;
                if (offsetMin < 0 || offsetMin >= (gridEndHour - gridStartHour) * 60) {
                  return null;
                }
                const dur = e.duracionMin || slotMin;
                const top = (offsetMin / 60) * HOUR_HEIGHT;
                const height = Math.max(28, (dur / 60) * HOUR_HEIGHT - 2);
                const cfg = tipoConfig(e.tipo);
                const vencido = ev < now && !isToday(ev);
                return (
                  <div key={e.id}
                    className={`cal-week-event ${e.kind === 'tarea' ? 'cal-event-tarea' : ''} ${e.tareaData?.prospectoId ? 'cal-event-tarea-auto' : ''} ${vencido ? 'vencido' : ''}`}
                    style={{
                      top: top, height,
                      background: cfg?.bg || '#f3f4f6',
                      borderLeftColor: cfg?.color || '#6b7280',
                      color: cfg?.color || 'var(--texto)'
                    }}
                    title={`${formatHHMM(e.fecha)} · ${e.label}${e.observacion ? ' — ' + e.observacion : ''}`}
                    onClick={() => onSelectEvent(e)}
                  >
                    <div className="event-time">{formatHHMM(e.fecha)} · {dur}min</div>
                    <div className="event-name">{e.label}</div>
                    {height > 50 && e.observacion && (
                      <div className="event-obs">{e.observacion}</div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CalDayCell({ date, outOfMonth, events, isSelected, onClick, onSelectEvent }) {
  const today = isToday(date);
  const cls = [
    'cal-day',
    outOfMonth ? 'out' : '',
    today ? 'today' : '',
    isSelected ? 'selected' : ''
  ].filter(Boolean).join(' ');

  const visibles = events.slice(0, 3);
  const restantes = events.length - visibles.length;
  const now = new Date();

  return (
    <div className={cls} onClick={onClick}>
      <span className="cal-day-num">{date.getDate()}</span>
      {visibles.map(e => {
        const cfg = tipoConfig(e.tipo);
        const fechaEv = new Date(e.fecha);
        const vencido = fechaEv < now && !isToday(fechaEv);
        return (
          <div
            key={e.id}
            className={`cal-event ${e.kind === 'tarea' ? 'cal-event-tarea' : ''} ${e.tareaData?.prospectoId ? 'cal-event-tarea-auto' : ''} ${vencido ? 'vencido' : ''}`}
            style={{
              background: cfg?.bg || '#f3f4f6',
              borderLeftColor: cfg?.color || '#6b7280',
              color: cfg?.color || 'var(--texto)'
            }}
            title={`${e.label}${e.observacion ? ' — ' + e.observacion : ''}`}
            onClick={(ev) => { ev.stopPropagation(); onSelectEvent(e); }}
          >
            <span className="cal-event-time">{formatHHMM(e.fecha)}</span>
            {e.label}
          </div>
        );
      })}
      {restantes > 0 && (
        <div className="cal-more">+{restantes} más</div>
      )}
    </div>
  );
}

function DayDetails({ date, events, onClose, onSelectEvent }) {
  return (
    <div className="day-details">
      <div className="day-details-header">
        <h3>{formatLargeDate(date)}</h3>
        <button className="modal-close" style={{
          background:'#f3f4f6', color:'var(--texto-suave)'
        }} onClick={onClose}>×</button>
      </div>
      {events.length === 0 ? (
        <div style={{color:'var(--texto-suave)', fontStyle:'italic', fontSize:'0.9rem'}}>
          Sin eventos agendados para este día.
        </div>
      ) : (
        <div className="day-details-list">
          {events.map(e => {
            const cfg = tipoConfig(e.tipo);
            const esTarea = e.kind === 'tarea';
            return (
              <div
                key={e.id}
                className="day-event"
                style={{ borderLeftColor: esTarea ? '#7c3aed' : (cfg?.color || '#6b7280') }}
                onClick={() => onSelectEvent(e)}
              >
                <span className="day-event-time">{formatHHMM(e.fecha)}</span>
                <span className="chip" style={{
                  color: esTarea ? '#6d28d9' : cfg?.color,
                  background: esTarea ? 'rgba(124, 58, 237, 0.14)' : cfg?.bg
                }}>
                  {esTarea ? 'Tarea' : (cfg?.label || e.tipo)}
                </span>
                <span className="day-event-name">{e.label}</span>
                {e.observacion && <span className="day-event-obs">{e.observacion}</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
