  const [state, setState] = useState(() => emptyState());
  const [loading, setLoading] = useState(true);

  // Carga lazy del actorMap: trae solo los profiles cuyo id aparece como
  // actor_id en alguna entidad del state cargado y todavía no está en el
  // cache. Reduce el fetch original "trae todos los profiles" a "trae solo
  // los que realmente vamos a mostrar".
  useEffect(() => {
    if (!agente?.id) return;
    const ids = new Set();
    ids.add(agente.id);
    if (agente.assistant_of_id) ids.add(agente.assistant_of_id);
    for (const p of state.prospectos || []) {
      if (p.actorId) ids.add(p.actorId);
      for (const c of p.contactos || []) if (c.actorId) ids.add(c.actorId);
    }
    for (const t of state.tareas?.items || []) if (t.actorId) ids.add(t.actorId);
    for (const c of state.tareas?.columnas || []) if (c.actorId) ids.add(c.actorId);
    for (const a of state.agendados || []) if (a.actorId) ids.add(a.actorId);
    for (const id of gcalActorIds) ids.add(id);
    const missing = [...ids].filter(id => id && !actorMap[id]);
    if (missing.length === 0) return;
    let cancelled = false;
    sb.from('profiles').select('id, display_name, email').in('id', missing).then(({ data }) => {
      if (cancelled || !data) return;
      setActorMap(m => {
        const next = { ...m };
        for (const p of data) next[p.id] = { display_name: p.display_name, email: p.email };
        return next;
      });
    });
    return () => { cancelled = true; };
  }, [agente?.id, agente?.assistant_of_id, state.prospectos, state.tareas, state.agendados, gcalActorIds, actorMap]);

  // Override de colores para eventos del calendar (click derecho sobre tarjeta).
  // Si setColor recibe null/'' borra el override (vuelve al color automático).
  const handleSetEventColor = useCallback(async (eventKey, color) => {
    if (!eventKey) return;
    try {
      await storage.setEventColor(eventKey, color || null);
      setState(s => {
        const next = { ...(s.eventColors || {}) };
        if (!color) delete next[eventKey];
        else next[eventKey] = color;
        return { ...s, eventColors: next };
      });
    } catch (e) {
      showToast('No se pudo cambiar el color: ' + (e?.message || e), { duration: 4000 });
    }
  }, []);

  // Guard común para handlers de escritura: bloquea si estamos viendo como otro
  const guardReadOnly = () => {
    if (readOnly) {
      showToast('Vista de solo lectura — volvé a tu vista para editar');
      return true;
    }
    return false;
  };

  // Cuando el agente llega con abordaje_settings (puede tardar un instante por la
  // consulta a profiles), sincronizamos el state con eso. Si es null usamos el
  // cache local (que ya se cargó en useState inicial).
  useEffect(() => {
    if (agente?.abordaje_settings) {
      const merged = { ...DEFAULT_SETTINGS, ...agente.abordaje_settings };
      setSettings(merged);
      try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(merged)); } catch {}
    }
  }, [agente?.id]);

  // Tick cada 60s para que las urgencias de notificaciones se recalculen
  // (ej. "Llamar en 15min" → cuando pasen los 15 min pasa de "Hoy" a "Vencido"
  // sin necesidad de recargar la página).
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60 * 1000);
    return () => clearInterval(id);
  }, []);

  // Notificaciones dismisseadas hoy — persistido en localStorage por user.
  // Map { itemKey: 'YYYY-MM-DD' }. Al cambiar de día, los dismisses caducan y
  // la notificación reaparece si el evento sigue pendiente.
  const NOTIF_DISMISS_KEY = `abordaje_notif_dismissed_${user?.id || 'anon'}`;
  const [notifDismissed, setNotifDismissed] = useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem(NOTIF_DISMISS_KEY) || '{}');
      const d = new Date();
      const today = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
      // Housekeeping: descartar entries de días anteriores.
      const cleaned = {};
      for (const k in raw) if (raw[k] === today) cleaned[k] = raw[k];
      return cleaned;
    } catch { return {}; }
  });
  const dismissNotif = useCallback((itemKey) => {
    const d = new Date();
    const today = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    setNotifDismissed(prev => {
      const next = { ...prev, [itemKey]: today };
      try { localStorage.setItem(NOTIF_DISMISS_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [NOTIF_DISMISS_KEY]);

  const notificaciones = useMemo(
    () => calcularNotificaciones(state, isPilot, notifDismissed),
    [state, tick, isPilot, notifDismissed]
  );

  // Override de color por calendar de Google. Se persiste en abordaje_settings
  // (sigue al user entre dispositivos). Estructura:
  //   { [gcalId]: { agenda: 'paletteId', tarea: 'paletteId' } }
  // Si `kind` es null, borra ese campo. Si los 2 quedan vacíos, borra el cal.
  const handleSetCalendarColor = useCallback(async (gcalId, kind, paletteId) => {
    setSettings(prev => {
      const calColors = { ...(prev.calendarColors || {}) };
      const cur = { ...(calColors[gcalId] || {}) };
      if (paletteId) cur[kind] = paletteId;
      else delete cur[kind];
      if (Object.keys(cur).length === 0) delete calColors[gcalId];
      else calColors[gcalId] = cur;
      const next = { ...prev, calendarColors: calColors };
      persistSettings(next, user?.id);
      return next;
    });
  }, [user?.id]);

  // Resetea todos los overrides de color de UN calendar (botón Restablecer).
  const handleResetCalendarColors = useCallback(async (gcalId) => {
    setSettings(prev => {
      const calColors = { ...(prev.calendarColors || {}) };
      delete calColors[gcalId];
      const next = { ...prev, calendarColors: calColors };
      persistSettings(next, user?.id);
      return next;
    });
  }, [user?.id]);
  const notifUrgentes = notificaciones.filter(n => n.urgencia === 'vencido' || n.urgencia === 'hoy').length;
  const [settings, setSettings] = useState(() => loadSettings());
  const [showAddModal, setShowAddModal] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showInstrucciones, setShowInstrucciones] = useState(false);
  const [showPassModal, setShowPassModal] = useState(false);
  const [bellOpen, setBellOpen] = useState(false);
  // Click en una celda libre del calendario: muestra mini-modal Agenda/Tarea.
  // `slotPicker` controla el chooser inicial; `nuevaAgendaSlot` controla el
  // modal de Nueva agenda (con campos de agenda y opción de vincular prospect).
  const [slotPicker, setSlotPicker] = useState(null);
  const [nuevaAgendaSlot, setNuevaAgendaSlot] = useState(null);
  // Edición de agendas standalone (click en evento del calendar sin prospect)
  const [agendaEditando, setAgendaEditando] = useState(null);
  const [tick, setTick] = useState(0);  // re-render cada 60s para recalcular urgencias
  const [tareaEditando, setTareaEditando] = useState(null);
  const [convertirTareaId, setConvertirTareaId] = useState(null);
  // Estado del modal de confirmación de reorden de columnas. Cuando el user
  // suelta el drag de una columna, el handler arma este state y se renderiza
  // ConfirmColMoveModal. Si confirma, ejecutamos el move. Si cancela, descartamos.
  const [pendingColMove, setPendingColMove] = useState(null);
  // Modal de confirmación al eliminar una tarea. Si la tarea tiene fecha, da
  // opción de "solo sacar del calendar" además de "borrar tarea completa".
  // Si no tiene fecha, solo pregunta borrar / cancelar.
  const [pendingDeleteTarea, setPendingDeleteTarea] = useState(null);
  // Modal de confirmación al eliminar un prospect (reemplaza el confirm()
  // nativo del browser por un modal acorde al diseño del proyecto).
  const [pendingDeleteProspect, setPendingDeleteProspect] = useState(null);
  // Evento huérfano del calendar (un evento Google con abordaje_tarea_id o
  // abordaje_prospect_id que no coincide con el state actual — típicamente
  // residuos de bugs viejos de sync). Al clickearlo, en lugar de abrir el
  // modal de la tarea/prospect (que mostraría OTROS datos), abrimos un modal
  // específico para borrarlo del calendar sin tocar la entidad subyacente.
  const [pendingOrphanEvent, setPendingOrphanEvent] = useState(null);
  // Modal de confirmación al borrar una agenda standalone. Reemplaza el
  // confirm() nativo del browser por un modal coherente con el resto.
  // Detecta si el evento es parte de una serie recurrente y avisa al user
  // que se borra toda la serie (la edge function aún no maneja "esta sola").
  const [pendingDeleteAgenda, setPendingDeleteAgenda] = useState(null);
  // Modal para crear nueva columna del Kanban (reemplaza el prompt() nativo
  // por uno coherente con el resto de la app, validación y autofocus).
  const [addingColumna, setAddingColumna] = useState(false);
  // Modal de acciones al clickear un evento del calendar que viene de un
  // prospect (kind='prospecto'). Ofrece "eliminar la gestión" (que limpia
  // contacto + evento Google) o "abrir ficha del prospect" (comportamiento
  // viejo, abre panel lateral).
  const [pendingProspectAgenda, setPendingProspectAgenda] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  // Persistimos la vista activa en localStorage para que sobreviva al refresh.
  const [view, setView] = useState(() => {
    try {
      const v = localStorage.getItem('abordaje_view');
      return ['lista','tareas','calendario'].includes(v) ? v : 'lista';
    } catch { return 'lista'; }
  });
  useEffect(() => {
    try { localStorage.setItem('abordaje_view', view); } catch {}
  }, [view]);
  const [filterEstado, setFilterEstado] = useState('todos');
  const [filterFecha, setFilterFecha] = useState('todos');
  const [filterEtiqueta, setFilterEtiqueta] = useState([]); // array de tipo.id ó 'sin_etiqueta'
  const [ordenFecha, setOrdenFecha] = useState('ninguno'); // 'asc' | 'desc' | 'ninguno'

  // Carga inicial desde Supabase. Si hay viewAs, filtra por su id.
  useEffect(() => {
    let cancel = false;
    setLoading(true);
    (async () => {
      try {
        const s = await storage.loadState(viewAs?.id);
        if (!cancel) setState(s);
      } catch (e) {
        console.error('loadState:', e);
        showToast('Error al cargar datos: ' + (e.message || e), { duration: 5000 });
      } finally {
        if (!cancel) setLoading(false);
      }
    })();
    return () => { cancel = true; };
  }, [viewAs?.id]);

  // Refresh silencioso al cambiar de tab (Lista / Tareas / Calendario).
  // Útil cuando un asistente y el principal trabajan en paralelo: al alternar
  // pestañas se ve el estado actualizado sin necesidad de recargar la página.
  // No corre en el primer mount (skip via ref) para no duplicar el load inicial.
  const firstTabSwitchSkipRef = useRef(true);
  // Lock por prospectoId para serializar invocaciones de sincronizarSeguimiento.
  // Sin esto, dos handleAddContacto rápidos (doble tap, auto-save) disparaban
  // dos syncs concurrentes que duplican eventos en Google Calendar.
  const syncLocksRef = useRef(new Map());
  useEffect(() => {
    if (firstTabSwitchSkipRef.current) {
      firstTabSwitchSkipRef.current = false;
      return;
    }
    let cancel = false;
    (async () => {
      try {
        const s = await storage.loadState(viewAs?.id);
        if (!cancel) setState(s);
        if (isPilot) bumpGcal();
        // Si soy asistente, también refrescamos el profile del principal
        // — pudo haber cambiado shares_calendar_with_assistant o gcal_enabled
        // mientras yo navegaba.
        if (isAssistant) setPrincipalReloadKey(k => k + 1);
      } catch (e) {
        console.warn('refresh on tab switch:', e?.message || e);
      }
    })();
    return () => { cancel = true; };
  }, [view]);

  const handleErr = (e, ctx) => {
    console.error(ctx, e);
    showToast(`Error: ${e.message || e}`, { duration: 4000 });
  };

  const upsertProspecto = useCallback(async (id, patch) => {
    if (readOnly) { showToast('Vista de solo lectura'); return; }
    const prevList = state.prospectos;
    // Optimistic update
    setState(s => ({
      ...s,
      prospectos: s.prospectos.map(p =>
        p.id === id ? { ...p, ...patch, updatedAt: new Date().toISOString() } : p
      )
    }));
    try {
      await storage.updateProspecto(id, patch);
    } catch (e) {
      handleErr(e, 'updateProspecto');
      setState(s => ({ ...s, prospectos: prevList }));
    }
  }, [state.prospectos, readOnly]);

  const handleAdd = async (data) => {
    if (guardReadOnly()) return;
    try {
      const prospecto = await storage.createProspecto(data);
      setState(s => ({ ...s, prospectos: [prospecto, ...s.prospectos] }));
      setShowAddModal(false);
      showToast('Prospecto agregado');
    } catch (e) { handleErr(e, 'createProspecto'); }
  };

  // Click en "Eliminar" desde el panel del prospect: arma el modal de
  // confirmación. El borrado real lo hace executeDeleteProspect cuando el
  // user confirma desde el modal propio (en lugar del confirm() nativo feo).
  const handleDelete = (id) => {
    if (guardReadOnly()) return;
    const prospect = state.prospectos.find(p => p.id === id);
    if (!prospect) return;
    setPendingDeleteProspect(prospect);
  };

  const executeDeleteProspect = async (id) => {
    setPendingDeleteProspect(null);
    if (guardReadOnly()) return;

    // UI optimista: sacamos de pantalla AL TOQUE y mostramos toast. La
    // limpieza de Google y el delete real de DB van en background. Si algo
    // falla, rollback + toast de error. Antes esto se hacía secuencial y
    // el user veía la UI congelada 5-15s mientras gcalApi.list iteraba
    // todos los calendars accesibles + delete uno por uno.
    const prev = state.prospectos;
    const tareasAutoSnapshot = (state.tareas?.items || []).filter(t => t.prospectoId === id);
    setState(s => ({ ...s, prospectos: s.prospectos.filter(p => p.id !== id) }));
    setSelectedId(null);
    showToast('Prospecto eliminado');

    // Trabajo de fondo: limpieza Google + delete DB. No bloquea la UI.
    (async () => {
      try {
        if (isPilot) {
          // Listamos y borramos eventos del prospect en paralelo (Promise.all)
          // para que N eventos huérfanos no sumen N×latencia. Rango -10/+10
          // años cubre cualquier agenda. Idealmente sería filter server-side
          // (privateExtendedProperty), pero requiere cambios en edge function.
          try {
            const past = new Date(); past.setFullYear(past.getFullYear() - 10);
            const future = new Date(); future.setFullYear(future.getFullYear() + 10);
            const evts = await gcalApi.list(past.toISOString(), future.toISOString());
            const toDelete = (evts || []).filter(ev =>
              ev.extendedProperties?.private?.abordaje_prospect_id === id
            );
            await Promise.all(toDelete.map(ev =>
              gcalApi.delete(ev.id).catch(e => console.warn('gcal del prospect orphan:', e))
            ));
          } catch (e) { console.warn('gcal list al borrar prospect:', e); }

          // Tareas auto del prospect: borrar sus eventos Google en paralelo.
          await Promise.all(tareasAutoSnapshot
            .filter(t => t.googleEventId)
            .map(t => gcalApi.delete(t.googleEventId).catch(e => console.warn('gcal del tarea auto:', e)))
          );
        }

        await storage.deleteProspecto(id);
        if (isPilot) bumpGcal();
      } catch (e) {
        handleErr(e, 'deleteProspecto');
        // Rollback al state anterior (el prospect vuelve a la lista).
        setState(s => ({ ...s, prospectos: prev }));
      }
    })();
  };

  // Sincroniza la tarea (Abordar) y/o el agendado del prospect según el contacto activo.
  // contactoActivo: el contacto que define el seguimiento vigente. Si null/sin agendadoPara,
  // sólo limpia (no crea nada).
  // _syncSeguimientoBody hace el trabajo crudo. sincronizarSeguimiento (más abajo)
  // lo envuelve en un lock por prospectoId para evitar duplicados por race condition.
  const _syncSeguimientoBody = async (prospectoId, contactoActivo, prevState, opts = {}) => {
    // 1. Limpiar tareas auto-generadas del prospect (incluye sync a Google si piloto+evento).
    //    Consultamos directamente a Supabase en lugar de filtrar prevState.tareas.items
    //    para evitar duplicados cuando se encadenan gestiones rápidas (el closure
    //    puede tener un state stale y dejar tareas viejas sin borrar).
    const agenteEffectiveId = await auth.getEffectiveAgenteId();
    let tareasAuto = [];
    if (agenteEffectiveId) {
      const { data: tareasDB, error: tareasErr } = await sb.from('abordaje_tareas')
        .select('id, google_event_id')
        .eq('agente_id', agenteEffectiveId)
        .eq('prospecto_id', prospectoId)
        .eq('archivada', false);
      if (tareasErr) {
        console.warn('listado tareas auto:', tareasErr.message);
        // Fallback al state local si la query falla.
        tareasAuto = (prevState.tareas?.items || [])
          .filter(t => t.prospectoId === prospectoId)
          .map(t => ({ id: t.id, google_event_id: t.googleEventId }));
      } else {
        tareasAuto = tareasDB || [];
      }
    }
    for (const t of tareasAuto) {
      try {
        if (isPilot && t.google_event_id) {
          try { await gcalApi.delete(t.google_event_id); } catch (e) { console.warn('gcal del tarea auto:', e); }
        }
        await storage.deleteTarea(t.id);
      } catch (e) { console.error('limpieza tarea auto:', e); }
    }
    // 2. Limpiar agendados anteriores del prospect que NO estén vencidos.
    //    En piloto los agendados de prospect viven en Google (no en abordaje_agendados),
    //    así que listamos eventos de Google con abordaje_prospect_id=prospectoId y los borramos.
    const ahora = new Date();
    let idsAgendadosBorrados = new Set();
    if (isPilot) {
      try {
        // Rango -1d / +10 años. El "+6 meses" original dejaba huérfanas agendas
        // a 7+ meses (zombies que aparecen luego como del prospect viejo).
        // Mantenemos `now` como floor (no tocamos pasado: histórico intacto).
        const now = new Date();
        const futuroMax = new Date(); futuroMax.setFullYear(futuroMax.getFullYear() + 10);
        const evts = await gcalApi.list(now.toISOString(), futuroMax.toISOString());
        for (const ev of (evts || [])) {
          const pid = ev.extendedProperties?.private?.abordaje_prospect_id;
          if (pid === prospectoId) {
            try { await gcalApi.delete(ev.id); } catch (e) { console.warn('gcal del agenda prospect:', e); }
          }
        }
      } catch (e) { console.warn('gcal list prospect:', e); }
    } else {
      const agendadosNoVencidos = (prevState.agendados || []).filter(a => {
        if (a.prospectoId !== prospectoId) return false;
        return new Date(a.fecha) >= ahora;
      });
      for (const a of agendadosNoVencidos) {
        try { await storage.deleteAgendado(a.id); }
        catch (e) { console.error('limpieza agendado:', e); }
      }
      idsAgendadosBorrados = new Set(agendadosNoVencidos.map(a => a.id));
    }
    const idsTareasBorradas = new Set(tareasAuto.map(t => t.id));
    setState(s => ({
      ...s,
      tareas: { ...s.tareas, items: s.tareas.items.filter(t => !idsTareasBorradas.has(t.id)) },
      agendados: s.agendados.filter(a => !idsAgendadosBorrados.has(a.id))
    }));

    // 3. Si no hay contacto activo o no tiene fecha objetivo, salir
    if (!contactoActivo || !contactoActivo.agendadoPara) {
      if (isPilot) bumpGcal();
      return;
    }

    // 4. Generar lo nuevo según el tipo
    if (contactoActivo.tipo === 'agendado') {
      if (isPilot) {
        // Crear evento en Google vinculado al prospect.
        const prospect = prevState.prospectos.find(p => p.id === prospectoId);
        try {
          await gcalApi.create(buildGoogleEventBody({
            startIso: contactoActivo.agendadoPara,
            // Si el caller pasó un título explícito (típicamente "Nueva agenda"
            // desde el calendar con form.titulo lleno), lo usamos en lugar del
            // default. Sino, "Cita — <nombre>".
            summary: opts.summaryOverride || `Cita — ${prospect?.nombre || 'prospect'}`,
            description: contactoActivo.observacion || '',
            prospectId: prospectoId,
          }));
          bumpGcal();
        } catch (e) { console.error('gcal create agenda prospect:', e); }
      } else {
        try {
          const ag = await calendarApi.agendar(prospectoId, contactoActivo.agendadoPara, contactoActivo.observacion || '');
          setState(s => ({ ...s, agendados: [...s.agendados, ag] }));
        } catch (e) { console.error('agendar:', e); }
      }
    } else {
      const colAbordar = (prevState.tareas?.columnas || []).find(c => c.slug === 'abordar');
      if (!colAbordar) { console.warn('No hay columna Abordar'); return; }
      const prospect = prevState.prospectos.find(p => p.id === prospectoId);
      const titulo = prospect?.nombre || 'Seguimiento';
      const { fecha, hora } = splitFechaHora(contactoActivo.agendadoPara);
      const cfgTipo = tipoConfig(contactoActivo.tipo);
      const obsTarea = [cfgTipo?.label, contactoActivo.observacion]
        .filter(Boolean).join(' — ');
      try {
        const tarea = await storage.createTarea({
          columnaId: colAbordar.id,
          prospectoId,
          titulo,
          fechaRecordatorio: fecha,
          horaRecordatorio: hora,
          observacion: obsTarea
        });
        // En piloto, también crear evento en Google para que aparezca en el calendar.
        if (isPilot) {
          try {
            // Local string directo, sin pasar por toISOString (que convierte
            // a UTC y desfasaba la hora cuando el browser no estaba en ARG).
            const startIso = `${fecha}T${hora || '09:00'}`;
            const evt = await gcalApi.create(buildGoogleEventBody({
              startIso,
              summary: titulo,
              description: obsTarea,
              tareaId: tarea.id,
            }));
            if (evt?.id) {
              await storage.updateTarea(tarea.id, { googleEventId: evt.id });
              tarea.googleEventId = evt.id;
            }
          } catch (e) { console.warn('gcal create tarea auto:', e); }
        }
        setState(s => ({ ...s, tareas: { ...s.tareas, items: [...s.tareas.items, tarea] } }));
        if (isPilot) bumpGcal();
      } catch (e) { console.error('crear tarea auto:', e); }
    }
  };

  // Wrapper público de sincronizarSeguimiento. Serializa las invocaciones por
  // prospectoId — si llega una segunda mientras corre la primera, espera a que
  // termine antes de arrancar. Esto evita duplicados en Google Calendar cuando
  // dos gestiones se registran rápido (doble tap mobile, auto-save, etc.).
  // `opts.summaryOverride`: si se pasa, se usa como título del evento Google
  // en lugar del default "Cita — <nombre>". Útil cuando el user creó la agenda
  // desde el calendar con un título explícito.
  const sincronizarSeguimiento = async (prospectoId, contactoActivo, prevState, opts = {}) => {
    const prevLock = syncLocksRef.current.get(prospectoId) || Promise.resolve();
    const run = prevLock.catch(() => {}).then(() =>
      _syncSeguimientoBody(prospectoId, contactoActivo, prevState, opts)
    );
    syncLocksRef.current.set(prospectoId, run);
    try {
      return await run;
    } finally {
      // Solo limpiar si nadie más encoló otra sync detrás nuestro.
      if (syncLocksRef.current.get(prospectoId) === run) {
        syncLocksRef.current.delete(prospectoId);
      }
    }
  };

  const handleAddContacto = async (prospectoId, contacto, opts = {}) => {
    if (guardReadOnly()) return;
    try {
      const nuevo = await storage.createContacto(prospectoId, contacto);
      const nuevoEstado = tipoConfig(nuevo.tipo)?.estado || 'nuevo';
      const nuevoProx = nuevo.agendadoPara || null;

      // Update local: agregar contacto al prospecto + estado/próximoContacto derivados
      setState(s => ({
        ...s,
        prospectos: s.prospectos.map(p => p.id === prospectoId
          ? { ...p, contactos: [...(p.contactos || []), nuevo], proximoContacto: nuevoProx, estado: nuevoEstado, updatedAt: new Date().toISOString() }
          : p)
      }));
      await storage.updateProspecto(prospectoId, { estado: nuevoEstado, proximoContacto: nuevoProx });

      // Sincronización tarea/agenda automática. La llamamos SIEMPRE (incluso
      // cuando el contacto nuevo no trae agendadoPara, ej. 'rechazado' o
      // 'contestador'): así limpiamos cualquier tarea auto / agenda anterior
      // que ya no aplica. La función maneja el caso sin agendadoPara como
      // "solo limpiar, no crear nada".
      await sincronizarSeguimiento(prospectoId, nuevo, state, opts);

      showToast('Gestión registrada');
    } catch (e) { handleErr(e, 'createContacto'); }
  };

  const handleEditContacto = async (prospectoId, contactoId, patch) => {
    if (guardReadOnly()) return;
    try {
      await storage.updateContacto(contactoId, patch);

      // Reconstruir el contacto con el patch aplicado (para usarlo en sincronización)
      const prevState = state;
      const prospectAnterior = prevState.prospectos.find(x => x.id === prospectoId);
      if (!prospectAnterior) return;
      const contactosAct = (prospectAnterior.contactos || []).map(c => {
        if (c.id !== contactoId) return c;
        const merged = { ...c, ...patch };
        if ('agendadoPara' in patch) {
          merged.agendadoPara = patch.agendadoPara;
        } else if ('fecha' in patch || 'hora' in patch) {
          merged.agendadoPara = merged.fecha
            ? (merged.hora ? `${merged.fecha}T${merged.hora}` : merged.fecha)
            : null;
        }
        return merged;
      });
      const ultimo = contactosAct[contactosAct.length - 1];
      const proxNuevo = ultimo?.agendadoPara || null;
      const estadoNuevo = ultimo ? (tipoConfig(ultimo.tipo)?.estado || 'nuevo') : 'nuevo';

      setState(s => ({
        ...s,
        prospectos: s.prospectos.map(p => p.id === prospectoId
          ? { ...p, contactos: contactosAct, proximoContacto: proxNuevo, estado: estadoNuevo, updatedAt: new Date().toISOString() }
          : p)
      }));
      await storage.updateProspecto(prospectoId, { estado: estadoNuevo, proximoContacto: proxNuevo });

      // Si el contacto editado es el último (define el seguimiento vigente),
      // resincronizamos tarea/agenda con la versión nueva.
      const editadoEsUltimo = ultimo?.id === contactoId;
      if (editadoEsUltimo) {
        await sincronizarSeguimiento(prospectoId, ultimo, prevState);
      }

      showToast('Gestión actualizada');
    } catch (e) { handleErr(e, 'updateContacto'); }
  };

  const handleDeleteContacto = async (prospectoId, contactoId, opts = {}) => {
    if (guardReadOnly()) return;
    // opts.skipConfirm: para callers que ya confirmaron via modal propio
    // (ej. eliminar agenda desde el calendar). Evita doble confirmación.
    if (!opts.skipConfirm && !confirm('¿Eliminar este registro de gestión?')) return;
    try {
      const prevState = state;
      const prospectAnterior = prevState.prospectos.find(x => x.id === prospectoId);
      if (!prospectAnterior) return;

      // Determinar si el contacto borrado era el último (define el seguimiento vigente)
      const contactosPrev = prospectAnterior.contactos || [];
      const eraUltimo = contactosPrev[contactosPrev.length - 1]?.id === contactoId;

      await storage.deleteContacto(contactoId);

      // Lista nueva de contactos + último nuevo
      const contactosNuevos = contactosPrev.filter(c => c.id !== contactoId);
      const nuevoUltimo = contactosNuevos[contactosNuevos.length - 1] || null;
      const proxNuevo = nuevoUltimo?.agendadoPara || null;
      const estadoNuevo = nuevoUltimo ? (tipoConfig(nuevoUltimo.tipo)?.estado || 'nuevo') : 'nuevo';

      setState(s => ({
        ...s,
        prospectos: s.prospectos.map(p => p.id === prospectoId
          ? { ...p, contactos: contactosNuevos, proximoContacto: proxNuevo, estado: estadoNuevo, updatedAt: new Date().toISOString() }
          : p)
      }));
      await storage.updateProspecto(prospectoId, { estado: estadoNuevo, proximoContacto: proxNuevo });

      // Si el contacto borrado era el último, resincronizamos tarea/agenda.
      // sincronizarSeguimiento con nuevoUltimo (puede ser null → solo limpia).
      if (eraUltimo) {
        await sincronizarSeguimiento(prospectoId, nuevoUltimo, prevState);
      }
    } catch (e) { handleErr(e, 'deleteContacto'); }
  };


  // ── TAREAS HANDLERS ──
  const handleAddTarea = async (columnaId, titulo = '') => {
    if (guardReadOnly()) return;
    try {
      const tarea = await storage.createTarea({ columnaId, titulo: titulo.trim() });
      setState(s => ({
        ...s,
        tareas: { ...s.tareas, items: [...s.tareas.items, tarea] }
      }));
    } catch (e) { handleErr(e, 'createTarea'); }
  };

  // Click en celda del calendario → "Nueva tarea": la creo en la primera columna
  // disponible (Abordar por slug, o la primera) con fecha/hora preset y abro el
  // modal de edición para que el user complete el título y guarde.
  // En piloto: además crea evento en Google con abordaje_tarea_id en extendedProps.
  const handleCreateTareaEnSlot = async (slot) => {
    if (guardReadOnly()) return;
    // Cerramos el chooser ANTES de la llamada async para evitar que un
    // segundo tap (involuntario, sobre todo en mobile) dispare una segunda
    // creación → tarea+evento duplicado en el calendario.
    setSlotPicker(null);
    const cols = state.tareas?.columnas || [];
    const colDest = cols.find(c => c.slug === 'abordar') || cols[0];
    if (!colDest) { showToast('No hay columnas de tareas'); return; }
    const fechaYMD = `${slot.date.getFullYear()}-${pad2(slot.date.getMonth()+1)}-${pad2(slot.date.getDate())}`;
    const horaHM = `${pad2(slot.hour)}:${pad2(slot.minute)}`;
    try {
      const tarea = await storage.createTarea({
        columnaId: colDest.id,
        titulo: '',
        fechaRecordatorio: fechaYMD,
        horaRecordatorio: horaHM,
      });
      // En piloto, replicar al calendar de Google con vínculo a la tarea.
      if (isPilot) {
        try {
          const local = new Date(slot.date.getFullYear(), slot.date.getMonth(), slot.date.getDate(), slot.hour, slot.minute, 0);
          const evt = await gcalApi.create(buildGoogleEventBody({
            // dateToLocalIso preserva la hora local; toISOString convertía
            // a UTC y luego buildGoogleEventBody la re-traducía por casualidad
            // si el browser estaba en ARG. Pasar local string es robusto a
            // cualquier timezone del browser.
            startIso: dateToLocalIso(local),
            summary: 'Tarea',
            tareaId: tarea.id,
          }));
          if (evt?.id) {
            await storage.updateTarea(tarea.id, { googleEventId: evt.id });
            tarea.googleEventId = evt.id;
          }
        } catch (e) { console.warn('gcal create (tarea):', e?.message || e); }
      }
      setState(s => ({
        ...s,
        tareas: { ...s.tareas, items: [...s.tareas.items, tarea] }
      }));
      setTareaEditando(tarea);
      if (isPilot) bumpGcal();
    } catch (e) { handleErr(e, 'createTarea'); }
  };

  // Click en celda del calendario → "Nueva agenda": abrimos el modal con la
  // fecha/hora preset. El user decide si vincular un prospect nuevo o no.
  const handleCreateAgendaEnSlot = (slot) => {
    if (guardReadOnly()) return;
    setSlotPicker(null);
    setNuevaAgendaSlot(slot);
  };

  // Update / delete de agendas standalone (click sobre el evento en calendar).
  // En piloto `agendaId` es el google_event_id del evento; en non-piloto es el id
  // del agendado en abordaje_agendados.
  // Mover un evento del calendar (drag & drop). Decide qué entidad actualizar
  // según el tipo del evento. Las citas de prospect no son arrastrables porque
  // están vinculadas a un contacto del prospect — se editan desde la ficha.
  const handleMoveEvent = async (e, newStartIso) => {
    if (guardReadOnly()) return;
    if (e.kind === 'prospecto') {
      showToast('Esta cita viene del prospect — editala desde su ficha', { duration: 3500 });
      return;
    }
    try {
      if (isPilot && e.googleEvent) {
        // Piloto: cualquier evento (agenda/tarea/externo) se mueve en Google.
        // Conservamos la duración original calculando desde el end/start originales.
        const oldStart = new Date(e.googleEvent.start?.dateTime || e.googleEvent.start?.date);
        const oldEnd = new Date(e.googleEvent.end?.dateTime || e.googleEvent.end?.date);
        const durMs = (oldEnd - oldStart) || 60 * 60_000;
        const newStart = new Date(newStartIso);
        const newEnd = new Date(newStart.getTime() + durMs);
        // Usamos dateTime en hora LOCAL (no UTC) + timeZone. Si mandamos
        // toISOString() (UTC con Z) Google interpreta y muestra desfasado
        // según el browser que abra el calendar — bug de 3hs reportado.
        const oldStartLocal = dateToGcalLocal(oldStart);
        const oldEndLocal = dateToGcalLocal(oldEnd);
        await gcalApi.update(e.googleEvent.id, {
          start: { dateTime: dateToGcalLocal(newStart), timeZone: GCAL_TZ },
          end:   { dateTime: dateToGcalLocal(newEnd),   timeZone: GCAL_TZ },
        }, e.googleEvent._gcalId);
        // Si era una tarea local, también actualizar abordaje_tareas para que
        // los cards del kanban reflejen la nueva fecha. Usamos storage.updateTarea
        // (no sb.from directo) para que se setee `actor_id` y aparezca la
        // ActorStar cuando un asistente mueve una tarea via drag en calendar.
        // Si esto falla, revertimos el move en Google para no quedar
        // inconsistentes entre Google y la DB.
        if (e.kind === 'tarea' && e.tareaId) {
          const d = new Date(newStartIso);
          const newF = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
          const newH = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
          try {
            await storage.updateTarea(e.tareaId, {
              fechaRecordatorio: newF, horaRecordatorio: newH,
            });
          } catch (dbErr) {
            // Rollback Google al estado anterior (también en hora local).
            try {
              await gcalApi.update(e.googleEvent.id, {
                start: { dateTime: oldStartLocal, timeZone: GCAL_TZ },
                end:   { dateTime: oldEndLocal,   timeZone: GCAL_TZ },
              }, e.googleEvent._gcalId);
            } catch (rbErr) { console.error('rollback gcal:', rbErr); }
            throw dbErr;
          }
          const me = await auth.getUser();
          setState(s => ({
            ...s,
            tareas: { ...s.tareas, items: s.tareas.items.map(t => t.id === e.tareaId
              ? { ...t, fechaRecordatorio: newF, horaRecordatorio: newH, actorId: me?.id || t.actorId, updatedAt: new Date().toISOString() } : t) }
          }));
        }
        bumpGcal();
        showToast('Evento movido');
      } else if (e.kind === 'tarea') {
        // Non-piloto: tarea local.
        const tareaId = e.tareaData?.id;
        if (!tareaId) return;
        const d = new Date(newStartIso);
        await handleUpdateTarea(tareaId, {
          fechaRecordatorio: `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`,
          horaRecordatorio: `${pad2(d.getHours())}:${pad2(d.getMinutes())}`,
        });
      } else if (e.kind === 'agenda' && e.agendaData) {
        // Non-piloto: agenda standalone.
        await handleUpdateAgenda(e.agendaData.id, { fecha: newStartIso, nota: e.agendaData.nota });
      }
    } catch (err) { handleErr(err, 'moveEvent'); }
  };

  // "Eliminar solo del calendar": borra el evento Google y vacía la fecha
  // de la gestión, pero deja el registro de "agendado para X" en el historial
  // del prospect. Útil cuando la cita se canceló o cambió pero querés
  // mantener trazabilidad. La etiqueta verde del cliente se actualiza sola
  // porque deriveEstado retrocede a contactos previos cuando el último es
  // un agendado sin fecha.
  const handleSoloDelCalendarProspectAgenda = async () => {
    const evt = pendingProspectAgenda;
    setPendingProspectAgenda(null);
    if (!evt?.prospectoId) return;
    const prospect = state.prospectos.find(p => p.id === evt.prospectoId);
    if (!prospect) return;
    const ultimoAgendado = [...(prospect.contactos || [])].reverse()
      .find(c => c.agendadoPara && c.tipo === 'agendado');
    if (!ultimoAgendado) {
      showToast('No se encontró la gestión asociada');
      return;
    }
    try {
      // Borrar eventos Google del prospect (en piloto el agendado vive ahí).
      if (isPilot) {
        try {
          const past = new Date(); past.setFullYear(past.getFullYear() - 1);
          const future = new Date(); future.setFullYear(future.getFullYear() + 10);
          const evts = await gcalApi.list(past.toISOString(), future.toISOString());
          for (const ev of (evts || [])) {
            if (ev.extendedProperties?.private?.abordaje_prospect_id === evt.prospectoId) {
              try { await gcalApi.delete(ev.id); } catch (e) { console.warn('gcal del:', e); }
            }
          }
        } catch (e) { console.warn('gcal list:', e); }
      }
      // Vaciar la fecha del contacto (queda en el historial sin agenda activa).
      await storage.updateContacto(ultimoAgendado.id, { agendadoPara: null });
      // Recalcular estado y proximoContacto del prospect a partir del state
      // actualizado. Si todos los contactos previos eran 'agendado sin fecha',
      // queda 'nuevo'.
      const contactosNuevos = (prospect.contactos || []).map(c =>
        c.id === ultimoAgendado.id ? { ...c, agendadoPara: null } : c
      );
      const proxNuevo = [...contactosNuevos].reverse().find(c => c.agendadoPara)?.agendadoPara || null;
      const estadoNuevo = deriveEstado({ ...prospect, contactos: contactosNuevos });
      setState(s => ({
        ...s,
        prospectos: s.prospectos.map(p => p.id === evt.prospectoId
          ? { ...p, contactos: contactosNuevos, proximoContacto: proxNuevo, estado: estadoNuevo, updatedAt: new Date().toISOString() }
          : p)
      }));
      await storage.updateProspecto(evt.prospectoId, { estado: estadoNuevo, proximoContacto: proxNuevo });
      if (isPilot) bumpGcal();
      showToast('Agenda eliminada del calendar');
    } catch (e) { handleErr(e, 'soloDelCalendarProspect'); }
  };

  // Borrar un evento huérfano del Google Calendar. No toca la tarea/prospect
  // subyacente (esos están "vivos" en el state apuntando a otro evento, o
  // ya fueron borrados). Solo elimina el evento Google que quedó colgado.
  const handleDeleteOrphanEvent = async (event) => {
    setPendingOrphanEvent(null);
    if (!isPilot || !event?.googleEvent?.id) return;
    try {
      const calendarId = event.googleEvent._gcalId || undefined;
      await gcalApi.delete(event.googleEvent.id, calendarId);
      bumpGcal();
      showToast('Evento huérfano eliminado del calendar');
    } catch (e) { handleErr(e, 'deleteOrphanEvent'); }
  };

  const handleUpdateAgenda = async (agendaId, patch, gcalCalendarId) => {
    if (guardReadOnly()) return;
    try {
      if (isPilot) {
        await gcalApi.update(agendaId, buildGoogleEventBody({
          startIso: patch.fecha,
          summary: (patch.nota || '').split(/\r?\n+/)[0] || 'Agenda IFS',
          description: patch.nota || '',
        }), gcalCalendarId);
        bumpGcal();
      } else {
        const updated = await storage.updateAgendado(agendaId, patch);
        setState(s => ({ ...s, agendados: s.agendados.map(a => a.id === agendaId ? updated : a) }));
      }
      setAgendaEditando(null);
      showToast('Agenda actualizada');
    } catch (e) { handleErr(e, 'updateAgenda'); }
  };
  // Wrapper: en lugar del confirm() nativo, arma el state del modal propio
  // que ofrece confirmación consistente con el resto de la UI y avisa si
  // el evento es parte de una serie recurrente.
  const handleRequestDeleteAgenda = (agenda, agendaId, gcalCalendarId) => {
    if (guardReadOnly()) return;
    const ev = agenda?.googleEvent || null;
    const isRecurring = !!(ev?.recurringEventId || (ev?.recurrence && ev.recurrence.length > 0));
    setPendingDeleteAgenda({ agendaId, gcalCalendarId, isRecurring });
  };

  const handleConfirmDeleteAgenda = async () => {
    const req = pendingDeleteAgenda;
    setPendingDeleteAgenda(null);
    if (!req) return;
    const { agendaId, gcalCalendarId } = req;
    // UI optimista: cerramos modal y mostramos toast al toque. El delete real
    // va en background. En non-piloto guardamos el snapshot por si hay rollback.
    const prevAgendados = state.agendados;
    if (!isPilot) {
      setState(s => ({ ...s, agendados: s.agendados.filter(a => a.id !== agendaId) }));
    }
    setAgendaEditando(null);
    showToast('Agenda eliminada');

    (async () => {
      try {
        if (isPilot) {
          await gcalApi.delete(agendaId, gcalCalendarId);
          bumpGcal();
        } else {
          await storage.deleteAgendado(agendaId);
        }
      } catch (e) {
        handleErr(e, 'deleteAgenda');
        if (!isPilot) setState(s => ({ ...s, agendados: prevAgendados }));
      }
    })();
  };

  // Guarda una "Nueva agenda" creada desde el calendario.
  //  - Si form.crearProspect: crea prospect + primer contacto tipo agendado.
  //  - Si no: crea sólo el evento (sin prospect) → en piloto va directo a Google,
  //    en non-piloto va a abordaje_agendados.
  const handleSaveAgenda = async (slot, form) => {
    if (guardReadOnly()) return;
    try {
      // El modal puede haber modificado fecha/hora respecto al slot inicial.
      // Si vienen en el form usamos esos valores; si no, caemos al slot.
      let local;
      if (form.fecha && form.hora) {
        const [yy, mm, dd] = form.fecha.split('-').map(Number);
        const [hh, mi] = form.hora.split(':').map(Number);
        local = new Date(yy, mm - 1, dd, hh, mi, 0);
      } else {
        local = new Date(slot.date.getFullYear(), slot.date.getMonth(), slot.date.getDate(), slot.hour, slot.minute, 0);
      }
      const agendadoParaIso = local.toISOString();
      const nota = (form.titulo || '').trim() + (form.observacion ? `\n\n${form.observacion.trim()}` : '');

      if (form.crearProspect && form.prospectoNombre?.trim()) {
        const prospecto = await storage.createProspecto({
          nombre: form.prospectoNombre.trim(),
          telefono: '', preferenciaContacto: '', detalle: '',
          referente: '', observaciones: '',
        });
        setState(s => ({ ...s, prospectos: [prospecto, ...s.prospectos] }));
        // Pasamos el título del modal como summaryOverride: si el user puso
        // "Cita reunión Pérez" en el form, queremos ese título en el evento
        // de Google, no el default "Cita — nombre".
        const titulo = (form.titulo || '').trim();
        await handleAddContacto(
          prospecto.id,
          {
            tipo: 'agendado',
            agendadoPara: agendadoParaIso,
            observacion: nota,
          },
          titulo ? { summaryOverride: titulo } : {}
        );
      } else if (isPilot) {
        // Agenda standalone en Google directo (sin prospect, sin abordaje_agendados).
        await gcalApi.create(buildGoogleEventBody({
          startIso: agendadoParaIso,
          summary: (form.titulo || '').trim() || 'Agenda IFS',
          description: form.observacion || '',
        }));
        bumpGcal();
      } else {
        // Non-piloto: agenda standalone en DB.
        const ag = await storage.createAgendado(null, agendadoParaIso, nota);
        setState(s => ({ ...s, agendados: [...s.agendados, ag] }));
      }
      setNuevaAgendaSlot(null);
      showToast('Agenda creada');
    } catch (e) {
      // CRÍTICO cerrar el modal aunque haya error: la create puede haberse
      // ejecutado parcialmente (Google ok, DB falló o viceversa). Si dejamos
      // el modal abierto el user reintenta con el mismo form y crea un
      // duplicado. Mejor cerrarlo y que vea el resultado en el calendar.
      setNuevaAgendaSlot(null);
      handleErr(e, 'createAgenda');
    }
  };

  const handleMoveTarea = async (tareaId, nuevaColumnaId) => {
    if (guardReadOnly()) return;
    const tarea = state.tareas.items.find(t => t.id === tareaId);
    if (!tarea || tarea.columnaId === nuevaColumnaId) return;
    // Validamos que la columna destino exista en el state. Si fue borrada
    // en otra sesión, evitamos un error crudo de FK al persistir.
    const colDest = state.tareas.columnas.find(c => c.id === nuevaColumnaId);
    if (!colDest) {
      showToast('La columna destino ya no existe');
      return;
    }
    // Optimistic
    setState(s => ({
      ...s,
      tareas: {
        ...s.tareas,
        items: s.tareas.items.map(t => t.id === tareaId
          ? { ...t, columnaId: nuevaColumnaId, updatedAt: new Date().toISOString() }
          : t)
      }
    }));
    try {
      await storage.updateTarea(tareaId, { columnaId: nuevaColumnaId });
    } catch (e) {
      handleErr(e, 'moveTarea');
      // Rollback
      setState(s => ({
        ...s,
        tareas: {
          ...s.tareas,
          items: s.tareas.items.map(t => t.id === tareaId
            ? { ...t, columnaId: tarea.columnaId } : t)
        }
      }));
    }
  };

  const handleUpdateTarea = async (id, patch) => {
    if (guardReadOnly()) return;
    const prev = state.tareas.items.find(t => t.id === id);
    setState(s => ({
      ...s,
      tareas: {
        ...s.tareas,
        items: s.tareas.items.map(t => t.id === id
          ? { ...t, ...patch, updatedAt: new Date().toISOString() } : t)
      }
    }));
    try {
      await storage.updateTarea(id, patch);
      // En piloto, sincronizar con Google Calendar.
      if (isPilot && prev) {
        const merged = { ...prev, ...patch };
        const hasFecha = !!merged.fechaRecordatorio;
        const fechaIso = hasFecha
          ? new Date(`${merged.fechaRecordatorio}T${(merged.horaRecordatorio || '09:00')}:00`).toISOString()
          : null;
        const eventBody = hasFecha ? buildGoogleEventBody({
          startIso: fechaIso,
          summary: merged.titulo?.trim() || 'Tarea',
          description: merged.observacion || '',
          tareaId: id,
        }) : null;
        try {
          if (merged.googleEventId && hasFecha) {
            await gcalApi.update(merged.googleEventId, eventBody);
          } else if (merged.googleEventId && !hasFecha) {
            // Le quitaron la fecha → borrar evento. Sincronizamos también el
            // state local para que la próxima edición no piense que el evento
            // sigue existiendo (causaba updates a 404 / desincronización).
            await gcalApi.delete(merged.googleEventId);
            await storage.updateTarea(id, { googleEventId: null });
            setState(s => ({
              ...s,
              tareas: { ...s.tareas, items: s.tareas.items.map(t => t.id === id ? { ...t, googleEventId: null } : t) }
            }));
          } else if (!merged.googleEventId && hasFecha) {
            // Le pusieron fecha por primera vez → crear evento. CRÍTICO
            // sincronizar el state local con el nuevo googleEventId: sin
            // esto, una segunda edición rápida volvía a entrar acá y creaba
            // un evento Google duplicado (el primero quedaba huérfano).
            const evt = await gcalApi.create(eventBody);
            if (evt?.id) {
              await storage.updateTarea(id, { googleEventId: evt.id });
              setState(s => ({
                ...s,
                tareas: { ...s.tareas, items: s.tareas.items.map(t => t.id === id ? { ...t, googleEventId: evt.id } : t) }
              }));
            }
          }
          bumpGcal();
        } catch (e) { console.warn('gcal sync (update tarea):', e?.message || e); }
      }
    } catch (e) {
      handleErr(e, 'updateTarea');
      if (prev) setState(s => ({
        ...s,
        tareas: { ...s.tareas, items: s.tareas.items.map(t => t.id === id ? prev : t) }
      }));
    }
  };

  const handleDeleteTarea = async (id) => {
    if (guardReadOnly()) return;
    // La confirmación se hace desde ConfirmDeleteTareaModal (que ofrece
    // además "solo sacar del calendar" si la tarea tiene fecha).
    // UI optimista: sacamos de pantalla y mostramos toast al toque. Limpieza
    // Google + delete DB van en background. Si algo falla, rollback.
    const prev = state.tareas.items;
    const tarea = prev.find(t => t.id === id);
    setState(s => ({ ...s, tareas: { ...s.tareas, items: s.tareas.items.filter(t => t.id !== id) } }));
    setTareaEditando(null);
    showToast('Tarea eliminada');

    (async () => {
      try {
        if (isPilot && tarea?.googleEventId) {
          try { await gcalApi.delete(tarea.googleEventId); }
          catch (e) { console.warn('gcal sync (delete tarea):', e?.message || e); }
        }
        await storage.deleteTarea(id);
        if (isPilot) bumpGcal();
      } catch (e) {
        handleErr(e, 'deleteTarea');
        setState(s => ({ ...s, tareas: { ...s.tareas, items: prev } }));
      }
    })();
  };

  // Archivar/Desarchivar tarea. Al archivar:
  //   - Se quita del state principal (no aparece en el kanban ni en notifs).
  //   - Si tiene evento en Google Calendar, se borra el evento (la tarea
  //     queda persistida en Supabase con archivada=true, pero deja de
  //     ocupar lugar en el calendario).
  // Al desarchivar:
  //   - Vuelve al state principal.
  //   - Si tenía fecha y no tiene evento Google, se recrea (solo piloto).
  const handleArchiveTarea = async (tareaObjOrId, archivar) => {
    if (guardReadOnly()) return;
    // Aceptamos tanto un objeto tarea (caso desarchivar desde buscador) como
    // un id (uso histórico). Resolvemos la tarea desde state si es posible.
    const id = typeof tareaObjOrId === 'object' ? tareaObjOrId.id : tareaObjOrId;
    const prev = state.tareas.items;
    const tarea = prev.find(t => t.id === id) || (typeof tareaObjOrId === 'object' ? tareaObjOrId : null);
    if (archivar) {
      // Optimistic: la sacamos del kanban.
      setState(s => ({ ...s, tareas: { ...s.tareas, items: s.tareas.items.filter(t => t.id !== id) } }));
      try {
        if (isPilot && tarea?.googleEventId) {
          try { await gcalApi.delete(tarea.googleEventId); }
          catch (e) { console.warn('gcal sync (archivar tarea):', e?.message || e); }
          await storage.updateTarea(id, { googleEventId: null });
          // Mutamos el objeto en memoria: si después se desarchiva en la
          // misma sesión, la rama de desarchivar va a leer este `googleEventId`
          // como null y va a recrear el evento Google correctamente.
          if (tarea) tarea.googleEventId = null;
        }
        await storage.updateTarea(id, { archivada: true });
        setTareaEditando(null);
        if (isPilot) bumpGcal();
        showToast('Tarea archivada');
      } catch (e) {
        handleErr(e, 'archivarTarea');
        setState(s => ({ ...s, tareas: { ...s.tareas, items: prev } }));
      }
    } else {
      // Desarchivar: la tarea no está en state (vino del buscador). La
      // insertamos al desarchivar y recreamos el evento Google si corresponde.
      try {
        await storage.updateTarea(id, { archivada: false });
        const tareaActualizada = { ...(tarea || {}), archivada: false, updatedAt: new Date().toISOString() };
        // Si el objeto trae un googleEventId, puede estar stale (al archivar
        // borramos el evento de Google, pero si veníamos de una sesión vieja
        // el `tarea` parameter conserva el id). Lo limpiamos por las dudas —
        // un delete a un evento ya borrado tira 404 que silenciamos.
        if (isPilot && tareaActualizada.googleEventId) {
          try { await gcalApi.delete(tareaActualizada.googleEventId); } catch (_) {}
          tareaActualizada.googleEventId = null;
          try { await storage.updateTarea(id, { googleEventId: null }); } catch (_) {}
        }
        setState(s => ({
          ...s,
          tareas: {
            ...s.tareas,
            items: s.tareas.items.some(t => t.id === id)
              ? s.tareas.items.map(t => t.id === id ? tareaActualizada : t)
              : [...s.tareas.items, tareaActualizada]
          }
        }));
        if (isPilot && tareaActualizada.fechaRecordatorio) {
          try {
            const fechaIso = new Date(`${tareaActualizada.fechaRecordatorio}T${(tareaActualizada.horaRecordatorio || '09:00')}:00`).toISOString();
            const evt = await gcalApi.create(buildGoogleEventBody({
              startIso: fechaIso,
              summary: tareaActualizada.titulo?.trim() || 'Tarea',
              description: tareaActualizada.observacion || '',
              tareaId: id,
            }));
            if (evt?.id) {
              await storage.updateTarea(id, { googleEventId: evt.id });
              // Sincronizamos el state local con el nuevo googleEventId
              // — si no, una edición posterior podría volver a crear evento
              // duplicado (mismo bug que en handleUpdateTarea).
              setState(s => ({
                ...s,
                tareas: { ...s.tareas, items: s.tareas.items.map(t => t.id === id ? { ...t, googleEventId: evt.id } : t) }
              }));
            }
          } catch (e) { console.warn('gcal sync (desarchivar tarea):', e?.message || e); }
        }
        setTareaEditando(null);
        if (isPilot) bumpGcal();
        showToast('Tarea desarchivada');
      } catch (e) {
        handleErr(e, 'desarchivarTarea');
      }
    }
  };

  // Click en "+ Nueva columna" abre modal. El modal hace la validación de
  // título no vacío y autofocus; al confirmar dispara handleConfirmAddColumna.
  const handleAddColumna = () => {
    if (guardReadOnly()) return;
    setAddingColumna(true);
  };
  const handleConfirmAddColumna = async (titulo) => {
    setAddingColumna(false);
    const t = (titulo || '').trim();
    if (!t) return;
    try {
      const orden = state.tareas.columnas.length;
      const c = await storage.createColumna(t, orden);
      setState(s => ({
        ...s,
        tareas: { ...s.tareas, columnas: [...s.tareas.columnas, c] }
      }));
    } catch (e) { handleErr(e, 'createColumna'); }
  };

  // El drop del drag de columna llama acá: en vez de mover directo, armamos
  // un modal de confirmación. Esto previene reorders accidentales (sobre todo
  // en mobile donde el long-press de header puede ser involuntario).
  const handleRequestMoveColumna = (columnaId, targetColumnaId, position) => {
    if (guardReadOnly()) return;
    if (columnaId === targetColumnaId) return;
    const cols = state.tareas?.columnas || [];
    const moving = cols.find(c => c.id === columnaId);
    const target = cols.find(c => c.id === targetColumnaId);
    if (!moving || !target) return;
    setPendingColMove({
      columnaId,
      targetColumnaId,
      position,
      movingName: moving.titulo,
      targetName: target.titulo,
    });
  };

  const handleConfirmMoveColumna = async () => {
    const req = pendingColMove;
    setPendingColMove(null);
    if (!req) return;
    if (guardReadOnly()) return;
    const { columnaId, targetColumnaId, position } = req;
    if (columnaId === targetColumnaId) return;
    const prev = state.tareas.columnas;
    const ordenadas = [...prev].sort((a, b) => (a.orden ?? 999) - (b.orden ?? 999));
    const moving = ordenadas.find(c => c.id === columnaId);
    if (!moving) return;
    const sinMover = ordenadas.filter(c => c.id !== columnaId);
    const targetIdx = sinMover.findIndex(c => c.id === targetColumnaId);
    if (targetIdx === -1) return;
    const insertIdx = position === 'after' ? targetIdx + 1 : targetIdx;
    sinMover.splice(insertIdx, 0, moving);
    const nuevas = sinMover.map((c, i) => ({ ...c, orden: i }));
    setState(s => ({ ...s, tareas: { ...s.tareas, columnas: nuevas } }));
    try {
      for (const c of nuevas) {
        const previo = prev.find(p => p.id === c.id);
        if (previo && previo.orden !== c.orden) {
          await storage.updateColumna(c.id, { orden: c.orden });
        }
      }
    } catch (e) {
      handleErr(e, 'moveColumna');
      setState(s => ({ ...s, tareas: { ...s.tareas, columnas: prev } }));
    }
  };

  const handleRenameColumna = async (columnaId, nuevoTitulo) => {
    if (guardReadOnly()) return;
    if (!nuevoTitulo || !nuevoTitulo.trim()) return;
    const col = state.tareas.columnas.find(c => c.id === columnaId);
    if (col?.protegida) {
      showToast('La columna "Abordar" no se puede renombrar');
      return;
    }
    const prev = state.tareas.columnas;
    setState(s => ({
      ...s,
      tareas: {
        ...s.tareas,
        columnas: s.tareas.columnas.map(c => c.id === columnaId ? { ...c, titulo: nuevoTitulo.trim() } : c)
      }
    }));
    try {
      await storage.updateColumna(columnaId, { titulo: nuevoTitulo.trim() });
    } catch (e) {
      handleErr(e, 'renameColumna');
      setState(s => ({ ...s, tareas: { ...s.tareas, columnas: prev } }));
    }
  };

  const handleDeleteColumna = async (columnaId) => {
    if (guardReadOnly()) return;
    const col = state.tareas.columnas.find(c => c.id === columnaId);
    if (col?.protegida) {
      showToast('La columna "Abordar" no se puede eliminar');
      return;
    }
    const tareasEnCol = state.tareas.items.filter(t => t.columnaId === columnaId);
    let msg = '¿Eliminar esta columna?';
    if (tareasEnCol.length > 0) {
      msg = `Esta columna tiene ${tareasEnCol.length} tarea${tareasEnCol.length === 1 ? '' : 's'}. Si la eliminás, esas tareas también se eliminan. ¿Continuar?`;
    }
    if (!confirm(msg)) return;
    try {
      // ANTES de borrar la columna (DB cascade borra las tareas), eliminamos
      // los eventos Google asociados a las tareas — sino quedarían huérfanos
      // en el calendar con abordaje_tarea_id apuntando a ids muertos.
      if (isPilot) {
        for (const t of tareasEnCol) {
          if (t.googleEventId) {
            try { await gcalApi.delete(t.googleEventId); }
            catch (e) { console.warn('gcal del tarea (deleteColumna):', e?.message || e); }
          }
        }
      }
      // El cascade del FK en DB borra las tareas asociadas
      await storage.deleteColumna(columnaId);
      setState(s => ({
        ...s,
        tareas: {
          ...s.tareas,
          columnas: s.tareas.columnas.filter(c => c.id !== columnaId),
          items: s.tareas.items.filter(t => t.columnaId !== columnaId)
        }
      }));
      if (isPilot) bumpGcal();
    } catch (e) { handleErr(e, 'deleteColumna'); }
  };

  const handleConvertirTareaAProspect = async (tareaId, nombre, apellido) => {
    if (guardReadOnly()) return;
    const tarea = state.tareas.items.find(t => t.id === tareaId);
    if (!tarea) return;
    const notasParts = [];
    if (tarea.titulo) notasParts.push(`Tarea original: ${tarea.titulo}`);
    if (tarea.observacion) notasParts.push(tarea.observacion);
    const observaciones = notasParts.join('\n\n');

    // Si la tarea tenía fecha, vamos a registrar un contacto inicial tipo
    // 'fecha_exacta' después de crear el prospect. Eso queda como gestión
    // visible en el historial Y dispara sincronizarSeguimiento que recrea
    // la tarea auto (lila) + evento Google asociada al prospect. Sin esto
    // el prospect quedaba con proximoContacto pero sin contactos[] →
    // deriveEstado decía 'nuevo' (incoherente).
    const tareaConFecha = !!tarea.fechaRecordatorio;
    const agendadoParaIso = tareaConFecha
      ? (tarea.horaRecordatorio
          ? `${tarea.fechaRecordatorio}T${tarea.horaRecordatorio}:00`
          : tarea.fechaRecordatorio)
      : null;

    const nombreCompleto = `${(nombre || '').trim()} ${(apellido || '').trim()}`.trim();

    try {
      const prospect = await storage.createProspecto({
        nombre: nombreCompleto,
        observaciones,
        // No pasamos proximoContacto acá: si la tarea tenía fecha, la setea
        // sincronizarSeguimiento abajo a través del contacto que se crea.
      });
      // Si la tarea tenía evento en Google Calendar, lo borramos antes de
      // eliminar la tarea — sino el evento queda huérfano con un
      // abordaje_tarea_id apuntando a un id que ya no existe.
      if (isPilot && tarea.googleEventId) {
        try { await gcalApi.delete(tarea.googleEventId); }
        catch (e) { console.warn('gcal del tarea (convertir):', e?.message || e); }
      }
      await storage.deleteTarea(tareaId);
      setState(s => ({
        ...s,
        prospectos: [prospect, ...s.prospectos],
        tareas: { ...s.tareas, items: s.tareas.items.filter(t => t.id !== tareaId) }
      }));
      // Si tenía fecha, registramos contacto inicial. sincronizarSeguimiento
      // se encarga de crear la tarea auto + evento Google nuevo.
      if (tareaConFecha) {
        await handleAddContacto(prospect.id, {
          tipo: 'fecha_exacta',
          agendadoPara: agendadoParaIso,
          observacion: tarea.titulo || 'Convertido desde tarea',
        });
      }
      if (isPilot) bumpGcal();
      setTareaEditando(null);
      setConvertirTareaId(null);
      showToast('Prospecto creado desde tarea');
    } catch (e) { handleErr(e, 'convertirTarea'); }
  };

  const selectedProspecto = state.prospectos.find(p => p.id === selectedId) || null;

  const filtrados = useMemo(
    () => aplicarFiltros(state.prospectos, filterEstado, filterFecha, filterEtiqueta, ordenFecha),
    [state.prospectos, filterEstado, filterFecha, filterEtiqueta, ordenFecha]
  );
  const hayFiltros = filterEstado !== 'todos' || filterFecha !== 'todos' || (filterEtiqueta?.length || 0) > 0 || ordenFecha !== 'ninguno';

  // Handler común para click en notifs y en buscador.
  // IMPORTANTE: declarado ANTES del early return de loading para no violar
  // Rules of Hooks (un useCallback debe llamarse siempre en el mismo orden).
  const handleNavToItem = useCallback((it) => {
    if (it.categoria === 'tarea_archivada' && it.tareaObj) {
      // Tarea archivada: no está en state.items, viene completa en tareaObj.
      setTareaEditando(it.tareaObj);
      return;
    }
    if (it.categoria === 'tarea' || it.tipo === 'tarea') {
      // Si la tarea viene de Google search puede no estar en state local todavía
      // (ej. dentro de rango por cargar); intentamos por id local primero.
      if (it.tareaId) {
        const t = state.tareas.items.find(x => x.id === it.tareaId);
        if (t) { setTareaEditando(t); return; }
      }
      // Fallback: si es un resultado de Google con tareaId pero la tarea no
      // está en cache, saltamos al calendario para que el user la ubique.
      setView('calendario');
    } else if (it.categoria === 'calendario' || it.tipo === 'agendado') {
      // Prioridad: si el resultado trae googleEvent (búsqueda en Google),
      // abrir directamente el modal de edición de agenda con ese evento.
      if (it.googleEvent) { setAgendaEditando({ googleEvent: it.googleEvent }); return; }
      if (it.prospectoId) setSelectedId(it.prospectoId);
      else setView('calendario');
    } else if (it.categoria === 'lista' && it.prospectoId) {
      setSelectedId(it.prospectoId);
    }
  }, [state.tareas, state.prospectos]);

  if (loading) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 20px',color:'var(--texto-suave)'}}>
        <div className="login-spinner" style={{borderColor:'rgba(62,64,149,0.25)',borderRightColor:'transparent'}}></div>
        <div style={{marginLeft:14}}>Cargando datos…</div>
      </div>
    );
  }

  return (
    <ActorContext.Provider value={{ actors: actorMap, agenteId: agente?.id }}>
    <EventColorContext.Provider value={{
      colors: state.eventColors || {},
      setColor: handleSetEventColor,
      calendarColors: settings.calendarColors || {},
    }}>
      <HeaderActions
        user={user}
        agente={agente}
        viewAs={viewAs}
        onExitViewAs={onExitViewAs}
        onLogout={onLogout}
        onOpenSettings={() => setShowSettings(true)}
        onChangePassword={viewAs ? null : () => setShowPassModal(true)}
        notifCount={notifUrgentes}
        onToggleBell={() => setBellOpen(o => !o)}
      />
      {showPassModal && (
        <ChangePasswordModal
          displayName={agente?.display_name || agente?.email || user?.email}
          onClose={() => setShowPassModal(false)}
        />
      )}
      <MountInSlot slotId="headerInstrucciones">
        <button className="header-btn" onClick={() => setShowInstrucciones(true)}
          title="Cómo usar Abordaje">Instrucciones</button>
      </MountInSlot>
      <MountInSlot slotId="headerSearch">
        <BuscadorGlobal state={state} isPilot={isPilot} onClickItem={handleNavToItem} />
      </MountInSlot>
      {showInstrucciones && (
        <InstruccionesModal onClose={() => setShowInstrucciones(false)} />
      )}
      {bellOpen && (
        <NotificacionesDropdown
          items={notificaciones}
          onClose={() => setBellOpen(false)}
          onClickItem={(it) => { setBellOpen(false); handleNavToItem(it); }}
          onDismiss={dismissNotif}
        />
      )}
      {viewAs && (
        <div className="view-as-banner">
          <div>
            👁 Estás viendo Abordaje como <strong>{viewAs.display_name || viewAs.email}</strong>
            <span className="view-as-readonly"> · solo lectura</span>
          </div>
          <button className="view-as-exit-btn" onClick={onExitViewAs}>← Volver a tu vista</button>
        </div>
      )}
      {isAssistant && !viewAs && (
        <div className="assistant-banner">
          ★ Estás trabajando como asistente de{' '}
          <strong>{principalProfile?.display_name || principalProfile?.email || '…'}</strong>
          <span className="assistant-banner-note"> · todo lo que hagas queda registrado con tu nombre</span>
        </div>
      )}

      {/* Header de página: solo las pestañas Lista/Tareas/Calendario.
          Las acciones (Excel, PDF, + Nuevo prospecto) bajan al renglón del
          FilterBar para ahorrar una línea. */}
      <div className="main-head-combined">
        <ViewTabs view={view} setView={setView} />
      </div>

      {view === 'lista' && (
        state.prospectos.length === 0 ? (
          <EmptyState onAdd={() => setShowAddModal(true)} />
        ) : (
          <>
            <FilterBar
              filterEstado={filterEstado}
              setFilterEstado={setFilterEstado}
              filterFecha={filterFecha}
              setFilterFecha={setFilterFecha}
              filterEtiqueta={filterEtiqueta}
              setFilterEtiqueta={setFilterEtiqueta}
              ordenFecha={ordenFecha}
              setOrdenFecha={setOrdenFecha}
              mostrandoCount={filtrados.length}
              totalCount={state.prospectos.length}
              extraActions={
                <>
                  <button className="btn-export" onClick={() => exportarProspectosExcel(state.prospectos)} title="Descargar lista en Excel">Excel</button>
                  <button className="btn-export" onClick={() => exportarProspectosPDF(state.prospectos, user)} title="Descargar lista en PDF">PDF</button>
                  {!readOnly && (
                    <button className="btn-primary" onClick={() => setShowAddModal(true)}>+ Nuevo prospecto</button>
                  )}
                </>
              }
            />
            {filtrados.length === 0 ? (
              <div className="empty">
                <div className="empty-title">Ningún prospecto coincide con los filtros</div>
                <div className="empty-text">Ajustá los filtros o limpiálos para ver toda la lista.</div>
                <button className="btn-secondary"
                  onClick={() => { setFilterEstado('todos'); setFilterFecha('todos'); setFilterEtiqueta([]); setOrdenFecha('ninguno'); }}>
                  Limpiar filtros
                </button>
              </div>
            ) : (
              <ProspectosTable prospectos={filtrados} onSelect={setSelectedId} />
            )}
          </>
        )
      )}

      {view === 'tareas' && (
        <TareasView
          tareasState={state.tareas}
          readOnly={readOnly}
          onAddTarea={handleAddTarea}
          onMoveTarea={handleMoveTarea}
          onEditarTarea={(t) => setTareaEditando(t)}
          onAddColumna={handleAddColumna}
          onRenameColumna={handleRenameColumna}
          onDeleteColumna={handleDeleteColumna}
          onMoveColumna={handleRequestMoveColumna}
        />
      )}

      {view === 'calendario' && (
        <>
          <FilterBar
            filterEstado={filterEstado}
            setFilterEstado={setFilterEstado}
            filterFecha={filterFecha}
            setFilterFecha={setFilterFecha}
            filterEtiqueta={filterEtiqueta}
            setFilterEtiqueta={setFilterEtiqueta}
            ordenFecha={ordenFecha}
            setOrdenFecha={setOrdenFecha}
            mostrandoCount={filtrados.length}
            totalCount={state.prospectos.length}
          />
          <CalendarioView
            prospectos={filtrados}
            tareasState={state.tareas}
            agendados={state.agendados}
            settings={settings}
            isPilot={isPilot}
            gcalReloadKey={gcalReloadKey}
            onSelectProspecto={setSelectedId}
            onSelectTarea={(t) => setTareaEditando(t)}
            onSelectAgenda={(a) => setAgendaEditando(a)}
            onSelectOrphan={(ev) => setPendingOrphanEvent(ev)}
            onSelectProspectoEvent={(ev) => setPendingProspectAgenda(ev)}
            onGcalActorIdsLoaded={handleGcalActorIdsLoaded}
            onOpenSettings={() => setShowSettings(true)}
            calendarColors={settings.calendarColors || {}}
            onSetCalendarColor={handleSetCalendarColor}
            onResetCalendarColors={handleResetCalendarColors}
            onMoveEvent={readOnly ? null : handleMoveEvent}
            onSlotClick={readOnly ? null : (date, hour, minute) => setSlotPicker({ date, hour, minute })}
          />
        </>
      )}

      {showAddModal && (
        <NuevoProspectoModal
          onCancel={() => setShowAddModal(false)}
          onSave={handleAdd}
        />
      )}

      {slotPicker && (
        <SlotChooserModal
          slot={slotPicker}
          onCancel={() => setSlotPicker(null)}
          onAgenda={() => handleCreateAgendaEnSlot(slotPicker)}
          onTarea={() => handleCreateTareaEnSlot(slotPicker)}
        />
      )}

      {nuevaAgendaSlot && (
        <NuevaAgendaModal
          slot={nuevaAgendaSlot}
          onCancel={() => setNuevaAgendaSlot(null)}
          onSave={(form) => handleSaveAgenda(nuevaAgendaSlot, form)}
        />
      )}

      {agendaEditando && (() => {
        const agendaId = agendaEditando.googleEvent ? agendaEditando.googleEvent.id : agendaEditando.id;
        const gcalCalId = agendaEditando.googleEvent?._gcalId || null;
        return (
          <EditAgendaModal
            agenda={agendaEditando}
            readOnly={readOnly}
            onCancel={() => setAgendaEditando(null)}
            onSave={(patch) => handleUpdateAgenda(agendaId, patch, gcalCalId)}
            onDelete={() => handleRequestDeleteAgenda(agendaEditando, agendaId, gcalCalId)}
          />
        );
      })()}

      {showSettings && (
        <SettingsModal
          settings={settings}
          agente={agente}
          currentUser={user}
          onViewAs={(p) => { onViewAs(p); setShowSettings(false); }}
          onCancel={() => setShowSettings(false)}
          onSave={(s) => { setSettings(s); persistSettings(s, user.id); showToast('Ajustes guardados'); }}
          onToggleGcal={handleToggleGcal}
          onLinkOAuth={handleLinkOAuth}
          onUnlinkOAuth={handleUnlinkOAuth}
          onToggleShareCalWithAssistant={handleToggleShareCalWithAssistant}
        />
      )}

      {tareaEditando && (
        <TareaModal
          tarea={tareaEditando}
          columnas={state.tareas.columnas}
          readOnly={readOnly}
          onClose={() => setTareaEditando(null)}
          onSave={(patch) => { handleUpdateTarea(tareaEditando.id, patch); setTareaEditando(null); }}
          onDelete={() => setPendingDeleteTarea(tareaEditando)}
          onArchive={() => handleArchiveTarea(tareaEditando, !tareaEditando.archivada)}
          onConvertir={() => setConvertirTareaId(tareaEditando.id)}
        />
      )}

      {convertirTareaId && (() => {
        const t = state.tareas.items.find(x => x.id === convertirTareaId);
        if (!t) { setConvertirTareaId(null); return null; }
        return (
          <ConvertirTareaModal
            tarea={t}
            onCancel={() => setConvertirTareaId(null)}
            onConfirm={(nombre, apellido) => handleConvertirTareaAProspect(t.id, nombre, apellido)}
          />
        );
      })()}

      {pendingColMove && (
        <ConfirmColMoveModal
          movingName={pendingColMove.movingName}
          targetName={pendingColMove.targetName}
          position={pendingColMove.position}
          onCancel={() => setPendingColMove(null)}
          onConfirm={handleConfirmMoveColumna}
        />
      )}

      {pendingDeleteProspect && (
        <ConfirmDeleteProspectModal
          prospect={pendingDeleteProspect}
          onCancel={() => setPendingDeleteProspect(null)}
          onConfirm={() => executeDeleteProspect(pendingDeleteProspect.id)}
        />
      )}

      {pendingDeleteTarea && (
        <ConfirmDeleteTareaModal
          tarea={pendingDeleteTarea}
          onCancel={() => setPendingDeleteTarea(null)}
          onUnlinkCalendar={async () => {
            const t = pendingDeleteTarea;
            setPendingDeleteTarea(null);
            await handleUpdateTarea(t.id, { fechaRecordatorio: null, horaRecordatorio: null });
            setTareaEditando(null);
            showToast('Tarea sacada del calendario');
          }}
          onDeleteAll={async () => {
            const t = pendingDeleteTarea;
            setPendingDeleteTarea(null);
            await handleDeleteTarea(t.id);
          }}
        />
      )}

      {pendingOrphanEvent && (
        <OrphanEventModal
          event={pendingOrphanEvent}
          onCancel={() => setPendingOrphanEvent(null)}
          onDelete={() => handleDeleteOrphanEvent(pendingOrphanEvent)}
        />
      )}

      {pendingDeleteAgenda && (
        <ConfirmDeleteAgendaModal
          isRecurring={pendingDeleteAgenda.isRecurring}
          onCancel={() => setPendingDeleteAgenda(null)}
          onConfirm={handleConfirmDeleteAgenda}
        />
      )}

      {addingColumna && (
        <AddColumnaModal
          onCancel={() => setAddingColumna(false)}
          onConfirm={handleConfirmAddColumna}
        />
      )}

      {pendingProspectAgenda && (() => {
        const prospect = state.prospectos.find(p => p.id === pendingProspectAgenda.prospectoId);
        return (
          <ProspectAgendaActionModal
            event={pendingProspectAgenda}
            prospectName={prospect?.nombre || pendingProspectAgenda.prospectoNombre || '(prospect)'}
            onCancel={() => setPendingProspectAgenda(null)}
            onSoloCalendar={handleSoloDelCalendarProspectAgenda}
            onOpenProspect={() => {
              const id = pendingProspectAgenda.prospectoId;
              setPendingProspectAgenda(null);
              setSelectedId(id);
            }}
          />
        );
      })()}

      {selectedProspecto && (
        <PanelLateral
          prospecto={selectedProspecto}
          settings={settings}
          readOnly={readOnly}
          onClose={() => setSelectedId(null)}
          onUpdate={(patch) => upsertProspecto(selectedProspecto.id, patch)}
          onDelete={() => handleDelete(selectedProspecto.id)}
          onAddContacto={(c) => handleAddContacto(selectedProspecto.id, c)}
          onEditContacto={(cid, patch) => handleEditContacto(selectedProspecto.id, cid, patch)}
          onDeleteContacto={(cid) => handleDeleteContacto(selectedProspecto.id, cid)}
        />
      )}
    </EventColorContext.Provider>
    </ActorContext.Provider>
  );
}

// ── HEADER ACTIONS (portal al header, con backup indicator + Ajustes) ─
function HeaderActions({ user, agente, viewAs, onExitViewAs, onLogout, onOpenSettings, onChangePassword, notifCount, onToggleBell }) {
  const esAdmin = agente?.role === 'admin';
  const displayName = agente?.display_name || user?.email || '';
  const enViewAs = !!viewAs;
  useEffect(() => {
    const target = document.getElementById('headerActions');
    if (!target) return;
    target.innerHTML = '';
    const mk = (txt, title, fn) => {
      const b = document.createElement('button');
      b.className = 'header-btn';
      b.textContent = txt;
      b.title = title;
      b.onclick = fn;
      return b;
    };
    // Campanita primero (visible para todos los users) — SVG vectorial blanco.
    // Uso createElementNS para garantizar el namespace correcto (innerHTML con
    // SVG inline a veces no renderiza porque parsea los <path> como HTML).
    if (onToggleBell) {
      const bell = document.createElement('button');
      bell.className = 'bell-btn';
      bell.title = notifCount > 0 ? `${notifCount} evento${notifCount === 1 ? '' : 's'} urgente${notifCount === 1 ? '' : 's'}` : 'Notificaciones';
      bell.onclick = onToggleBell;

      const SVG_NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(SVG_NS, 'svg');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'white');
      svg.setAttribute('stroke-width', '2');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      svg.setAttribute('width', '18');
      svg.setAttribute('height', '18');
      const p1 = document.createElementNS(SVG_NS, 'path');
      p1.setAttribute('d', 'M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9');
      const p2 = document.createElementNS(SVG_NS, 'path');
      p2.setAttribute('d', 'M13.73 21a2 2 0 0 1-3.46 0');
      svg.appendChild(p1);
      svg.appendChild(p2);
      bell.appendChild(svg);

      if (notifCount > 0) {
        const badge = document.createElement('span');
        badge.className = 'bell-badge';
        badge.textContent = notifCount > 9 ? '9+' : String(notifCount);
        bell.appendChild(badge);
      }
      target.appendChild(bell);
    }
    target.appendChild(mk('Ajustes', esAdmin ? 'Configuración y gestión de usuarios' : 'Configurar horario y vista', onOpenSettings));
    if (user) {
      const sep = document.createElement('div');
      sep.style.cssText = 'width:1px;height:22px;background:rgba(255,255,255,0.18);margin:0 4px;';
      target.appendChild(sep);
      if (esAdmin) {
        const badge = document.createElement('span');
        badge.className = 'header-admin-badge';
        badge.textContent = 'ADMIN';
        target.appendChild(badge);
      }
      const u = document.createElement('button');
      u.className = 'header-user';
      u.type = 'button';
      u.textContent = displayName;
      u.title = onChangePassword ? 'Cambiar contraseña' : user.email;
      if (onChangePassword) u.onclick = onChangePassword;
      target.appendChild(u);
