// Solo el megaadmin puede borrar usuarios. Cualquier admin puede crear/editar.
const MEGAADMIN_EMAIL = 'nortiz@ifs-broker.com';

function GoogleCalendarSection({ agente, onToggleGcal, onLinkOAuth, onUnlinkOAuth, onToggleShareCalWithAssistant }) {
  const enabled = !!agente?.gcal_enabled;
  const workspace = isWorkspaceUser(agente);
  const canLink = canLinkGoogleCalendar(agente);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);
  const [shareBusy, setShareBusy] = useState(false);

  // Si este agente tiene asistente(s) asignado(s) (alguien con
  // assistant_of_id = agente.id), mostramos el checkbox de consentimiento para
  // compartir el Google Calendar personal con su asistente.
  const [assistants, setAssistants] = useState([]);
  useEffect(() => {
    if (!agente?.id) { setAssistants([]); return; }
    let cancelled = false;
    sb.from('profiles')
      .select('id, email, display_name')
      .eq('assistant_of_id', agente.id)
      .then(({ data }) => { if (!cancelled) setAssistants(data || []); });
    return () => { cancelled = true; };
  }, [agente?.id]);
  const hasAssistant = assistants.length > 0;
  const shareEnabled = !!agente?.shares_calendar_with_assistant;

  const toggleWorkspace = async () => {
    if (busy) return;
    setErr(null); setBusy(true);
    try { await onToggleGcal(!enabled); }
    catch (e) { setErr(e?.message || String(e)); }
    finally { setBusy(false); }
  };
  const linkExternal = async () => {
    if (busy) return;
    setErr(null); setBusy(true);
    try { await onLinkOAuth(); }
    catch (e) { setErr(e?.message || String(e)); setBusy(false); }
    // No bajamos busy si fue exitoso: el browser redirige a Google.
  };
  const unlinkExternal = async () => {
    if (busy) return;
    if (!confirm('¿Desvincular Google Calendar? Las agendas existentes en Google quedan pero Abordaje deja de sincronizar.')) return;
    setErr(null); setBusy(true);
    try { await onUnlinkOAuth(); }
    catch (e) { setErr(e?.message || String(e)); }
    finally { setBusy(false); }
  };
  const toggleShare = async () => {
    if (shareBusy || !onToggleShareCalWithAssistant) return;
    const next = !shareEnabled;
    if (next && !confirm('Al activar esta opción, tu asistente va a poder ver y modificar TODOS los eventos de tu Google Calendar personal (no solo lo agendado desde Abordaje). ¿Confirmás?')) return;
    setErr(null); setShareBusy(true);
    try { await onToggleShareCalWithAssistant(next); }
    catch (e) { setErr(e?.message || String(e)); }
    finally { setShareBusy(false); }
  };

  return (
    <section style={adminSectionStyle}>
      <h3 style={adminSectionTitleStyle}>📅 Google Calendar</h3>
      <p style={adminSectionDescStyle}>
        Vinculá tu Google Calendar a Abordaje. Cuando esté activado:
      </p>
      <ul style={{ ...adminSectionDescStyle, paddingLeft: 18, margin: '6px 0 12px' }}>
        <li>Las agendas y tareas con fecha que cargues en Abordaje aparecen en tu Google Calendar (y se borran cuando las borrás acá).</li>
        <li>El calendario de Abordaje muestra todos tus eventos de Google.</li>
        <li>Cuando movés o borrás un evento en Google, el cambio se refleja en Abordaje al volver a abrir la tab.</li>
      </ul>

      {!canLink ? (
        <p style={adminSectionDescStyle}>
          Tu cuenta <strong>{agente?.email || '—'}</strong> no es una cuenta de Google.
          Para usar Google Calendar necesitás una cuenta @gmail.com o del dominio @{WORKSPACE_DOMAIN}.
        </p>
      ) : workspace ? (
        // Workspace: toggle simple, DWD lo activa automático.
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginTop: 10 }}>
          <div
            className={`toggle-switch ${enabled ? 'on' : ''}`}
            onClick={toggleWorkspace}
            role="switch"
            aria-checked={enabled}
            aria-disabled={busy}
            style={busy ? { opacity: 0.5, pointerEvents: 'none' } : undefined}
          />
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: '#1e1b4b' }}>
              {enabled ? 'Activado' : 'Desactivado'}
            </div>
            <div style={{ fontSize: 11, color: '#6b7280', marginTop: 2 }}>
              Cuenta: <strong>{agente?.email}</strong> · Vinculación automática vía Workspace.
            </div>
          </div>
        </div>
      ) : (
        // Gmail externo: botón "Vincular con Google" que abre OAuth.
        <div style={{ marginTop: 10 }}>
          {!enabled ? (
            <button onClick={linkExternal} disabled={busy} style={{
              background: '#fff', color: '#1e1b4b',
              border: '1.5px solid #d1d5db', borderRadius: 8,
              padding: '10px 16px', fontSize: 13, fontWeight: 600,
              cursor: busy ? 'wait' : 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 10,
              fontFamily: 'inherit',
            }}>
              <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" />
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" />
                <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" />
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" />
              </svg>
              {busy ? 'Redirigiendo a Google…' : 'Vincular con Google Calendar'}
            </button>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{
                background: '#f0fdf4', border: '1px solid #bbf7d0',
                color: '#15803d', borderRadius: 8, padding: '8px 12px',
                fontSize: 13, fontWeight: 600,
              }}>✓ Vinculado</div>
              <button onClick={unlinkExternal} disabled={busy} style={{
                background: '#fff', color: '#b91c1c',
                border: '1.5px solid #fecaca', borderRadius: 8,
                padding: '6px 14px', fontSize: 12, fontWeight: 600,
                cursor: busy ? 'wait' : 'pointer', fontFamily: 'inherit',
              }}>Desvincular</button>
            </div>
          )}
          <div style={{ fontSize: 11, color: '#6b7280', marginTop: 8 }}>
            Cuenta: <strong>{agente?.email}</strong>
            {!enabled && ' · Google te va a pedir permiso una sola vez.'}
          </div>
          <div style={{ fontSize: 10, color: '#9ca3af', marginTop: 4, fontStyle: 'italic' }}>
            Si Google muestra una pantalla "App no verificada", es esperado en
            modo de prueba — click en "Avanzado → Ir a Abordaje (no seguro)".
          </div>
        </div>
      )}

      {hasAssistant && enabled && (
        <div style={{
          marginTop: 18, padding: '12px 14px',
          background: '#fafafa', border: '1px solid #e5e7eb',
          borderRadius: 10,
        }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
            <div
              className={`toggle-switch ${shareEnabled ? 'on' : ''}`}
              onClick={toggleShare}
              role="switch"
              aria-checked={shareEnabled}
              aria-disabled={shareBusy}
              style={shareBusy ? { opacity: 0.5, pointerEvents: 'none', flexShrink: 0 } : { flexShrink: 0 }}
            />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1e1b4b' }}>
                Compartir mi Google Calendar con mi asistente
              </div>
              <div style={{ fontSize: 11, color: '#6b7280', marginTop: 4, lineHeight: 1.5 }}>
                {shareEnabled ? (
                  <>
                    <strong style={{ color: '#15803d' }}>Activado.</strong>{' '}
                    {assistants.length === 1
                      ? <><strong>{assistants[0].display_name || assistants[0].email}</strong> puede ver y modificar tu Google Calendar personal cuando trabaja como tu asistente.</>
                      : <>Tus asistentes pueden ver y modificar tu Google Calendar personal cuando trabajan como tu asistente.</>
                    }
                  </>
                ) : (
                  <>
                    Por defecto tu asistente solo ve lo que se carga desde Abordaje. Si activás
                    esta opción, tu asistente va a ver <strong>todos los eventos</strong> de tu
                    Google Calendar personal (no solo lo de Abordaje) y va a poder crear,
                    editar y borrar eventos en tu nombre.
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {err && (
        <div style={{ marginTop: 10, background:'#fef2f2', border:'1px solid #fecaca',
          color:'#b91c1c', borderRadius:8, padding:'8px 12px', fontSize:12 }}>
          {err}
        </div>
      )}
    </section>
  );
}

function UsuariosSection({ currentUser, onViewAs }) {
  const currentUserId = currentUser?.id;
  const esMegaAdmin = (currentUser?.email || '').toLowerCase() === MEGAADMIN_EMAIL;
  const [profiles, setProfiles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({ display_name: '', advisor_name_ole: '', role: 'agent', assistant_of_id: '' });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [creating, setCreating] = useState(false);
  const [newUser, setNewUser] = useState({ email: '', password: '', display_name: '', advisor_name_ole: '', role: 'agent', assistant_of_id: '' });
  const [createBusy, setCreateBusy] = useState(false);
  const [passEditingId, setPassEditingId] = useState(null);
  const [passDraft, setPassDraft] = useState('');
  const [passBusy, setPassBusy] = useState(false);
  const [emailEditingId, setEmailEditingId] = useState(null);
  const [emailDraft, setEmailDraft] = useState('');
  const [emailBusy, setEmailBusy] = useState(false);
  const [deletingId, setDeletingId] = useState(null);

  useEffect(() => {
    let mounted = true;
    loadAllProfiles().then(data => { if (mounted) { setProfiles(data); setLoading(false); } });
    return () => { mounted = false; };
  }, []);

  const startEdit = p => {
    setEditingId(p.id);
    setDraft({
      display_name: p.display_name || '',
      advisor_name_ole: p.advisor_name_ole || '',
      role: p.role || 'agent',
      assistant_of_id: p.assistant_of_id || '',
    });
    setError(null);
  };
  const cancelEdit = () => { setEditingId(null); setError(null); };

  const save = async id => {
    setSaving(true); setError(null);
    try {
      await updateProfile(id, {
        display_name: draft.display_name || null,
        advisor_name_ole: draft.advisor_name_ole || null,
        role: draft.role,
        assistant_of_id: draft.assistant_of_id || null,
      });
      setProfiles(ps => ps.map(p => p.id === id ? { ...p, ...draft, assistant_of_id: draft.assistant_of_id || null } : p));
      setEditingId(null);
    } catch (err) { setError(err.message); }
    setSaving(false);
  };

  const submitNewUser = async e => {
    e.preventDefault();
    setError(null); setCreateBusy(true);
    try {
      const created = await createUser(newUser);
      // Si se eligió un agente principal, marcar al user nuevo como su asistente.
      // La edge function create-user no soporta este campo, lo hacemos en una
      // segunda llamada con update (admin tiene permisos vía RLS).
      if (newUser.assistant_of_id) {
        await sb.from('profiles')
          .update({ assistant_of_id: newUser.assistant_of_id })
          .eq('id', created.id);
        created.assistant_of_id = newUser.assistant_of_id;
      }
      setProfiles(ps => [created, ...ps]);
      setNewUser({ email: '', password: '', display_name: '', advisor_name_ole: '', role: 'agent', assistant_of_id: '' });
      setCreating(false);
    } catch (err) { setError(err.message); }
    setCreateBusy(false);
  };

  const savePassword = async id => {
    setError(null);
    if (!passDraft || passDraft.length < 8) {
      setError('La contraseña debe tener al menos 8 caracteres');
      return;
    }
    setPassBusy(true);
    try {
      await updateUserPassword(id, passDraft);
      setPassEditingId(null);
      setPassDraft('');
    } catch (err) { setError(err.message); }
    setPassBusy(false);
  };

  const saveEmail = async id => {
    setError(null);
    const clean = (emailDraft || '').trim().toLowerCase();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(clean)) {
      setError('Email inválido');
      return;
    }
    setEmailBusy(true);
    try {
      await updateUserEmail(id, clean);
      setProfiles(ps => ps.map(p => p.id === id ? { ...p, email: clean } : p));
      setEmailEditingId(null);
      setEmailDraft('');
    } catch (err) { setError(err.message); }
    setEmailBusy(false);
  };

  const handleDelete = async p => {
    const label = p.display_name || p.email;
    if (!confirm(`¿Eliminar a "${label}"?\n\nEsto borra el usuario y todos sus datos en todas las apps IFS. No se puede deshacer.`)) {
      return;
    }
    setError(null);
    setDeletingId(p.id);
    try {
      await deleteUser(p.id);
      setProfiles(ps => ps.filter(x => x.id !== p.id));
    } catch (err) { setError(err.message); }
    setDeletingId(null);
  };

  return (
    <section style={adminSectionStyle}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
        <h3 style={adminSectionTitleStyle}>👥 Usuarios</h3>
        {!creating && (
          <button onClick={() => { setCreating(true); setError(null); }} style={adminBtnPrimary}>
            + Crear usuario
          </button>
        )}
      </div>
      <p style={adminSectionDescStyle}>
        Compartidos entre todas las apps IFS (Tablero, Abordaje, BTP, etc.) — un
        mismo email/contraseña entra en todas las herramientas bajo este Supabase.
      </p>

      {creating && (
        <form onSubmit={submitNewUser} style={{
          marginTop: 14, padding: 16,
          background: '#eef2ff', border: '1px solid #c7d2fe',
          borderRadius: 10,
        }}>
          <div style={{
            fontSize: 12, fontWeight: 700, color: '#4338ca', marginBottom: 12,
            textTransform: 'uppercase', letterSpacing: '0.05em',
          }}>
            Nuevo usuario
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
            <AdminField label="Email *">
              <input type="email" required value={newUser.email}
                onChange={e => setNewUser(u => ({ ...u, email: e.target.value }))}
                placeholder="agente@ifs-broker.com" style={adminInpStyle} />
            </AdminField>
            <AdminField label="Contraseña * (mín 8)">
              <input type="text" required minLength={8} value={newUser.password}
                onChange={e => setNewUser(u => ({ ...u, password: e.target.value }))}
                placeholder="Una contraseña fuerte" style={adminInpStyle} />
            </AdminField>
            <AdminField label="Nombre y apellido">
              <input value={newUser.display_name}
                onChange={e => setNewUser(u => ({ ...u, display_name: e.target.value }))}
                placeholder="Hernán Cardona" style={adminInpStyle} />
            </AdminField>
            <AdminField label="Asesor OLE (exacto)">
              <input value={newUser.advisor_name_ole}
                onChange={e => setNewUser(u => ({ ...u, advisor_name_ole: e.target.value }))}
                placeholder="HERNAN  CARDONA VALDES" style={adminInpStyle} />
            </AdminField>
            <AdminField label="Rol">
              <select value={newUser.role}
                onChange={e => setNewUser(u => ({ ...u, role: e.target.value }))}
                style={{ ...adminInpStyle, cursor: 'pointer' }}>
                <option value="agent">agent</option>
                <option value="admin">admin</option>
              </select>
            </AdminField>
            <AdminField label="Es asistente de (opcional)">
              <select value={newUser.assistant_of_id}
                onChange={e => setNewUser(u => ({ ...u, assistant_of_id: e.target.value }))}
                style={{ ...adminInpStyle, cursor: 'pointer' }}>
                <option value="">— No es asistente —</option>
                {profiles
                  .filter(p => !p.assistant_of_id) // un asistente no puede ser asistente de otro asistente
                  .map(p => (
                    <option key={p.id} value={p.id}>
                      {p.display_name || p.email}
                    </option>
                  ))}
              </select>
            </AdminField>
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 12 }}>
            <button type="button" onClick={() => { setCreating(false); setError(null); }} style={adminBtnGhost}>
              Cancelar
            </button>
            <button type="submit" disabled={createBusy} style={adminBtnPrimary}>
              {createBusy ? 'Creando…' : 'Crear usuario'}
            </button>
          </div>
        </form>
      )}

      <div style={{ marginTop: 14, overflowX: 'auto', borderRadius: 10, border: '1px solid #e5e7eb' }}>
        {loading ? (
          <div style={{ padding: 32, textAlign: 'center', color: '#9ca3af' }}>Cargando…</div>
        ) : profiles.length === 0 ? (
          <div style={{ padding: 32, textAlign: 'center', color: '#9ca3af' }}>Sin usuarios</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead style={{ background: '#f9fafb' }}>
              <tr style={{ borderBottom: '2px solid #e5e7eb' }}>
                <AdminTh>Nombre</AdminTh>
                <AdminTh>Email</AdminTh>
                <AdminTh>Asesor OLE</AdminTh>
                <AdminTh>Rol</AdminTh>
                <AdminTh right>Acciones</AdminTh>
              </tr>
            </thead>
            <tbody>
              {profiles.map(p => {
                const isEditing = editingId === p.id;
                return (
                  <tr key={p.id} style={{
                    borderBottom: '1px solid #f3f4f6',
                    background: isEditing ? '#eef2ff' : 'transparent',
                  }}>
                    <td style={adminTdStyle}>
                      {isEditing ? (
                        <input value={draft.display_name}
                          onChange={e => setDraft(d => ({ ...d, display_name: e.target.value }))}
                          placeholder="Nombre y apellido" style={adminInpStyle} />
                      ) : (
                        <div style={{ fontWeight: 600, color: '#1e1b4b' }}>
                          {p.display_name || <em style={{ color: '#9ca3af', fontWeight: 400 }}>sin nombre</em>}
                        </div>
                      )}
                    </td>
                    <td style={{ ...adminTdStyle, color: '#6b7280', fontSize: 12 }}>{p.email}</td>
                    <td style={adminTdStyle}>
                      {isEditing ? (
                        <input value={draft.advisor_name_ole}
                          onChange={e => setDraft(d => ({ ...d, advisor_name_ole: e.target.value }))}
                          placeholder="HERNAN  CARDONA VALDES" style={adminInpStyle} />
                      ) : (
                        <span style={{ fontSize: 11, color: '#6b7280', fontFamily: 'ui-monospace, monospace' }}>
                          {p.advisor_name_ole || '—'}
                        </span>
                      )}
                    </td>
                    <td style={adminTdStyle}>
                      {isEditing ? (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                          <select value={draft.role}
                            onChange={e => setDraft(d => ({ ...d, role: e.target.value }))}
                            style={{ ...adminInpStyle, cursor: 'pointer' }}>
                            <option value="agent">agent</option>
                            <option value="admin">admin</option>
                          </select>
                          <select value={draft.assistant_of_id}
                            onChange={e => setDraft(d => ({ ...d, assistant_of_id: e.target.value }))}
                            title="Marcar como asistente de otro agente"
                            style={{ ...adminInpStyle, cursor: 'pointer', fontSize: 11 }}>
                            <option value="">— No es asistente —</option>
                            {profiles
                              .filter(otro => otro.id !== p.id && !otro.assistant_of_id)
                              .map(otro => (
                                <option key={otro.id} value={otro.id}>
                                  Asistente de {otro.display_name || otro.email}
                                </option>
                              ))}
                          </select>
                        </div>
                      ) : (
                        <div>
                        <span style={{
                          display: 'inline-block', fontSize: 10, fontWeight: 800,
                          textTransform: 'uppercase', letterSpacing: '0.06em',
                          padding: '2px 8px', borderRadius: 4,
                          background: p.role === 'admin' ? '#7dd3fc' : '#e5e7eb',
                          color: p.role === 'admin' ? '#0c4a6e' : '#374151',
                        }}>
                          {p.role}
                        </span>
                        {p.assistant_of_id && (() => {
                          const principal = profiles.find(x => x.id === p.assistant_of_id);
                          return (
                            <div style={{
                              display: 'inline-block', marginLeft: 6,
                              fontSize: 10, color: '#f59e0b', fontWeight: 600,
                            }} title="Es asistente de otro agente">
                              ★ asist. de {principal?.display_name || principal?.email || '…'}
                            </div>
                          );
                        })()}
                        </div>
                      )}
                    </td>
                    <td style={{ ...adminTdStyle, textAlign: 'right', whiteSpace: 'nowrap' }}>
                      {isEditing ? (
                        <>
                          <button onClick={() => save(p.id)} disabled={saving} style={adminBtnPrimary}>
                            {saving ? 'Guardando…' : 'Guardar'}
                          </button>
                          <button onClick={cancelEdit} style={adminBtnGhost}>Cancelar</button>
                        </>
                      ) : passEditingId === p.id ? (
                        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                          <input
                            type="text" autoFocus
                            value={passDraft}
                            onChange={e => setPassDraft(e.target.value)}
                            placeholder="Nueva contraseña (mín 8)"
                            style={{ ...adminInpStyle, width: 200, marginRight: 4 }}
                          />
                          <button onClick={() => savePassword(p.id)} disabled={passBusy} style={adminBtnPrimary}>
                            {passBusy ? '…' : 'Guardar'}
                          </button>
                          <button onClick={() => { setPassEditingId(null); setPassDraft(''); setError(null); }} style={adminBtnGhost}>
                            Cancelar
                          </button>
                        </div>
                      ) : emailEditingId === p.id ? (
                        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                          <input
                            type="email" autoFocus
                            value={emailDraft}
                            onChange={e => setEmailDraft(e.target.value)}
                            placeholder="nuevo@email.com"
                            style={{ ...adminInpStyle, width: 240, marginRight: 4 }}
                          />
                          <button onClick={() => saveEmail(p.id)} disabled={emailBusy} style={adminBtnPrimary}>
                            {emailBusy ? '…' : 'Guardar'}
                          </button>
                          <button onClick={() => { setEmailEditingId(null); setEmailDraft(''); setError(null); }} style={adminBtnGhost}>
                            Cancelar
                          </button>
                        </div>
                      ) : (
                        <>
                          <button onClick={() => startEdit(p)} style={adminBtnGhost}>Editar</button>
                          <button onClick={() => { setEmailEditingId(p.id); setEmailDraft(p.email || ''); setError(null); }} style={adminBtnGhost} title="Cambiar email">
                            Email
                          </button>
                          <button onClick={() => { setPassEditingId(p.id); setPassDraft(''); setError(null); }} style={adminBtnGhost} title="Cambiar contraseña">
                            🔑 Pass
                          </button>
                          {onViewAs && p.id !== currentUserId && (
                            <button onClick={() => onViewAs(p)} style={adminBtnGhost} title={`Ver Abordaje como ${p.display_name || p.email}`}>
                              Ver como
                            </button>
                          )}
                          {esMegaAdmin && p.id !== currentUserId && (
                            <button
                              onClick={() => handleDelete(p)}
                              disabled={deletingId === p.id}
                              style={adminBtnDanger}
                              title={`Borrar ${p.display_name || p.email}`}
                            >
                              {deletingId === p.id ? '…' : 'Borrar'}
                            </button>
                          )}
                        </>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {error && (
        <div style={{
          marginTop: 12, padding: '10px 14px',
          background: '#fef2f2', border: '1px solid #fecaca',
          borderRadius: 8, fontSize: 12, color: '#dc2626',
        }}>
          {error}
        </div>
      )}
    </section>
  );
}

function SettingsModal({ settings, agente, currentUser, onViewAs, onCancel, onSave, onToggleGcal, onLinkOAuth, onUnlinkOAuth, onToggleShareCalWithAssistant }) {
  const [form, setForm] = useState({
    workStart: `${pad2(settings.workStartHour)}:${pad2(settings.workStartMin || 0)}`,
    workEnd: `${pad2(settings.workEndHour)}:${pad2(settings.workEndMin || 0)}`,
    slotDurationMin: settings.slotDurationMin,
    includeWeekends: !!settings.includeWeekends
  });

  const upd = (k, v) => setForm(f => ({...f, [k]: v}));

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const guardar = () => {
    const ts = parseHoraFlex(form.workStart);
    const te = parseHoraFlex(form.workEnd);
    if (!ts) { alert('Hora de inicio inválida'); return; }
    if (!te) { alert('Hora de fin inválida'); return; }
    const startMin = ts.h * 60 + ts.m;
    const endMin = te.h * 60 + te.m;
    if (endMin <= startMin) { alert('La hora de fin debe ser mayor que la de inicio'); return; }
    const dur = parseInt(form.slotDurationMin, 10);
    if (isNaN(dur) || dur < 15 || dur > 240) { alert('Duración entre 15 y 240 min'); return; }
    onSave({
      workStartHour: ts.h,
      workStartMin: ts.m,
      workEndHour: te.h,
      workEndMin: te.m,
      slotDurationMin: dur,
      includeWeekends: !!form.includeWeekends
    });
  };

  const esAdmin = agente?.role === 'admin';
  return (
    <div style={adminOverlayStyle} onClick={onCancel}>
      <div style={adminModalStyle} onClick={e => e.stopPropagation()}
        role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <header style={adminHeaderStyle}>
          <div>
            <div id="settings-title" style={{ fontSize: 16, fontWeight: 800, letterSpacing: '0.02em' }}>
              Ajustes
            </div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)', marginTop: 2 }}>
              {esAdmin ? 'Configuración personal + administración' : 'Configuración personal'}
            </div>
          </div>
          <button onClick={onCancel} style={adminCloseBtn}>Cerrar</button>
        </header>

        <div style={{ overflowY: 'auto', flex: 1 }}>
          <section style={adminSectionStyle}>
            <h3 style={adminSectionTitleStyle}>⚙ Configuración de Abordaje</h3>
            <p style={adminSectionDescStyle}>
              Aplica solo a tu vista. Horario laboral, duración default de citas y opciones del calendario.
            </p>

            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>
                Horario laboral
              </div>
              <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
                <AdminField label="Hora inicio (24h)">
                  <HoraTexto value={form.workStart} onChange={(v) => upd('workStart', v)} />
                </AdminField>
                <AdminField label="Hora fin (24h)">
                  <HoraTexto value={form.workEnd} onChange={(v) => upd('workEnd', v)} />
                </AdminField>
              </div>
            </div>

            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>
                Duración default de reunión
              </div>
              <select value={form.slotDurationMin}
                onChange={e => upd('slotDurationMin', e.target.value)}
                style={{ ...adminInpStyle, width: 'auto', cursor: 'pointer' }}>
                <option value="15">15 min</option>
                <option value="30">30 min</option>
                <option value="45">45 min</option>
                <option value="60">60 min</option>
                <option value="90">90 min</option>
                <option value="120">120 min</option>
              </select>
            </div>

            <div style={{ marginTop: 18, display: 'flex', alignItems: 'center', gap: 12 }}>
              <div
                className={`toggle-switch ${form.includeWeekends ? 'on' : ''}`}
                onClick={() => upd('includeWeekends', !form.includeWeekends)}
                role="switch"
                aria-checked={form.includeWeekends}
              />
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: '#1e1b4b' }}>Incluir fin de semana</div>
                <div style={{ fontSize: 11, color: '#6b7280', marginTop: 2 }}>
                  Vista Semana: ON = 7 días · OFF = solo Lun–Vie.
                </div>
              </div>
            </div>

            <div style={{ marginTop: 18, display: 'flex', justifyContent: 'flex-end' }}>
              <button onClick={guardar} style={adminBtnPrimary}>Guardar configuración</button>
            </div>
          </section>

          <GoogleCalendarSection
            agente={agente}
            onToggleGcal={onToggleGcal}
            onLinkOAuth={onLinkOAuth}
            onUnlinkOAuth={onUnlinkOAuth}
            onToggleShareCalWithAssistant={onToggleShareCalWithAssistant}
          />

          {esAdmin && <UsuariosSection currentUser={currentUser} onViewAs={onViewAs} />}
        </div>
      </div>
    </div>
  );
}

// ── KANBAN: VISTA TAREAS ──────────────────────────────────────
function TareasView({ tareasState, readOnly, onAddTarea, onMoveTarea, onEditarTarea, onAddColumna, onRenameColumna, onDeleteColumna, onMoveColumna }) {
  const cols = [...tareasState.columnas].sort((a, b) => (a.orden ?? 999) - (b.orden ?? 999));
  return (
    <div className="kanban-wrap">
      {cols.map(col => {
        const items = tareasState.items.filter(t => t.columnaId === col.id);
        return (
          <TareaColumna
            key={col.id}
            columna={col}
            tareas={items}
            readOnly={readOnly}
            onRename={(nuevo) => onRenameColumna(col.id, nuevo)}
            onDelete={() => onDeleteColumna(col.id)}
            onAddTarea={(titulo) => onAddTarea(col.id, titulo)}
            onMoveTarea={onMoveTarea}
            onMoveColumna={onMoveColumna}
            onEditarTarea={onEditarTarea}
          />
        );
      })}
      {!readOnly && (
        <button className="kanban-add-col" onClick={onAddColumna}>+ Nueva columna</button>
      )}
    </div>
  );
}

function TareaColumna({ columna, tareas, readOnly, onRename, onDelete, onAddTarea, onMoveTarea, onMoveColumna, onEditarTarea }) {
  const [tituloEdit, setTituloEdit] = useState(columna.titulo);
  const [agregando, setAgregando] = useState(false);
  const [nuevoTitulo, setNuevoTitulo] = useState('');
  const cancelRef = useRef(false);
  const colRef = useRef(null);
  const headRef = useRef(null);
  const colDragRef = useRef({ active: false, captured: false, startX: 0, pointerId: null, armed: false });
  // pendingTouchRef: misma idea que en TareaCard — esperamos 400ms con dedo
  // quieto sobre el header antes de armar el drag de la columna en touch.
  const pendingTouchRef = useRef(null);
  const [armed, setArmed] = useState(false);
  useEffect(() => { setTituloEdit(columna.titulo); }, [columna.titulo]);

  const commitTitulo = () => {
    const t = tituloEdit.trim();
    if (!t) { setTituloEdit(columna.titulo); return; }
    if (t !== columna.titulo) onRename(t);
  };

  const onInputKey = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const t = nuevoTitulo.trim();
      if (t) { onAddTarea(t); setNuevoTitulo(''); }
    } else if (e.key === 'Escape') {
      cancelRef.current = true;
      setNuevoTitulo('');
      setAgregando(false);
    }
  };
  const onInputBlur = () => {
    if (cancelRef.current) { cancelRef.current = false; return; }
    const t = nuevoTitulo.trim();
    if (t) onAddTarea(t);
    setNuevoTitulo('');
    setAgregando(false);
  };

  // ── Drag de columna (pointer events sobre el header, excepto inputs/buttons) ──
  // Mouse: drag inmediato con threshold de 6px.
  // Touch: long-press de 400ms antes de armar el drag.
  const clearColDropMarkers = () => {
    document.querySelectorAll('.kanban-col.col-drop-before, .kanban-col.col-drop-after')
      .forEach(n => n.classList.remove('col-drop-before', 'col-drop-after'));
  };

  const clearTouchPending = () => {
    const p = pendingTouchRef.current;
    if (!p) return;
    if (p.timerId) clearTimeout(p.timerId);
    document.removeEventListener('pointermove', p.onMoveWait);
    document.removeEventListener('pointerup', p.onUpWait);
    document.removeEventListener('pointercancel', p.onUpWait);
    pendingTouchRef.current = null;
  };

  useEffect(() => () => {
    clearTouchPending();
    if (document.body.classList.contains('kanban-dragging')) {
      document.body.classList.remove('kanban-dragging');
    }
  }, []);

  const onHeadPointerDown = (e) => {
    if (readOnly) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    // No iniciar drag si el click va sobre un input o botón del header
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'BUTTON' || tag === 'TEXTAREA') return;
    if (colDragRef.current.active || pendingTouchRef.current) return;

    if (e.pointerType === 'touch') {
      const startX = e.clientX, startY = e.clientY;
      const pointerId = e.pointerId;
      const onMoveWait = (ev) => {
        const moved = Math.hypot(ev.clientX - startX, ev.clientY - startY);
        if (moved > 8) clearTouchPending();
      };
      const onUpWait = () => {
        // Soltó antes del long-press = tap inocuo sobre el header (sin acción).
        clearTouchPending();
      };
      document.addEventListener('pointermove', onMoveWait);
      document.addEventListener('pointerup', onUpWait);
      document.addEventListener('pointercancel', onUpWait);
      const timerId = setTimeout(() => {
        const p = pendingTouchRef.current;
        if (!p) return;
        document.removeEventListener('pointermove', p.onMoveWait);
        document.removeEventListener('pointerup', p.onUpWait);
        document.removeEventListener('pointercancel', p.onUpWait);
        pendingTouchRef.current = null;
        setArmed(true);
        document.body.classList.add('kanban-dragging');
        colDragRef.current = { active: true, captured: false, startX, pointerId, armed: true };
      }, 400);
      pendingTouchRef.current = { startX, startY, pointerId, timerId, onMoveWait, onUpWait };
    } else {
      colDragRef.current = { active: true, captured: false, startX: e.clientX, pointerId: e.pointerId, armed: false };
    }
  };

  const onHeadPointerMove = (e) => {
    if (pendingTouchRef.current) return;
    const ds = colDragRef.current;
    if (!ds.active) return;
    const dx = e.clientX - ds.startX;
    const threshold = ds.armed ? 0 : 6;
    if (!ds.captured && Math.abs(dx) > threshold) {
      ds.captured = true;
      try { headRef.current.setPointerCapture(e.pointerId); } catch (_) {}
      colRef.current?.classList.add('col-dragging');
    }
    if (ds.captured) {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const overCol = el && el.closest ? el.closest('.kanban-col') : null;
      clearColDropMarkers();
      if (overCol && overCol !== colRef.current) {
        const rect = overCol.getBoundingClientRect();
        const isLeftHalf = e.clientX < rect.left + rect.width / 2;
        overCol.classList.add(isLeftHalf ? 'col-drop-before' : 'col-drop-after');
      }
    }
  };

  const finishHeadDrag = (e, commit) => {
    const ds = colDragRef.current;
    if (!ds.active) return;
    if (ds.captured) {
      try { headRef.current.releasePointerCapture(ds.pointerId); } catch (_) {}
      colRef.current?.classList.remove('col-dragging');
      if (commit) {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const overCol = el && el.closest ? el.closest('.kanban-col') : null;
        if (overCol && overCol !== colRef.current) {
          const rect = overCol.getBoundingClientRect();
          const isLeftHalf = e.clientX < rect.left + rect.width / 2;
          const targetId = overCol.dataset.colId;
          if (targetId && targetId !== columna.id && typeof onMoveColumna === 'function') {
            // Disparamos el request — el App muestra modal de confirmación.
            onMoveColumna(columna.id, targetId, isLeftHalf ? 'before' : 'after');
          }
        }
      }
      clearColDropMarkers();
    }
    document.body.classList.remove('kanban-dragging');
    setArmed(false);
    colDragRef.current = { active: false, captured: false, startX: 0, pointerId: null, armed: false };
  };

  return (
    <div
      ref={colRef}
      className={`kanban-col ${columna.protegida ? 'kanban-col-protegida' : ''}`}
      data-col-id={columna.id}
    >
      <div
        ref={headRef}
        className={`kanban-col-head ${armed ? 'long-press-armed' : ''}`}
        onPointerDown={onHeadPointerDown}
        onPointerMove={onHeadPointerMove}
        onPointerUp={(e) => finishHeadDrag(e, true)}
        onPointerCancel={(e) => finishHeadDrag(e, false)}
      >
        <input
          className="kanban-col-titulo"
          value={tituloEdit}
          readOnly={!!columna.protegida}
          title={columna.protegida ? 'Columna fija — no se puede renombrar' : undefined}
          onChange={(e) => setTituloEdit(e.target.value)}
          onBlur={commitTitulo}
          onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') { setTituloEdit(columna.titulo); e.target.blur(); } }}
          aria-label="Nombre de columna"
        />
        <ActorStar item={columna} />
        <span className="kanban-col-count">{tareas.length}</span>
        {!columna.protegida && (
          <button className="kanban-col-del" onClick={onDelete} title="Eliminar columna" aria-label="Eliminar columna">×</button>
        )}
      </div>
      <div
        className="kanban-col-body"
        data-col-id={columna.id}
      >
        {tareas.length === 0 ? (
          <div className="kanban-col-empty">Sin tareas</div>
        ) : (
          tareas.map(t => <TareaCard key={t.id} tarea={t} readOnly={readOnly} onClick={() => onEditarTarea(t)} onMoveTarea={onMoveTarea} />)
        )}
      </div>
      {!readOnly && (agregando ? (
        <input
          className="kanban-col-add-input"
          autoFocus
          placeholder="Título de la tarea (Enter para guardar)"
          value={nuevoTitulo}
          onChange={(e) => setNuevoTitulo(e.target.value)}
          onKeyDown={onInputKey}
          onBlur={onInputBlur}
        />
      ) : (
        <button className="kanban-col-add" onClick={() => setAgregando(true)}>+ Nueva tarea</button>
      ))}
    </div>
  );
}

function TareaCard({ tarea, readOnly, onClick, onMoveTarea }) {
  const cardRef = useRef(null);
  const dragRef = useRef({ active: false, startX: 0, startY: 0, dragging: false, pointerId: null });
  // pendingTouchRef: fase de espera del long-press en touch. Mientras está
  // activa, escuchamos pointermove a nivel document para detectar si el dedo
  // se movió >8px (= el user está scrolleando, cancelamos) o se soltó antes
  // de los 400ms (= tap, abrimos el editor).
  const pendingTouchRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const [armed, setArmed] = useState(false);

  const fechaTxt = tarea.fechaRecordatorio
    ? (tarea.horaRecordatorio
        ? `${formatFechaCorta(tarea.fechaRecordatorio)} ${tarea.horaRecordatorio}`
        : formatFechaCorta(tarea.fechaRecordatorio))
    : null;
  // Vencida si la fecha (con o sin hora) ya pasó
  let vencida = false;
  if (tarea.fechaRecordatorio) {
    const ref = tarea.horaRecordatorio
      ? new Date(`${tarea.fechaRecordatorio}T${tarea.horaRecordatorio}:00`)
      : new Date(`${tarea.fechaRecordatorio}T23:59:59`);
    vencida = ref < new Date();
  }

  const clearDragOver = () => {
    document.querySelectorAll('.kanban-col-body.drag-over').forEach(n => n.classList.remove('drag-over'));
  };

  const clearTouchPending = () => {
    const p = pendingTouchRef.current;
    if (!p) return;
    if (p.timerId) clearTimeout(p.timerId);
    document.removeEventListener('pointermove', p.onMoveWait);
    document.removeEventListener('pointerup', p.onUpWait);
    document.removeEventListener('pointercancel', p.onUpWait);
    pendingTouchRef.current = null;
  };

  // Limpieza si el componente se desmonta mid-gesture.
  useEffect(() => () => {
    clearTouchPending();
    if (document.body.classList.contains('kanban-dragging')) {
      document.body.classList.remove('kanban-dragging');
    }
  }, []);

  const onPointerDown = (e) => {
    if (readOnly) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (dragRef.current.active || pendingTouchRef.current) return;

    if (e.pointerType === 'touch') {
      // Touch: esperamos 400ms con dedo quieto antes de armar el drag.
      const startX = e.clientX, startY = e.clientY;
      const pointerId = e.pointerId;
      const onMoveWait = (ev) => {
        const moved = Math.hypot(ev.clientX - startX, ev.clientY - startY);
        if (moved > 8) clearTouchPending();
      };
      const onUpWait = () => {
        // Soltó antes del long-press = tap → abrir editor.
        clearTouchPending();
        onClick();
      };
      document.addEventListener('pointermove', onMoveWait);
      document.addEventListener('pointerup', onUpWait);
      document.addEventListener('pointercancel', onUpWait);
      const timerId = setTimeout(() => {
        const p = pendingTouchRef.current;
        if (!p) return;
        // Long-press completo: cleanup listeners de espera y pasamos a drag.
        document.removeEventListener('pointermove', p.onMoveWait);
        document.removeEventListener('pointerup', p.onUpWait);
        document.removeEventListener('pointercancel', p.onUpWait);
        pendingTouchRef.current = null;
        setArmed(true);
        document.body.classList.add('kanban-dragging');
        dragRef.current = {
          active: true, startX, startY,
          dragging: false, pointerId,
        };
        try { cardRef.current.setPointerCapture(pointerId); } catch (_) {}
      }, 400);
      pendingTouchRef.current = { startX, startY, pointerId, timerId, onMoveWait, onUpWait };
    } else {
      // Mouse: drag inmediato (threshold de 6px de movimiento para distinguir
      // click de drag real).
      dragRef.current = { active: true, startX: e.clientX, startY: e.clientY, dragging: false, pointerId: e.pointerId };
    }
  };

  const onPointerMove = (e) => {
    // Si estamos en la fase de espera del long-press, los listeners de
    // document hacen el trabajo (cancelar si se movió >8px). Acá no hacemos
    // nada para no interferir.
    if (pendingTouchRef.current) return;

    const ds = dragRef.current;
    if (!ds.active) return;
    const dx = e.clientX - ds.startX;
    const dy = e.clientY - ds.startY;
    // Si el drag viene de long-press (armed=true), cualquier movimiento ya
    // cuenta como drag. En mouse, threshold 6px.
    const threshold = armed ? 0 : 6;
    if (!ds.dragging && Math.hypot(dx, dy) > threshold) {
      ds.dragging = true;
      if (!armed) {
        try { cardRef.current.setPointerCapture(e.pointerId); } catch (_) {}
      }
      setDragging(true);
    }
    if (ds.dragging) {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const colBody = el && el.closest ? el.closest('.kanban-col-body') : null;
      document.querySelectorAll('.kanban-col-body.drag-over').forEach(n => {
        if (n !== colBody) n.classList.remove('drag-over');
      });
      if (colBody && colBody.dataset.colId !== tarea.columnaId) {
        colBody.classList.add('drag-over');
      }
    }
  };

  const finishDrag = (e, commit) => {
    const ds = dragRef.current;
    if (!ds.active) return;
    if (ds.dragging) {
      try { cardRef.current.releasePointerCapture(ds.pointerId); } catch (_) {}
      if (commit) {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const colBody = el && el.closest ? el.closest('.kanban-col-body') : null;
        const colId = colBody && colBody.dataset ? colBody.dataset.colId : null;
        if (colId && colId !== tarea.columnaId) onMoveTarea(tarea.id, colId);
      }
      clearDragOver();
      setDragging(false);
    } else if (commit && !armed) {
      // Mouse sin drag = click. (Touch sin drag ya se manejó en onUpWait.)
      onClick();
    }
    document.body.classList.remove('kanban-dragging');
    setArmed(false);
    dragRef.current = { active: false, startX: 0, startY: 0, dragging: false, pointerId: null };
  };

  const onPointerUp = (e) => finishDrag(e, true);
  const onPointerCancel = (e) => finishDrag(e, false);

  return (
    <div
      ref={cardRef}
      className={`tarea-card activated ${dragging ? 'dragging' : ''} ${armed ? 'long-press-armed' : ''} ${tarea.prospectoId ? 'tarea-auto' : ''}`}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerCancel}
      role="button"
      tabIndex={0}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick(); } }}
    >
      <div className={`tarea-card-titulo ${tarea.titulo ? '' : 'empty'}`}>
        <ActorStar item={tarea} />
        {tarea.titulo || '(sin título)'}
      </div>
      {fechaTxt && (
        <div className={`tarea-card-fecha ${vencida ? 'vencida' : ''}`}>{fechaTxt}</div>
      )}
      {tarea.observacion && (() => {
        // La bitácora es un string con entradas separadas por línea en blanco.
        // En la card mostramos sólo la primera entrada (= la más reciente),
        // con su timestamp como badge si tiene formato [DD/MM/YYYY HH:MM].
        const primera = tarea.observacion.split(/\n\n+/)[0] || '';
        const m = primera.match(/^\[([^\]]+)\]\s*([\s\S]*)$/);
        const fecha = m ? m[1] : '';
        const texto = (m ? m[2] : primera).replace(/\n/g, ' ').trim();
        return (
          <div className="tarea-card-obs">
            {fecha && <span className="tarea-card-obs-fecha">{fecha}</span>}
            {texto}
          </div>
        );
      })()}
    </div>
  );
}

// ── MODAL EDICIÓN DE TAREA ─────────────────────────────────────
function TareaModal({ tarea, columnas, readOnly, onClose, onSave, onDelete, onArchive, onConvertir }) {
  const [form, setForm] = useState({
    titulo: tarea.titulo || '',
    columnaId: tarea.columnaId,
    fechaRecordatorio: tarea.fechaRecordatorio || '',
    horaRecordatorio: tarea.horaRecordatorio || '',
    observacion: tarea.observacion || '',
  });
  const [nuevaEntrada, setNuevaEntrada] = useState('');
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  const cols = [...columnas].sort((a, b) => (a.orden ?? 999) - (b.orden ?? 999));

  // La bitácora se construye prepending cada entrada nueva con timestamp local;
  // las entradas previas (incluso sin timestamp por migración) se conservan abajo.
  const buildObsConBitacora = () => {
    const txt = nuevaEntrada.trim();
    if (!txt) return form.observacion;
    const d = new Date();
    const stamp = `${dateToDDMMYY(d)} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    const entrada = `[${stamp}] ${txt}`;
    return form.observacion ? `${entrada}\n\n${form.observacion}` : entrada;
  };

  const guardar = () => {
    onSave({
      titulo: form.titulo.trim(),
      columnaId: form.columnaId,
      fechaRecordatorio: form.fechaRecordatorio || null,
      horaRecordatorio: form.horaRecordatorio || null,
      observacion: buildObsConBitacora().trim(),
    });
  };

  // Quick-date: setea fecha/hora y guarda en un solo tap.
  const aplicarQuickDate = (fecha, hora) => {
    onSave({
      titulo: form.titulo.trim(),
      columnaId: form.columnaId,
      fechaRecordatorio: fecha,
      horaRecordatorio: hora,
      observacion: buildObsConBitacora().trim(),
    });
  };
  const quickHoy = () => {
    const now = new Date();
    const t = new Date(now.getTime() + 3 * 60 * 60 * 1000);
    // Si +3h cae mañana, cap a hoy 23:30
    if (t.toDateString() !== now.toDateString()) {
      t.setTime(now.getTime());
      t.setHours(23, 30, 0, 0);
    }
    aplicarQuickDate(
      `${t.getFullYear()}-${pad2(t.getMonth()+1)}-${pad2(t.getDate())}`,
      `${pad2(t.getHours())}:${pad2(t.getMinutes())}`
    );
  };
  const quickManana = () => {
    const t = new Date();
    t.setDate(t.getDate() + 1);
    aplicarQuickDate(
      `${t.getFullYear()}-${pad2(t.getMonth()+1)}-${pad2(t.getDate())}`,
      '09:00'
    );
  };
  const quickProxSemana = () => {
    const t = new Date();
    const dow = t.getDay(); // 0=domingo, 1=lunes…
    // Días hasta el próximo lunes (si hoy es lunes, va al lunes siguiente).
    const diff = ((8 - dow) % 7) || 7;
    t.setDate(t.getDate() + diff);
    aplicarQuickDate(
      `${t.getFullYear()}-${pad2(t.getMonth()+1)}-${pad2(t.getDate())}`,
      '09:00'
    );
  };
  // Quitar el recordatorio: la tarea queda en el Kanban como bitácora pero
  // sin fecha → se va el rojo de "vencida" y handleUpdateTarea borra el
  // evento Google automáticamente (rama `merged.googleEventId && !hasFecha`).
  const quickQuitar = () => {
    aplicarQuickDate(null, null);
  };

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <form className="modal" role="dialog" aria-modal="true" aria-labelledby="tarea-modal-title"
        onSubmit={(e) => { e.preventDefault(); if (!readOnly) guardar(); }}>
        <div className="modal-header">
          <h3 id="tarea-modal-title">{readOnly ? 'Detalle de tarea' : 'Editar tarea'}</h3>
          <button type="button" className="modal-close" onClick={onClose} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          {!readOnly && (
            <>
              <div className="quick-date-title">Recordatorio rápido</div>
              <div className="quick-date-row" aria-label="Recordatorio rápido">
                <button type="button" className="btn-quick-date" onClick={quickHoy}
                  title="Recordatorio hoy en ~3 horas">
                  Hoy<small>en 3 hs</small>
                </button>
                <button type="button" className="btn-quick-date" onClick={quickManana}
                  title="Recordatorio mañana 9:00">
                  Mañana<small>9:00</small>
                </button>
                <button type="button" className="btn-quick-date" onClick={quickProxSemana}
                  title="Recordatorio próximo lunes 9:00">
                  Próx semana<small>lun 9:00</small>
                </button>
                {form.fechaRecordatorio && (
                  <button type="button" className="btn-quick-date muted" onClick={quickQuitar}
                    title="Quitar la fecha, sacar del calendar — la tarea sigue en el Kanban">
                    Quitar<small>recordatorio</small>
                  </button>
                )}
              </div>
            </>
          )}
          <div className="field">
            <label>Título</label>
            <input type="text" value={form.titulo} autoFocus={!readOnly} readOnly={readOnly}
              onChange={e => upd('titulo', e.target.value)}
              placeholder="Ej: Cotización Pérez, Llamar a Juan" />
          </div>
          <div className="field-row">
            <div className="field">
              <label>Columna</label>
              <select value={form.columnaId} disabled={readOnly} onChange={e => upd('columnaId', e.target.value)}>
                {cols.map(c => <option key={c.id} value={c.id}>{c.titulo}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Fecha recordatorio</label>
              <input type="date" value={form.fechaRecordatorio || ''} readOnly={readOnly}
                onChange={e => upd('fechaRecordatorio', e.target.value)} />
            </div>
          </div>
          <div className="field">
            <label>Hora (opcional, si tiene fecha)</label>
            {readOnly || !form.fechaRecordatorio ? (
              <input type="time" value={form.horaRecordatorio || ''} readOnly disabled />
            ) : (
              <HoraTexto value={form.horaRecordatorio || ''}
                onChange={(v) => upd('horaRecordatorio', v)} />
            )}
          </div>
          {!readOnly && (
            <div className="field">
              <label>Nueva entrada de bitácora <span style={{fontWeight:400, color:'var(--texto-suave)', fontSize:'0.72rem'}}>(Enter guarda · Shift+Enter nueva línea)</span></label>
              <textarea value={nuevaEntrada}
                onChange={e => setNuevaEntrada(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
                    e.preventDefault();
                    guardar();
                  }
                }}
                placeholder="Al guardar se agrega arriba con fecha y hora..."
                rows={3} />
            </div>
          )}
          {form.observacion && (
            <div className="field">
              <label>Bitácora {!readOnly && <span style={{fontWeight:400, color:'var(--texto-suave)', fontSize:'0.72rem'}}>(editable — podés corregir entradas anteriores)</span>}</label>
              <textarea className="bitacora-view" value={form.observacion}
                readOnly={readOnly}
                onChange={e => upd('observacion', e.target.value)}
                rows={Math.min(10, Math.max(4, form.observacion.split('\n').length))} />
            </div>
          )}
          {/* Acciones secundarias al fondo del body (no en el footer sticky):
              Eliminar y Archivar son acciones destructivas o de bajo uso.
              Las primarias (Cancelar/Convertir/Guardar) quedan siempre
              visibles en el footer sticky abajo. */}
          {!readOnly && (
            <div className="field" style={{ marginTop: 8, paddingTop: 16, borderTop: '1px dashed var(--borde)', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <button type="button" className="btn-danger" onClick={onDelete}>Eliminar</button>
              {onArchive && (
                <button type="button" className="btn-secondary" onClick={onArchive}>
                  {tarea.archivada ? 'Desarchivar' : 'Archivar'}
                </button>
              )}
            </div>
          )}
        </div>
        <div className="modal-footer" style={{ justifyContent: 'flex-end' }}>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            {!readOnly && <button type="button" className="btn-secondary" onClick={onConvertir}>Convertir a prospect</button>}
            <button type="button" className="btn-secondary" onClick={onClose}>{readOnly ? 'Cerrar' : 'Cancelar'}</button>
            {!readOnly && <button type="submit" className="btn-primary">Guardar</button>}
          </div>
        </div>
      </form>
    </div>
  );
}

// ── MODAL CONVERTIR TAREA A PROSPECT ───────────────────────────
function ConvertirTareaModal({ tarea, onCancel, onConfirm }) {
  const [nombre, setNombre] = useState('');
  const [apellido, setApellido] = useState('');
  const [error, setError] = useState('');

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const confirmar = () => {
    if (!nombre.trim() || !apellido.trim()) {
      setError('Nombre y apellido son obligatorios.');
      return;
    }
    onConfirm(nombre, apellido);
  };

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="convertir-tarea-title">
        <div className="modal-header">
          <h3 id="convertir-tarea-title">Convertir tarea a prospect</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <div className="help-callout">
            <strong>Tarea de origen:</strong>
            {tarea.titulo || '(sin título)'}
          </div>
          <p style={{ fontSize: '0.88rem', color: 'var(--texto-suave)', margin: '4px 0 16px' }}>
            Se va a crear un prospecto nuevo con los datos que cargues acá.
            La observación de la tarea pasa a las notas del prospect.
            Si la tarea tiene fecha, queda como próximo contacto.
            <strong> La tarea se elimina al confirmar.</strong>
          </p>
          <div className="field-row">
            <div className="field">
              <label>Nombre <span className="req">*</span></label>
              <input type="text" value={nombre} autoFocus
                onChange={e => { setNombre(e.target.value); setError(''); }}
                onKeyDown={e => e.key === 'Enter' && confirmar()} />
            </div>
            <div className="field">
              <label>Apellido <span className="req">*</span></label>
              <input type="text" value={apellido}
                onChange={e => { setApellido(e.target.value); setError(''); }}
                onKeyDown={e => e.key === 'Enter' && confirmar()} />
            </div>
          </div>
          {error && <div className="field-error">{error}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
          <button className="btn-primary" onClick={confirmar}>Convertir</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL: CONFIRMAR REORDEN DE COLUMNAS ──────────────────────
// Se abre al soltar el drag de una columna sobre otra. Muestra a dónde se
// movería y pide confirmación. Sirve tanto para mouse como para touch: en
// ambos casos previene reorders accidentales (relevante sobre todo en mobile
// donde el long-press puede dispararse sin intención clara).
function ConfirmColMoveModal({ movingName, targetName, position, onCancel, onConfirm }) {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onCancel();
      if (e.key === 'Enter') onConfirm();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel, onConfirm]);

  const posLabel = position === 'after' ? 'después de' : 'antes de';

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-col-move-title" style={{ maxWidth: 440 }}>
        <div className="modal-header">
          <h3 id="confirm-col-move-title">Mover columna</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <p style={{ fontSize: '0.92rem', color: 'var(--texto)', margin: '4px 0 6px', lineHeight: 1.5 }}>
            ¿Mover la columna <strong>{movingName}</strong> {posLabel} <strong>{targetName}</strong>?
          </p>
          <p style={{ fontSize: '0.8rem', color: 'var(--texto-suave)', margin: '0' }}>
            El nuevo orden queda guardado para todos los dispositivos.
          </p>
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
          <button className="btn-primary" onClick={onConfirm} autoFocus>Mover</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL: CONFIRMAR ELIMINAR PROSPECT ────────────────────────
// Reemplaza el confirm() nativo del browser por un modal acorde al diseño.
// Muestra contexto del prospect (nombre, gestiones, próxima cita) para que
// el user no borre por accidente uno con historial cargado.
function ConfirmDeleteProspectModal({ prospect, onCancel, onConfirm }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const contactos = prospect.contactos || [];
  const proximaCita = prospect.proximoContacto
    ? formatFechaCorta(prospect.proximoContacto.slice(0, 10))
    : null;

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-del-prosp-title" style={{ maxWidth: 460 }}>
        <div className="modal-header">
          <h3 id="confirm-del-prosp-title">Eliminar prospect</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <p style={{ fontSize: '0.95rem', color: 'var(--texto)', margin: '4px 0 14px', lineHeight: 1.5 }}>
            <strong>{prospect.nombre || '(sin nombre)'}</strong>
            {prospect.telefono && (
              <span style={{ color: 'var(--texto-suave)', fontWeight: 400 }}> · {prospect.telefono}</span>
            )}
          </p>
          {(contactos.length > 0 || proximaCita) && (
            <div className="help-callout" style={{ marginBottom: 14 }}>
              {contactos.length > 0 && (
                <div style={{ fontSize: '0.84rem', marginBottom: proximaCita ? 4 : 0 }}>
                  <strong>{contactos.length}</strong> gestión{contactos.length === 1 ? '' : 'es'} registrada{contactos.length === 1 ? '' : 's'} en el historial
                </div>
              )}
              {proximaCita && (
                <div style={{ fontSize: '0.84rem' }}>
                  Próximo contacto: <strong>{proximaCita}</strong>
                </div>
              )}
            </div>
          )}
          <p style={{ fontSize: '0.85rem', color: 'var(--texto-suave)', margin: '0', lineHeight: 1.5 }}>
            Esta acción no se puede deshacer. Se elimina el prospect, su historial completo de gestiones y la cita asociada del calendar (si la tiene).
          </p>
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
          <button className="btn-danger" onClick={onConfirm} autoFocus>Eliminar prospect</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL: CONFIRMAR ELIMINAR TAREA ───────────────────────────
// Aparece al hacer click "Eliminar" en TareaModal. Si la tarea tiene fecha
// (= hay un evento en el calendar), ofrece la opción de "solo sacar del
// calendar" para mantener la tarea viva en el Kanban sin la cita asociada.
// Si no tiene fecha, solo pregunta borrar / cancelar.
function ConfirmDeleteTareaModal({ tarea, onCancel, onUnlinkCalendar, onDeleteAll }) {
  const tieneFecha = !!tarea.fechaRecordatorio;
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const fechaTxt = tieneFecha
    ? (tarea.horaRecordatorio
        ? `${formatFechaCorta(tarea.fechaRecordatorio)} ${tarea.horaRecordatorio}`
        : formatFechaCorta(tarea.fechaRecordatorio))
    : '';

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-del-tarea-title" style={{ maxWidth: 460 }}>
        <div className="modal-header">
          <h3 id="confirm-del-tarea-title">Eliminar tarea</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <p style={{ fontSize: '0.92rem', color: 'var(--texto)', margin: '4px 0 12px', lineHeight: 1.5 }}>
            <strong>{tarea.titulo || '(sin título)'}</strong>
          </p>
          {tieneFecha ? (
            <>
              <p style={{ fontSize: '0.85rem', color: 'var(--texto-suave)', margin: '0 0 14px', lineHeight: 1.5 }}>
                Esta tarea tiene una cita en el calendar para el <strong>{fechaTxt}</strong>. ¿Qué querés hacer?
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <button type="button" className="btn-secondary" onClick={onUnlinkCalendar}
                  style={{ textAlign: 'left', padding: '12px 14px', lineHeight: 1.4 }}>
                  <strong style={{ display: 'block', marginBottom: 3 }}>Solo sacar del calendar</strong>
                  <span style={{ fontSize: '0.78rem', color: 'var(--texto-suave)', fontWeight: 400 }}>
                    La tarea sigue viva en el Kanban, sin fecha ni cita.
                  </span>
                </button>
                <button type="button" className="btn-danger" onClick={onDeleteAll}
                  style={{ textAlign: 'left', padding: '12px 14px', lineHeight: 1.4 }}>
                  <strong style={{ display: 'block', marginBottom: 3 }}>Borrar tarea completa</strong>
                  <span style={{ fontSize: '0.78rem', opacity: 0.9, fontWeight: 400 }}>
                    Saca la tarea del Kanban y borra el evento del calendar.
                  </span>
                </button>
              </div>
            </>
          ) : (
            <p style={{ fontSize: '0.88rem', color: 'var(--texto-suave)', margin: '0 0 6px', lineHeight: 1.5 }}>
              Esta acción no se puede deshacer.
            </p>
          )}
        </div>
        <div className="modal-footer" style={{ justifyContent: tieneFecha ? 'flex-end' : 'space-between' }}>
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
          {!tieneFecha && (
            <button className="btn-danger" onClick={onDeleteAll} autoFocus>Eliminar</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── MODAL: ACCIÓN SOBRE EVENTO DE PROSPECT EN CALENDAR ────────
// Aparece al clickear un evento del calendar que viene de un prospect
// (kind='prospecto', generado por una gestión "Agendado"). Ofrece eliminar

  const fecha = event?.fecha ? new Date(event.fecha) : null;

    ? `${formatFechaCorta(fecha.toISOString().slice(0,10))} ${pad2(fecha.getHours())}:${pad2(fecha.getMinutes())}`

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>

        <div className="modal-header">
          <h3 id="prosp-agenda-title">Agenda de {prospectName}</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          {fechaTxt && (
            <p style={{ fontSize: '0.88rem', color: 'var(--texto-suave)', margin: '4px 0 14px', lineHeight: 1.5 }}>
              Cita: <strong>{fechaTxt}</strong>
            </p>
          )}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>

              <strong style={{ display: 'block', marginBottom: 3 }}>Abrir ficha del prospect</strong>
              <span style={{ fontSize: '0.78rem', opacity: 0.92, fontWeight: 400 }}>
                Si querés eliminar la gestión del historial, hacelo desde ahí. Eso también borra la agenda del calendar.
              </span>
            </button>
            <button type="button" className="btn-danger" onClick={onSoloCalendar}
              style={{ textAlign: 'left', padding: '12px 14px', lineHeight: 1.4 }}>
              <strong style={{ display: 'block', marginBottom: 3 }}>Eliminar solo del calendar</strong>

        <div className="modal-footer">
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
        </div>
      </div>

// ── MODAL: AGREGAR COLUMNA KANBAN ─────────────────────────────
// Reemplaza el prompt() nativo con un modal estándar de la app.
// Valida que el título no esté vacío.
function AddColumnaModal({ onCancel, onConfirm }) {
  const [titulo, setTitulo] = useState('');
  const [error, setError] = useState('');
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const confirmar = () => {
    const t = titulo.trim();
    if (!t) { setError('El nombre no puede estar vacío.'); return; }
    onConfirm(t);
  };

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <form className="modal" role="dialog" aria-modal="true" aria-labelledby="add-col-title"
        style={{ maxWidth: 420 }}
        onSubmit={(e) => { e.preventDefault(); confirmar(); }}>
        <div className="modal-header">
          <h3 id="add-col-title">Nueva columna</h3>
          <button type="button" className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>Nombre <span className="req">*</span></label>
            <input type="text" value={titulo} autoFocus
              onChange={e => { setTitulo(e.target.value); setError(''); }}
              placeholder="Ej: Seguimiento, Cerradas, Pendientes…" />
          </div>
          {error && <div className="field-error">{error}</div>}
        </div>
        <div className="modal-footer">
          <button type="button" className="btn-secondary" onClick={onCancel}>Cancelar</button>
          <button type="submit" className="btn-primary">Crear</button>
        </div>
      </form>
    </div>
  );
}

// ── MODAL: CONFIRMAR ELIMINAR AGENDA ──────────────────────────
// Reemplaza el confirm() nativo. Si la agenda es parte de una serie
// recurrente de Google Calendar, avisa al user que se borra TODA la serie
// (el backend gcal-events actual no diferencia "esta sola" vs "todas").
function ConfirmDeleteAgendaModal({ isRecurring, onCancel, onConfirm }) {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onCancel();
      if (e.key === 'Enter') onConfirm();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel, onConfirm]);

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-del-agenda-title" style={{ maxWidth: 440 }}>
        <div className="modal-header">
          <h3 id="confirm-del-agenda-title">Eliminar agenda</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          {isRecurring ? (
            <>
              <p style={{ fontSize: '0.92rem', color: 'var(--texto)', margin: '4px 0 10px', lineHeight: 1.5 }}>
                Esta agenda forma parte de una <strong>serie recurrente</strong>.
              </p>
              <div className="help-callout danger" style={{ fontSize: '0.84rem' }}>
                <strong>Atención:</strong> al confirmar se borra <strong>toda la serie</strong> del Google Calendar, no solo esta instancia.
              </div>
            </>
          ) : (
            <p style={{ fontSize: '0.92rem', color: 'var(--texto)', margin: '4px 0 6px', lineHeight: 1.5 }}>
              Esta agenda también se borra del Google Calendar.
            </p>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
          <button className="btn-danger" onClick={onConfirm} autoFocus>Eliminar</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL: EVENTO HUÉRFANO DEL CALENDAR ───────────────────────
// Aparece al clickear un evento Google que tiene abordaje_tarea_id /
// abordaje_prospect_id desincronizado del state (la entidad no existe o
// apunta a otro evento). Ofrece borrar el evento sin tocar la tarea/prospect.
function OrphanEventModal({ event, onCancel, onDelete }) {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onCancel();
      if (e.key === 'Enter') onDelete();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel, onDelete]);

  const fecha = event?.fecha ? new Date(event.fecha) : null;
  const fechaTxt = fecha
    ? `${formatFechaCorta(fecha.toISOString().slice(0,10))} ${pad2(fecha.getHours())}:${pad2(fecha.getMinutes())}`
    : '';
  const titulo = event?.googleEvent?.summary || event?.label || '(sin título)';
  const motivo = event?.tareaId
    ? 'La tarea asociada ya no existe o apunta a otro evento.'
    : 'El prospect asociado ya no existe.';

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="orphan-event-title" style={{ maxWidth: 460 }}>
        <div className="modal-header">
          <h3 id="orphan-event-title">Evento huérfano del calendar</h3>
          <button className="modal-close" onClick={onCancel} aria-label="Cerrar">×</button>
        </div>
        <div className="modal-body">
          <p style={{ fontSize: '0.92rem', color: 'var(--texto)', margin: '4px 0 6px', lineHeight: 1.5 }}>
            <strong>{titulo}</strong>
            {fechaTxt && <span style={{ color: 'var(--texto-suave)', fontWeight: 400 }}> — {fechaTxt}</span>}
          </p>
          <p style={{ fontSize: '0.82rem', color: 'var(--texto-suave)', margin: '0 0 14px', lineHeight: 1.5 }}>
            {motivo} Suele ser un residuo de una edición anterior. Podés borrarlo del calendar de Google sin afectar nada más.
          </p>
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onCancel}>Cancelar</button>
          <button className="btn-danger" onClick={onDelete} autoFocus>Borrar del calendar</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL: INSTRUCCIONES DE USO ───────────────────────────────
// Tour rápido de las funciones del Planificador de Abordaje. Secciones

    return () => document.removeEventListener('keydown', onKey);

        role="dialog" aria-modal="true" aria-labelledby="instrucciones-title"

        background: '#fff', borderRadius: 14, maxWidth: 720, width: '100%',
        maxHeight: '85vh', display: 'flex', flexDirection: 'column',
        boxShadow: '0 20px 60px rgba(15,23,42,0.35)', fontFamily: 'inherit',
      }}>
        <header style={{
          padding: '16px 22px', borderBottom: '1px solid #e5e7eb',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          background: '#1e1b4b', color: 'white', borderRadius: '14px 14px 0 0',
        }}>
          <div>
            <div id="instrucciones-title" style={{ fontSize: 16, fontWeight: 800, letterSpacing: '0.02em' }}>
              Cómo usar el Planificador de Abordaje
            </div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', marginTop: 2 }}>
              Tour rápido. Tocá cada sección para abrir el detalle.

          <button onClick={onClose} style={{
            background: 'rgba(255,255,255,0.12)', border: 'none', color: 'white',
