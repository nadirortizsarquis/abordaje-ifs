// Distribuye eventos solapados en columnas horizontales estilo Google Calendar.
// Devuelve cada evento con su `col` (0..N) y `totalCols` (cuántas columnas hay
// en su cluster de overlaps), para que el caller calcule left/width.
// Greedy: el evento se mete en la primera columna que ya esté libre cuando
// arranca; si no hay, abre una nueva. Después calculamos `totalCols` de cada
// uno mirando cuántos otros eventos directamente solapan con él.
function layoutEventsInDay(eventsDayRaw, defaultDurMin) {
  const items = (eventsDayRaw || []).map(e => {
    const start = new Date(e.fecha);
    const startMin = start.getHours() * 60 + start.getMinutes();
    const dur = e.duracionMin || defaultDurMin || 60;
    return { ev: e, startMin, endMin: startMin + dur, col: 0, totalCols: 1 };
  }).sort((a, b) => a.startMin - b.startMin || a.endMin - b.endMin);

  const colEndTimes = [];
  for (const it of items) {
    let placed = false;
    for (let i = 0; i < colEndTimes.length; i++) {
      if (it.startMin >= colEndTimes[i]) {
        it.col = i;
        colEndTimes[i] = it.endMin;
        placed = true;
        break;
      }
    }
    if (!placed) {
      it.col = colEndTimes.length;
      colEndTimes.push(it.endMin);
    }
  }
  for (const it of items) {
    let maxCols = it.col + 1;
    for (const other of items) {
      if (other === it) continue;
      if (other.startMin < it.endMin && other.endMin > it.startMin) {
        maxCols = Math.max(maxCols, other.col + 1);
      }
    }
    it.totalCols = maxCols;
  }
  return items;
}

function WeekCalendar({ anchorDate, events, settings, onSelectEvent, onSlotClick, onMoveEvent, goPrev, goNext, goToday, onJumpTo, subTabs, ndays, singleDay }) {
  const { colors: eventColors, calendarColors: ctxCalendarColors } = useContext(EventColorContext);
  const [picker, setPicker] = useState(null);
  const [showPicker, setShowPicker] = useState(false);
  const bodyRef = useRef(null);
  const HOUR_HEIGHT = 56;
  // Drag & drop de eventos. `drag` describe el estado actual:
  //  - eventId: id del evento que se está arrastrando.
  //  - startX, startY: pixels donde arrancó el pointer down.
  //  - active: true cuando superó el threshold de inicio (~5px).
  //  - cursorX, cursorY: posición actual del cursor para preview visual.
  //  - dropTargetDay (index 0..ndays-1) y dropTargetMin (minuto del día snapeado).
  const [drag, setDrag] = useState(null);
  const dragRef = useRef(null); // mirror para handlers async
  const startHour = Math.max(0, Math.min(23, settings.workStartHour ?? 9));
  const startMinSetting = Math.max(0, Math.min(59, settings.workStartMin ?? 0));
  const endHour = Math.max(startHour + 1, Math.min(24, settings.workEndHour ?? 19));
  const endMinSetting = Math.max(0, Math.min(59, settings.workEndMin ?? 0));
  // El calendario muestra siempre las 24 horas para no esconder eventos cargados
  // fuera del rango laboral. Las preferencias de horario se muestran como
  // marcas (línea punteada en inicio y fin) y atenuación visual del rango fuera.
  const gridStartHour = 0;
  const gridEndHour = 24;
  const hours = [];
  for (let h = gridStartHour; h < gridEndHour; h++) hours.push(h);
  const slotMin = settings.slotDurationMin || 60;
  const startMinTotal = startHour * 60 + startMinSetting;
  const endMinTotal = endHour * 60 + endMinSetting;
  const workStartTop = (startMinTotal / 60) * HOUR_HEIGHT;
  const workEndTop = (endMinTotal / 60) * HOUR_HEIGHT;

  // Build days array
  const start = singleDay ? new Date(anchorDate) : startOfWeek(anchorDate);
  start.setHours(0,0,0,0);
  const days = [];
  for (let i = 0; i < ndays; i++) days.push(addDays(start, i));

  const lastDay = days[days.length-1];
  let title;
  if (singleDay) {
    title = formatLargeDate(start);
  } else if (start.getMonth() === lastDay.getMonth()) {
    title = `${start.getDate()} - ${lastDay.getDate()} ${NOMBRES_MES[start.getMonth()]} ${start.getFullYear()}`;
  } else {
    title = `${start.getDate()} ${NOMBRES_MES[start.getMonth()].slice(0,3)} - ${lastDay.getDate()} ${NOMBRES_MES[lastDay.getMonth()].slice(0,3)} ${lastDay.getFullYear()}`;
  }

  const totalHeight = HOUR_HEIGHT * hours.length;
  // Grid responsive: usa CSS vars que cambian por media query.
  // En mobile la hours col se achica y cada día tiene un min-width para que
  // el grid horizontal pueda scrollear cuando no entra completo.
  const gridCols = `var(--cal-hour-col-w, 60px) repeat(${ndays}, minmax(var(--cal-day-min-w, 0px), 1fr))`;

  // Eventos por día (solo en rango de horas mostrado)
  const eventsByDay = days.map(d =>
    events.filter(e => isSameDay(new Date(e.fecha), d))
  );

  const now = new Date();

  // Línea del "ahora" si hoy está visible y dentro del rango horario
  const todayIdx = days.findIndex(d => isSameDay(d, now));
  let nowLineTop = null;
  if (todayIdx >= 0) {
    const nowMin = (now.getHours() - gridStartHour) * 60 + now.getMinutes();
    if (nowMin >= 0 && nowMin <= (gridEndHour - gridStartHour) * 60) {
      nowLineTop = (nowMin / 60) * HOUR_HEIGHT;
    }
  }

  // Al montar, scrollea el grid para que el horario laboral quede visible al
  // tope (con un poco de aire arriba). Sin esto, el usuario ve las 00:00 por
  // defecto porque ahora siempre mostramos las 24 horas.
  useEffect(() => {
    if (bodyRef.current) {
      bodyRef.current.scrollTop = Math.max(0, workStartTop - 20);
    }
  }, [workStartTop, ndays, singleDay]);

  // En mobile el body puede scrollear horizontal (grid > viewport). Sincronizamos
  // el scroll del header para que las etiquetas de día queden alineadas.
  const headerRef = useRef(null);
  const onBodyHScroll = useCallback((e) => {
    if (headerRef.current) headerRef.current.scrollLeft = e.currentTarget.scrollLeft;
  }, []);

  // Drag & drop de eventos:
  //  - Desktop (mouse): drag arranca al instante; threshold de 5px de movimiento
  //    para distinguir click de drag real.
  //  - Mobile (touch): long-press de 400ms con dedo quieto activa el drag. Si
  //    el dedo se mueve antes (> 8px), cancelamos y dejamos al browser hacer
  //    scroll normal. Una vez activado el long-press, los pointermove
  //    actualizan el drag y body.cal-dragging bloquea el scroll.
  const justDraggedRef = useRef(false);
  const longPressTimerRef = useRef(null);
  const pendingTouchRef = useRef(null); // { event, startX, startY, eventEl }
  const [pendingTouchAttempt, setPendingTouchAttempt] = useState(0);

  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => {
      setDrag(d => {
        if (!d) return d;
        const moved = Math.abs(e.clientX - d.startX) + Math.abs(e.clientY - d.startY);
        const active = d.active || moved > 5;
        let dropTargetDay = null, dropTargetMin = null;
        if (active) {
          const el = document.elementFromPoint(e.clientX, e.clientY);
          const dayCol = el?.closest('.cal-day-col');
          if (dayCol && dayCol.dataset.dayIdx != null) {
            dropTargetDay = parseInt(dayCol.dataset.dayIdx, 10);
            const rect = dayCol.getBoundingClientRect();
            const y = e.clientY - rect.top;
            const totalMin = Math.max(0, Math.min(23 * 60 + 45, (y / HOUR_HEIGHT) * 60));
            dropTargetMin = Math.round(totalMin / 15) * 15;
          }
        }
        return { ...d, cursorX: e.clientX, cursorY: e.clientY, active, dropTargetDay, dropTargetMin };
      });
    };
    const onUp = () => {
      setDrag(d => {
        if (!d) return null;
        if (d.active) {
          justDraggedRef.current = true;
          setTimeout(() => { justDraggedRef.current = false; }, 100);
          if (d.dropTargetDay != null && d.dropTargetMin != null && onMoveEvent) {
            const dayDate = days[d.dropTargetDay];
            if (dayDate) {
              const newStart = new Date(dayDate);
              newStart.setHours(Math.floor(d.dropTargetMin / 60), d.dropTargetMin % 60, 0, 0);
              onMoveEvent(d.event, newStart.toISOString());
            }
          }
        } else {
          // Click sin drag → abrir el modal del evento.
          if (onSelectEvent) onSelectEvent(d.event);
        }
        document.body.classList.remove('cal-dragging');
        return null;
      });
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
    return () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
    };
  }, [drag, days, onMoveEvent, onSelectEvent]);

  // Listener separado para manejar el long-press en touch antes de que se
  // active el drag. Mientras estamos en "wait", monitoreamos movimiento del
  // dedo y cancelamos si supera ~8px (el user está scrolleando, no presionando).
  useEffect(() => {
    if (!pendingTouchRef.current) return;
    const cancel = (extraReason) => {
      if (longPressTimerRef.current) {
        clearTimeout(longPressTimerRef.current);
        longPressTimerRef.current = null;
      }
      if (pendingTouchRef.current?.eventEl) {
        pendingTouchRef.current.eventEl.classList.remove('long-press-armed');
      }
      pendingTouchRef.current = null;
    };
    const onMoveWait = (e) => {
      const p = pendingTouchRef.current;
      if (!p) return;
      const moved = Math.abs(e.clientX - p.startX) + Math.abs(e.clientY - p.startY);
      if (moved > 8) cancel('moved-before-longpress');
    };
    const onUpWait = (e) => {
      const p = pendingTouchRef.current;
      if (!p) return;
      // Soltó antes del long press = es un tap. Disparamos onSelectEvent y
      // marcamos `justDraggedRef` para que el `click` que el browser dispara
      // después (sintético) no vuelva a abrir el modal.
      cancel('released-before-longpress');
      if (onSelectEvent) onSelectEvent(p.event);
      justDraggedRef.current = true;
      setTimeout(() => { justDraggedRef.current = false; }, 300);
    };
    document.addEventListener('pointermove', onMoveWait);
    document.addEventListener('pointerup', onUpWait);
    document.addEventListener('pointercancel', onUpWait);
    return () => {
      document.removeEventListener('pointermove', onMoveWait);
      document.removeEventListener('pointerup', onUpWait);
      document.removeEventListener('pointercancel', onUpWait);
    };
    // pendingTouchAttempt sirve como trigger para re-armar el effect cuando
    // arranca un nuevo long-press. Lo cambia onEventPointerDown.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [pendingTouchAttempt]);

  const onEventPointerDown = (e, ev) => {
    if (e.button !== 0) return;
    if (!onMoveEvent || ev.kind === 'prospecto') {
      // Sin handler de move o evento no-arrastrable: click directo, sin drag.
      return;
    }
    e.stopPropagation();

    if (e.pointerType === 'touch') {
      // En touch, esperamos 400ms con dedo quieto antes de activar drag.
      const eventEl = e.currentTarget;
      pendingTouchRef.current = {
        event: ev,
        startX: e.clientX, startY: e.clientY,
        eventEl,
      };
      eventEl.classList.add('long-press-armed');
      setPendingTouchAttempt(n => n + 1); // re-arma el effect monitor
      longPressTimerRef.current = setTimeout(() => {
        const p = pendingTouchRef.current;
        if (!p) return;
        pendingTouchRef.current = null;
        longPressTimerRef.current = null;
        if (p.eventEl) p.eventEl.classList.remove('long-press-armed');
        document.body.classList.add('cal-dragging');
        setDrag({
          event: p.event,
          startX: p.startX, startY: p.startY,
          cursorX: p.startX, cursorY: p.startY,
          active: true, // touch: el drag se activa solo (no requiere 5px adicional)
          dropTargetDay: null, dropTargetMin: null,
        });
      }, 400);
    } else {
      // Mouse: drag inmediato con threshold de 5px.
      setDrag({
        event: ev,
        startX: e.clientX, startY: e.clientY,
        cursorX: e.clientX, cursorY: e.clientY,
        active: false,
        dropTargetDay: null, dropTargetMin: null,
      });
    }
  };

  return (
    <>
    <div className="cal-wrap">
      <div className="cal-header">
        <div style={{display:'flex', alignItems:'center', gap:14}}>
          <div className="cal-title clickable" onClick={() => setShowPicker(s => !s)}
            title="Click para saltar a otro mes/año">
            {title}
            <span className="cal-title-caret">▾</span>
            {showPicker && (
              <MonthYearPicker
                year={start.getFullYear()}
                month={start.getMonth()}
                onPick={onJumpTo}
                onClose={() => setShowPicker(false)}
              />
            )}
          </div>
          {subTabs}
        </div>
        <div className="cal-nav">
          <button className="cal-nav-btn cal-nav-arrow" onClick={goPrev}
            title={singleDay ? 'Día anterior' : 'Semana anterior'}>‹</button>
          <button className="cal-nav-btn" onClick={goToday}>Hoy</button>
          <button className="cal-nav-btn cal-nav-arrow" onClick={goNext}
            title={singleDay ? 'Día siguiente' : 'Semana siguiente'}>›</button>
        </div>
      </div>

      <div className="cal-week-wrap">
        <div ref={headerRef} className="cal-week-header" style={{gridTemplateColumns: gridCols}}>
          <div className="cal-week-corner"></div>
          {days.map(d => (
            <div key={d.toISOString()} className={`cal-week-day-h ${isToday(d) ? 'today' : ''}`}>
              <span className="dow">{DOW_CORTOS[(d.getDay()+6)%7]}</span>
              <span className="num">{d.getDate()}</span>
            </div>
          ))}
        </div>
        <div ref={bodyRef} className="cal-week-body" style={{gridTemplateColumns: gridCols}} onScroll={onBodyHScroll}>
          <div className="cal-hours-col">
            {hours.map(h => (
              <div key={h} className="cal-hour-label" style={{height: HOUR_HEIGHT}}>
                {pad2(h)}:00
              </div>
            ))}
          </div>
          {days.map((d, dIdx) => (
            <div key={d.toISOString()} data-day-idx={dIdx}
              className={`cal-day-col ${onSlotClick ? 'clickable' : ''}`}
              style={{height: totalHeight}}
              onClick={(e) => {
                if (!onSlotClick) return;
                if (justDraggedRef.current) return; // ignorar clicks que vienen de soltar un drag
                if (e.target.closest('.cal-week-event')) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const totalMin = Math.max(0, Math.min(23 * 60 + 59, (y / HOUR_HEIGHT) * 60));
                // Snap al inicio de cada slot configurado (default 60min). Floor
                // para que clickear en cualquier punto de una "celda visual" abra
                // siempre el inicio de esa celda (ej. click dentro de la celda 18
                // siempre devuelve 18:00, no 18:30 que era lo que daba round antes).
                const slotSnap = Math.max(15, settings?.slotDurationMin || 60);
                const snapped = Math.floor(totalMin / slotSnap) * slotSnap;
                onSlotClick(d, Math.floor(snapped / 60), snapped % 60);
              }}>
              {hours.map(h => (
                <div key={h} className="cal-hour-cell" style={{height: HOUR_HEIGHT}}></div>
              ))}
              {/* Atenuación visual del rango fuera del horario laboral */}
              {workStartTop > 0 && (
                <div className="cal-offhours" style={{ top: 0, height: workStartTop }} />
              )}
              {workEndTop < totalHeight && (
                <div className="cal-offhours" style={{ top: workEndTop, height: totalHeight - workEndTop }} />
              )}
              {/* Líneas punteadas marcando inicio y fin del horario laboral */}
              <div className="cal-workhours-line" style={{ top: workStartTop }} />
              <div className="cal-workhours-line" style={{ top: workEndTop }} />
              {/* Preview del drop target durante drag & drop */}
              {drag?.active && drag.dropTargetDay === dIdx && drag.dropTargetMin != null && (() => {
                const ev = drag.event;
                let durMin = 60;
                if (ev?.duracionMin) durMin = ev.duracionMin;
                else if (ev?.googleEvent?.start?.dateTime && ev?.googleEvent?.end?.dateTime) {
                  durMin = (new Date(ev.googleEvent.end.dateTime) - new Date(ev.googleEvent.start.dateTime)) / 60000;
                } else durMin = slotMin;
                const previewTop = (drag.dropTargetMin / 60) * HOUR_HEIGHT;
                const previewH = Math.max(28, (durMin / 60) * HOUR_HEIGHT - 2);
                return (
                  <div className="cal-drag-preview" style={{ top: previewTop, height: previewH }}>
                    {pad2(Math.floor(drag.dropTargetMin / 60))}:{pad2(drag.dropTargetMin % 60)}
                  </div>
                );
              })()}
              {dIdx === todayIdx && nowLineTop != null && (
                <div className="cal-now-line" style={{top: nowLineTop}}></div>
              )}
              {layoutEventsInDay(eventsByDay[dIdx], slotMin).map(({ ev: e, startMin, endMin, col, totalCols }) => {
                const offsetMin = startMin - gridStartHour * 60;
                if (offsetMin < 0 || offsetMin >= (gridEndHour - gridStartHour) * 60) {
                  return null;
                }
                const dur = endMin - startMin;
                const top = (offsetMin / 60) * HOUR_HEIGHT;
                const height = Math.max(28, (dur / 60) * HOUR_HEIGHT - 2);
                const cfg = colorCalendarEvento(e, eventColors, ctxCalendarColors);
                const evDate = new Date(e.fecha);
                const vencido = evDate < now && !isToday(evDate);
                const evKey = buildEventKey(e);
                const onCtxMenu = evKey ? ((ev) => {
                  ev.preventDefault(); ev.stopPropagation();
                  setPicker({ x: ev.clientX, y: ev.clientY, eventKey: evKey, currentColor: eventColors[evKey] || null });
                }) : undefined;
                // Layout horizontal: divide el ancho según overlapping.
                // Cada evento toma 1/totalCols del ancho y se posiciona en col.
                const widthPct = 100 / totalCols;
                const leftPct  = col * widthPct;
                const isCrowded = totalCols > 1;
                const isProspect = e.kind === 'prospecto';
                const isDragging = drag?.event?.id === e.id && drag?.active;
                return (
                  <div key={e.id}
                    className={`cal-week-event ${vencido ? 'vencido' : ''} ${isCrowded ? 'crowded' : ''} ${dIdx >= ndays - 2 ? 'tooltip-left' : ''} ${isProspect && onMoveEvent ? 'no-drag' : ''} ${isDragging ? 'dragging' : ''}`}
                    style={{
                      top: top, height,
                      left: `calc(${leftPct}% + 3px)`,
                      width: `calc(${widthPct}% - 6px)`,
                      background: cfg.bg,
                      borderLeftColor: cfg.border,
                      color: cfg.color
                    }}
                    onPointerDown={(pe) => onEventPointerDown(pe, e)}
                    onContextMenu={onCtxMenu}
                    onClick={() => {
                      // Si el tap touch ya disparó onSelectEvent vía el listener
                      // del long-press, el click sintético del browser no debe
                      // re-abrirlo (justDraggedRef se setea por 300ms tras un tap).
                      if (justDraggedRef.current) return;
                      // Solo dispara click directo si NO está el drag activo
                      // (i.e. evento no arrastrable como prospect, o no hay onMoveEvent).
                      if (!onMoveEvent || isProspect) onSelectEvent(e);
                    }}
                    title={isProspect && onMoveEvent ? 'Cita agendada desde prospect — editala desde su ficha' : undefined}
                  >
                    <div className="cal-event-inner">
                      <div className="event-time">{formatHHMM(e.fecha)} · {dur}min</div>
                      <div className="event-name">{e.label} <ActorStar item={e} /></div>
                      {height > 50 && !isCrowded && e.observacion && (
                        <div className="event-obs">{e.observacion}</div>
                      )}
                    </div>
                    {/* Tooltip al hover: muestra el evento completo sin que lo tape otro. */}
                    <div className="cal-event-tooltip">
                      <div className="cal-event-tooltip-time">{formatHHMM(e.fecha)} · {dur} min</div>
                      <div className="cal-event-tooltip-name">{e.label}</div>
                      {e.observacion && (
                        <div className="cal-event-tooltip-obs">{e.observacion}</div>
                      )}
                      {e.gcalCalendarName && (
                        <div className="cal-event-tooltip-cal">{e.gcalCalendarName}</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
    {picker && (
      <EventColorPicker
        x={picker.x} y={picker.y}
        eventKey={picker.eventKey}
        currentColor={picker.currentColor}
        onClose={() => setPicker(null)}
      />
    )}
    </>
  );
}

function CalDayCell({ date, outOfMonth, events, isSelected, onClick, onSelectEvent }) {
  const { colors: eventColors, calendarColors: ctxCalendarColors } = useContext(EventColorContext);
  const [picker, setPicker] = useState(null);
  const today = isToday(date);
  const cls = [
    'cal-day',
    outOfMonth ? 'out' : '',
    today ? 'today' : '',
    isSelected ? 'selected' : ''
  ].filter(Boolean).join(' ');

  const visibles = events.slice(0, 3);
  const restantes = events.length - visibles.length;
  const now = new Date();

  return (
    <>
    <div className={cls} onClick={onClick}>
      <span className="cal-day-num">{date.getDate()}</span>
      {visibles.map(e => {
        const cfg = colorCalendarEvento(e, eventColors, ctxCalendarColors);
        const fechaEv = new Date(e.fecha);
        const vencido = fechaEv < now && !isToday(fechaEv);
        const evKey = buildEventKey(e);
        const onCtxMenu = evKey ? ((ev) => {
          ev.preventDefault(); ev.stopPropagation();
          setPicker({ x: ev.clientX, y: ev.clientY, eventKey: evKey, currentColor: eventColors[evKey] || null });
        }) : undefined;
        return (
          <div
            key={e.id}
            className={`cal-event ${vencido ? 'vencido' : ''}`}
            style={{
              background: cfg.bg,
              borderLeftColor: cfg.border,
              color: cfg.color
            }}
            title={`${e.label}${e.observacion ? ' — ' + e.observacion : ''}`}
            onClick={(ev) => { ev.stopPropagation(); onSelectEvent(e); }}
            onContextMenu={onCtxMenu}
          >
            <span className="cal-event-time">{formatHHMM(e.fecha)}</span>
            {e.label}
            <ActorStar item={e} />
          </div>
        );
      })}
      {restantes > 0 && (
        <div className="cal-more">+{restantes} más</div>
      )}
    </div>
    {picker && (
      <EventColorPicker
        x={picker.x} y={picker.y}
        eventKey={picker.eventKey}
        currentColor={picker.currentColor}
        onClose={() => setPicker(null)}
      />
    )}
    </>
  );
}

          onClose={() => setPicker(null)}
        />
      )}
    </div>
  );
}

async function loadAllProfiles() {
  const { data, error } = await sb.from('profiles')
    .select('id, email, display_name, role, advisor_name_ole, assistant_of_id, shares_calendar_with_assistant, created_at')
    .order('role', { ascending: false })
    .order('display_name', { ascending: true });
  if (error) { console.error('loadAllProfiles:', error); return []; }
  return data || [];
}

async function updateProfile(id, patch) {
  const { error } = await sb.from('profiles').update(patch).eq('id', id);
  if (error) throw error;
}

async function createUser(payload) {
  const { data, error } = await sb.functions.invoke('create-user', { body: payload });
  if (error) {
    const detail = data?.error || error.message;
    throw new Error(detail);
  }
  return data;
}

// Borra un user (cascade borra profile + datos en todas las apps).
async function deleteUser(userId) {
  const { data, error } = await sb.functions.invoke('delete-user', { body: { user_id: userId } });
  if (error) throw new Error(data?.error || error.message);
  return data;
}

// Cambia el password de un user. Solo admin.
async function updateUserPassword(userId, password) {
  const { data, error } = await sb.functions.invoke('update-user-password', { body: { user_id: userId, password } });
  if (error) throw new Error(data?.error || error.message);
  return data;
}

// Cambia el email de un user. Solo admin. Actualiza auth.users + profiles.
async function updateUserEmail(userId, email) {
  const { data, error } = await sb.functions.invoke('update-user-email', { body: { user_id: userId, email } });
  if (error) throw new Error(data?.error || error.message);
  return data;
}
