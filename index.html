  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .col-referente, .col-pref { display: none; }
  }
  /* Breakpoint intermedio (>720 y <=1280): el monitor es chico pero no es
     mobile. Apretamos padding del header y achicamos buscador + botón
     Instrucciones para que todo entre sin que "Salir" se desborde. */
  @media (min-width: 721px) and (max-width: 1280px) {
    .header { padding-left: 14px; padding-right: 14px; gap: 10px; }
    .header-title { padding-left: 10px; font-size: 1rem; }
    .header-subtitle { font-size: 0.7rem; }
    .header-instr-slot .header-btn { padding: 6px 10px; font-size: 0.72rem; }
    .buscador-input { width: 180px; font-size: 0.76rem; padding: 6px 10px; }
    .buscador-input:focus { width: 220px; }
    .header-btn { padding: 6px 10px; font-size: 0.74rem; }
  }
  @media (max-width: 720px) {
    /* Header en mobile: 3 filas con respiración generosa.
       Fila 1: logo + título + botón Instrucciones.
       Fila 2: acciones (campanita, Ajustes, ADMIN, nombre, Salir).
       Fila 3: buscador (full width).
       La altura sube para que el contenido principal no quede tapado
       (--header-h se override y el margin-top de .main respeta el cambio). */
    :root { --header-h: 140px; }
    .header {
      height: auto;
      min-height: var(--header-h);
      flex-wrap: wrap;
      /* Safari mobile y algunos contextos de PWA no siempre devuelven un
         valor utilizable en env(safe-area-inset-top). Forzamos un mínimo
         de 32px para que el logo/título no queden tapados por el reloj o
         la barra de status del celular. */
      padding: max(env(safe-area-inset-top, 0px), 32px) 16px 12px;
      gap: 10px;
      row-gap: 10px;
      align-items: center;
    }
    /* Compensamos el cambio: el .main respeta el padding-top efectivo del
       header (mínimo 32px) en lugar de solo env(safe-area-inset-top). */
    .main {
      margin-top: calc(var(--header-h) + max(env(safe-area-inset-top, 0px), 32px));
    }
    .header-logo { height: 54px; max-width: 200px; align-self: flex-end; }
    .header-title {
      font-size: 1rem;
      padding-left: 12px;
      flex: 1 1 auto;
      line-height: 1.2;
      align-self: flex-end;
      padding-bottom: 8px;
    }
    .header-title::before {
      top: 2px;
      bottom: 10px;
      width: 1px;
    }
    .header-subtitle { display: none; }
    /* En mobile combinamos buscador + botón Instrucciones en la última
       fila para ahorrar una línea. El buscador toma el espacio que sobra
       y el botón Instrucciones queda pegado a la derecha. */
    .header-search-slot {
      order: 10; flex: 1 1 auto;
      margin-left: 0; margin-right: 0;
    }
    .header-search-slot .buscador-input { width: 100%; max-width: 100%; }
    .header-search-slot .buscador-input:focus { width: 100%; }
    .header-instr-slot {
      order: 11; margin-left: 6px; margin-right: 0; flex: 0 0 auto;
    }
    .header-instr-slot .header-btn { padding: 7px 10px; font-size: 0.74rem; }
    .header-actions {
      order: 5; flex: 1 100%;
      gap: 8px;
      /* nowrap: si el nombre del user es largo (ej. "Federico Del Boca"),
         se trunca con ellipsis en .header-user en lugar de empujar Salir
         a una segunda línea, lo que rompía la altura del header y
         escondía las tabs Lista/Tareas/Calendario. */
      flex-wrap: nowrap;
      min-width: 0;
      justify-content: flex-end;
      align-items: center;
    }
    .header-actions > * { flex: 0 0 auto; }
    .header-btn { padding: 7px 12px; font-size: 0.78rem; }
    .header-user {
      font-size: 0.78rem;
      padding: 4px 9px;
      /* Se encoge si el espacio falta. El ellipsis preserva la primera
         palabra (típicamente el nombre de pila). */
      flex: 0 1 auto;
      min-width: 0;
      max-width: 11ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .header-admin-badge { font-size: 0.64rem; padding: 2px 6px; }
    .bell-btn { width: 36px; height: 36px; }

    .main { padding: 20px 16px; }
    /* En mobile, la tabla de prospectos se convierte en lista de cards
       verticales: cada fila ocupa el ancho completo, sin scroll horizontal,
       y los datos se apilan dentro de la card. Esto reemplaza el approach
       anterior de "scroll horizontal con min-width: 720px" que dejaba
       cortadas las columnas y desorientaba al user. */
    .table-wrap { overflow-x: visible; }
    table.prospectos,
    table.prospectos thead,
    table.prospectos tbody,
    table.prospectos tr,
    table.prospectos td {
      display: block;
      width: 100%;
    }
    table.prospectos {
      table-layout: auto;
      min-width: 0;
      font-size: 0.85rem;
      background: transparent;
      box-shadow: none;
      border: none;
    }
    table.prospectos colgroup { display: none; }
    table.prospectos thead { display: none; }
    table.prospectos tbody tr {
      background: var(--bg-card);
      border: 1px solid var(--borde);
      border-radius: 12px;
      margin-bottom: 10px;
      padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    /* Tints en mobile mantienen el color pero con borde lateral grueso */
    table.prospectos tbody tr.tint-pendiente   { border-left: 4px solid #f59e0b; }
    table.prospectos tbody tr.tint-programado  { border-left: 4px solid #fb923c; }
    table.prospectos tbody tr.tint-agendado    { border-left: 4px solid #10b981; }
    table.prospectos tbody tr.tint-rechazado   { border-left: 4px solid #ef4444; opacity: 0.82; }
    table.prospectos tbody tr.tint-futuro-lejos { border-left: 4px solid #94a3b8; }
    table.prospectos td {
      padding: 3px 0;
      border: none;
      max-width: 100%;
    }
    table.prospectos td.col-nombre { font-size: 0.95rem; margin-bottom: 6px; }
    /* En mobile las cards van compactas: solo nombre + último contacto.
       Teléfono, detalle, estado, referente y pref se ocultan — el estado
       se sigue percibiendo por el color del border-left de la card. */
    table.prospectos td.col-telefono,
    table.prospectos td.col-detalle,
    table.prospectos td.estado-cell,
    table.prospectos td.col-referente,
    table.prospectos td.col-pref { display: none; }
    /* La timeline-cell en mobile muestra SOLO el último contacto. */
    .timeline-cell { min-width: 0; }
    .timeline-row { flex-wrap: wrap; row-gap: 2px; }
    .timeline-cell .timeline-row:not(:first-child) { display: none; }
    .timeline-mas { display: none; }
    .timeline-obs { white-space: normal; }
    .field-row, .field-inline-row { grid-template-columns: 1fr; }
    .tipos-grid { grid-template-columns: 1fr 1fr; }
    .panel-side { max-width: 100%; }
    .panel-section { padding: 18px 18px; }
    .panel-header { padding: 18px 18px; }
    .cal-day { min-height: 70px; padding: 4px; }
    .cal-day-num { font-size: 0.72rem; width: 20px; height: 20px; }
    .cal-event { font-size: 0.6rem; padding: 1px 4px; }
    .cal-title { font-size: 0.95rem; }
    .day-event { flex-wrap: wrap; gap: 6px; }
    .day-event-obs { flex: 1 100%; }

    /* ── Calendar semana / día en mobile ── */
    /* Cada día tiene min-width fijo (95px). Si el viewport es chico, el grid
       supera el ancho y aparece scroll horizontal. El header y el body
       scrollean sincronizados (mismo grid-template). Las CSS vars hacen que
       el grid-template-columns inline también responda. */
    .cal-week-body, .cal-week-header {
      overflow-x: auto;
      --cal-hour-col-w: 44px;
      --cal-day-min-w: 95px;
    }
    .cal-hours-col, .cal-hour-label { font-size: 0.62rem; padding-right: 4px; }
    .cal-week-day-h { padding: 8px 4px; }
    .cal-week-day-h .dow { font-size: 0.6rem; letter-spacing: 0.3px; }
    .cal-week-day-h .num { font-size: 0.9rem; width: 24px; height: 24px; }
    .cal-week-event { font-size: 0.62rem; }
    .cal-week-event .event-time { font-size: 0.58rem; }
    .cal-week-event .cal-event-inner { padding: 3px 5px; }
    /* Tooltip al hover sobre eventos: ocultarlo en touch (el tap abre el modal,
       no hace falta preview adicional y el tooltip se ve mal en pantallas chicas). */
    .cal-event-tooltip { display: none; }
    /* Nav del calendar más compacto */
    .cal-header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
    .cal-nav-btn { padding: 4px 8px; font-size: 0.75rem; }

    /* Modales en mobile: padding más ajustado y botones del footer en wrap.
       Sin esto, Eliminar + Convertir + Cancelar + Guardar no entran en una
       sola fila y el botón Guardar queda fuera de pantalla. */
    .modal-backdrop { padding: 12px; }
    .modal-body { padding: 18px 18px; }
    .modal-footer { padding: 12px 18px; gap: 8px; }
    .modal-footer > div { gap: 8px; }
    .modal-footer button { font-size: 0.8rem; padding: 8px 12px; }
    .quick-date-row { gap: 6px; margin-bottom: 12px; }
    .btn-quick-date { padding: 8px 4px; font-size: 0.74rem; }
    .btn-quick-date small { font-size: 0.62rem; }
  }
  @media (max-width: 560px) {
    .col-telefono { display: none; }
  }
  /* En pantallas muy chicas, achicar más la columna de horas y el ancho
     mínimo de cada día para que entren más en pantalla sin scroll horizontal
     extremo. */
  @media (max-width: 480px) {
    .cal-hours-col { font-size: 0.58rem; }
  }
</style>
</head>

<script>
const SUPABASE_URL = 'https://hxjpnekzncqepbhpdkfv.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_PE4TlV6PydSNLaEJshPqwg_G-_q5aCq';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, flowType: 'pkce' }
});

const TAREAS_COLUMNAS_DEFAULT = [
  { titulo: 'Administrativo',    orden: 0, slug: null },
  { titulo: 'Ventas pendientes', orden: 1, slug: null },
  { titulo: 'Abordar',           orden: 2, slug: 'abordar' },
  { titulo: 'Personal',          orden: 3, slug: null },
];

function emptyState() {
  return {
    version: 2,
    prospectos: [],
    agendados: [],
    tareas: { columnas: [], items: [] },
    eventColors: {},
  };
}

// ── Mappers DB ↔ frontend ──────────────────────────────────────
function mapContactoFromDB(c) {
  const horaCorta = c.hora ? c.hora.slice(0, 5) : null;
  const agendadoPara = c.fecha
    ? (horaCorta ? `${c.fecha}T${horaCorta}` : c.fecha)
    : null;
  return {
    id: c.id,
    tipo: c.tipo || '',
    fecha: c.fecha,
    hora: horaCorta,
    observacion: c.observacion || '',
    agendadoPara,
    prospectoId: c.prospecto_id || null,
    actorId: c.actor_id || null,
    agenteId: c.agente_id,
    createdAt: c.created_at
  };
}

function mapProspectoFromDB(p, contactosTodos) {
  return {
    id: p.id,
    nombre: p.nombre || '',
    telefono: p.telefono || '',
    preferenciaContacto: p.preferencia_contacto || '',
    detalle: p.detalle || '',
    referente: p.referente || '',
    observaciones: p.observaciones || '',
    agenteId: p.agente_id,
    actorId: p.actor_id || null,
    createdAt: p.created_at,
    updatedAt: p.updated_at,
    proximoContacto: p.proximo_contacto,
    estado: p.estado || 'nuevo',
    contactos: (contactosTodos || [])
      .filter(c => c.prospecto_id === p.id)
      .map(mapContactoFromDB)
  };
}

function mapColumnaFromDB(c) {
  return {
    id: c.id,
    titulo: c.titulo,
    orden: c.orden,
    slug: c.slug || null,
    protegida: !!c.slug,   // si tiene slug, es columna especial protegida
    actorId: c.actor_id || null,
    agenteId: c.agente_id || null,
    updatedAt: c.updated_at || null,
  };
}

function mapTareaFromDB(t) {
  return {
    id: t.id,
    columnaId: t.columna_id,
    prospectoId: t.prospecto_id || null,
    titulo: t.titulo || '',
    fechaRecordatorio: t.fecha_recordatorio,
    horaRecordatorio: t.hora_recordatorio ? t.hora_recordatorio.slice(0, 5) : null,
    observacion: t.observacion || '',
    googleEventId: t.google_event_id || null,
    actorId: t.actor_id || null,
    agenteId: t.agente_id,
    archivada: !!t.archivada,
    createdAt: t.created_at,
    updatedAt: t.updated_at
  };
}

function mapAgendadoFromDB(a) {
  return {
    id: a.id,
    prospectoId: a.prospecto_id,
    fecha: a.fecha,
    nota: a.nota || '',
    actorId: a.actor_id || null,
    agenteId: a.agente_id,
    createdAt: a.created_at
  };
}

// Convierte "2026-05-08T14:30" o "2026-05-08T14:30:00" o "2026-05-08" → { fecha, hora }
function splitFechaHora(iso) {
  if (!iso) return { fecha: null, hora: null };
  if (iso.includes('T')) {
    const [d, t] = iso.split('T');
    return { fecha: d, hora: t.slice(0,5) };
  }
  return { fecha: iso, hora: null };
}

// ── Auth ───────────────────────────────────────────────────────
// Cache local del profile minimo (id + assistant_of_id) para resolver rápido
// quién es el "agente efectivo" cuando el caller es un asistente. Se invalida
// al cambiar de sesión o cuando explícitamente se actualice.
let __cachedProfileMin = null;

const auth = {
  async getUser() {
    const { data } = await sb.auth.getUser();
    return data.user || null;
  },
  async getSession() {
    const { data } = await sb.auth.getSession();
    return data.session || null;
  },
  // Devuelve el id del agente cuyos datos opera el caller. Si el user es
  // asistente (profile.assistant_of_id no null), devuelve el id del principal.
  // Si no, devuelve el propio user.id.
  async getEffectiveAgenteId() {
    const user = await this.getUser();
    if (!user) return null;
    if (!__cachedProfileMin || __cachedProfileMin.id !== user.id) {
      const { data } = await sb.from('profiles')
        .select('id, assistant_of_id').eq('id', user.id).maybeSingle();
      __cachedProfileMin = data || { id: user.id, assistant_of_id: null };
    }
    return __cachedProfileMin.assistant_of_id || user.id;
  },
  invalidateProfileCache() { __cachedProfileMin = null; },
  async signIn(email, password) {
    return await sb.auth.signInWithPassword({ email, password });
  },
  async signInWithGoogle() {
    return await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/',
      }
    });
  },
  async signOut() {
    return await sb.auth.signOut();
  },
  onChange(cb) {
    return sb.auth.onAuthStateChange(cb);
  }
};

// ── Storage Supabase ───────────────────────────────────────────
const storage = {
  async loadState(targetAgenteId) {
    const user = await auth.getUser();
    if (!user) return emptyState();
    // Si el admin pasa targetAgenteId (Ver como) usamos eso. Si no, usamos
    // el agente efectivo (que para un asistente es el principal).
    const effective = await auth.getEffectiveAgenteId();
    const agenteId = targetAgenteId || effective || user.id;
    const viendoAOtro = !!targetAgenteId && targetAgenteId !== user.id;

    // Columnas explícitas (no select('*')): consumimos menos ancho de banda y
    // documentamos qué necesita cada mapper. Si se agrega una columna nueva al
    // schema y se quiere visible en el frontend, actualizar el select aquí.
    const PROSPECTO_COLS = 'id, nombre, telefono, preferencia_contacto, detalle, referente, observaciones, estado, proximo_contacto, agente_id, actor_id, created_at, updated_at';
    const CONTACTO_COLS = 'id, prospecto_id, tipo, fecha, hora, observacion, agente_id, actor_id, created_at';
    const COLUMNA_COLS = 'id, agente_id, titulo, orden, slug, actor_id, updated_at';
    const TAREA_COLS = 'id, columna_id, prospecto_id, agente_id, actor_id, titulo, observacion, fecha_recordatorio, hora_recordatorio, google_event_id, archivada, created_at, updated_at';
    const AGENDADO_COLS = 'id, prospecto_id, agente_id, actor_id, fecha, nota, created_at';

    const [prosRes, conRes, colRes, tarRes, agnRes, evcRes] = await Promise.all([
      sb.from('abordaje_prospectos').select(PROSPECTO_COLS).eq('agente_id', agenteId).order('created_at', { ascending: false }),
      sb.from('abordaje_prospecto_contactos').select(CONTACTO_COLS).eq('agente_id', agenteId).order('created_at'),
      sb.from('abordaje_tareas_columnas').select(COLUMNA_COLS).eq('agente_id', agenteId).order('orden'),
      // Excluimos archivadas del state principal — el buscador con "Incluir
      // archivadas" hace un fetch separado on-demand cuando el user lo activa.
      sb.from('abordaje_tareas').select(TAREA_COLS).eq('agente_id', agenteId).eq('archivada', false).order('created_at'),
      sb.from('abordaje_agendados').select(AGENDADO_COLS).eq('agente_id', agenteId).order('fecha'),
      sb.from('abordaje_event_colors').select('event_key,color').eq('agente_id', agenteId)
    ]);

    [prosRes, conRes, colRes, tarRes, agnRes, evcRes].forEach(r => {
      if (r.error) console.error('loadState:', r.error.message);
    });

    const eventColors = {};
    for (const row of (evcRes.data || [])) eventColors[row.event_key] = row.color;

    let columnas = (colRes.data || []).map(mapColumnaFromDB);

    // Auto-completar columnas default que falten — solo cuando es el user mismo.
    // No semillamos cuando admin entra a "Ver como" otro (vemos lo que tenga).
    if (!viendoAOtro) {
      const tieneTitulo = new Set(columnas.map(c => c.titulo.toLowerCase()));
      const tieneAbordarSlug = columnas.some(c => c.slug === 'abordar');
      const faltantes = [];
      for (const def of TAREAS_COLUMNAS_DEFAULT) {
        // Si es la columna Abordar y ya hay una con slug='abordar', no duplicamos.
        if (def.slug === 'abordar' && tieneAbordarSlug) continue;
        // Si ya tiene columna con ese título, no duplicamos.
        if (tieneTitulo.has(def.titulo.toLowerCase())) continue;
        const ordenLibre = columnas.length + faltantes.length;
        faltantes.push({ agente_id: agenteId, titulo: def.titulo, orden: ordenLibre, slug: def.slug });
      }
      if (faltantes.length > 0) {
        const { data, error } = await sb.from('abordaje_tareas_columnas')
          .insert(faltantes).select();
        if (error) console.error('seed default columnas:', error.message);
        else if (data) columnas = [...columnas, ...data.map(mapColumnaFromDB)];
      }
    }

    return {
      version: 2,
      prospectos: (prosRes.data || []).map(p => mapProspectoFromDB(p, conRes.data || [])),
      agendados: (agnRes.data || []).map(mapAgendadoFromDB),
      tareas: {
        columnas,
        items: (tarRes.data || []).map(mapTareaFromDB)
      },
      eventColors,
    };
  },

  // ── Event colors (override visual de tarjetas del calendar) ──
  // event_key formato:
  //   "prospecto:UUID"  - evento derivado de un prospect
  //   "tarea:UUID"      - evento derivado de una tarea
  //   "agenda:UUID"     - agenda nativa de abordaje
  //   "gcal:GOOGLE_ID"  - evento externo de Google Calendar (modo piloto)
  async setEventColor(eventKey, color) {
    const user = await auth.getUser();
    const agenteId = await auth.getEffectiveAgenteId();
    if (!user?.id || !agenteId || !eventKey) return;
    if (!color) {
      const { error } = await sb.from('abordaje_event_colors')
        .delete().eq('agente_id', agenteId).eq('event_key', eventKey);
      if (error) throw error;
      return;
    }
    const { error } = await sb.from('abordaje_event_colors')
      .upsert({
        agente_id: agenteId,
        event_key: eventKey,
        color,
        actor_id: user.id,
        updated_at: new Date().toISOString(),
      }, { onConflict: 'agente_id,event_key' });
    if (error) throw error;
  },

  // ── Prospectos ──
  async createProspecto(input) {
    const user = await auth.getUser();
    const agenteId = await auth.getEffectiveAgenteId();
    const proximoContacto = input.proximoContacto || null;
    const fechaProx = proximoContacto && !proximoContacto.includes('T') ? proximoContacto : (proximoContacto ? proximoContacto.split('T')[0] : null);
    const { data, error } = await sb.from('abordaje_prospectos').insert({
      agente_id: agenteId,
      actor_id: user.id,
      nombre: input.nombre || '',
      telefono: input.telefono || '',
      preferencia_contacto: input.preferenciaContacto || '',
      detalle: input.detalle || '',
      referente: input.referente || '',
      observaciones: input.observaciones || '',
      estado: input.estado || 'nuevo',
      proximo_contacto: fechaProx
    }).select().single();
    if (error) throw error;
    return mapProspectoFromDB(data, []);
  },

  async updateProspecto(id, patch) {
    const dbPatch = {};
    if ('nombre' in patch) dbPatch.nombre = patch.nombre;
    if ('telefono' in patch) dbPatch.telefono = patch.telefono;
    if ('preferenciaContacto' in patch) dbPatch.preferencia_contacto = patch.preferenciaContacto;
    if ('detalle' in patch) dbPatch.detalle = patch.detalle;
    if ('referente' in patch) dbPatch.referente = patch.referente;
    if ('observaciones' in patch) dbPatch.observaciones = patch.observaciones;
    if ('estado' in patch) dbPatch.estado = patch.estado;
    if ('proximoContacto' in patch) {
      const v = patch.proximoContacto;
      dbPatch.proximo_contacto = v ? (v.includes('T') ? v.split('T')[0] : v) : null;
    }
    if (Object.keys(dbPatch).length === 0) return;
    const user = await auth.getUser();
    if (user?.id) dbPatch.actor_id = user.id;
    const { error } = await sb.from('abordaje_prospectos').update(dbPatch).eq('id', id);
    if (error) throw error;
  },

  async deleteProspecto(id) {
    const { error } = await sb.from('abordaje_prospectos').delete().eq('id', id);
    if (error) throw error;
  },

  // ── Contactos (historial de gestiones) ──
  async createContacto(prospectoId, contacto) {
    const user = await auth.getUser();
    const agenteId = await auth.getEffectiveAgenteId();
    const { fecha, hora } = contacto.agendadoPara
      ? splitFechaHora(contacto.agendadoPara)
      : { fecha: contacto.fecha || null, hora: contacto.hora || null };
    const { data, error } = await sb.from('abordaje_prospecto_contactos').insert({
      prospecto_id: prospectoId,
      agente_id: agenteId,
      actor_id: user.id,
      tipo: contacto.tipo || '',
      fecha, hora,
      observacion: contacto.observacion || ''
    }).select().single();
    if (error) throw error;
    return mapContactoFromDB(data);
  },

  async updateContacto(id, patch) {
    const dbPatch = {};
    if ('tipo' in patch) dbPatch.tipo = patch.tipo;
    if ('observacion' in patch) dbPatch.observacion = patch.observacion;
    if ('agendadoPara' in patch) {
      const { fecha, hora } = splitFechaHora(patch.agendadoPara);
      dbPatch.fecha = fecha; dbPatch.hora = hora;
    } else {
      if ('fecha' in patch) dbPatch.fecha = patch.fecha;
      if ('hora' in patch) dbPatch.hora = patch.hora;
    }
    if (Object.keys(dbPatch).length === 0) return;
    const user = await auth.getUser();
    if (user?.id) dbPatch.actor_id = user.id;
    const { error } = await sb.from('abordaje_prospecto_contactos').update(dbPatch).eq('id', id);
    if (error) throw error;
  },

  async deleteContacto(id) {
    const { error } = await sb.from('abordaje_prospecto_contactos').delete().eq('id', id);
    if (error) throw error;
  },

  // ── Columnas Kanban ──
  async createColumna(titulo, orden = 999) {
    const agenteId = await auth.getEffectiveAgenteId();
    const user = await auth.getUser();
    const { data, error } = await sb.from('abordaje_tareas_columnas').insert({
      agente_id: agenteId, titulo, orden,
      actor_id: user?.id || null,
    }).select().single();
    if (error) throw error;
    return mapColumnaFromDB(data);
  },

  async updateColumna(id, patch) {
    const dbPatch = {};
    if ('titulo' in patch) dbPatch.titulo = patch.titulo;
    if ('orden' in patch) dbPatch.orden = patch.orden;
    if (Object.keys(dbPatch).length === 0) return;
    // Si el patch es solo `orden` (reorden interno por drag), no pisamos actor
    // — la acción "interesante" es renombrar, no reordenar. Pero conviene
    // marcarlo también para tener trazabilidad. Lo dejamos en ambos casos.
    const user = await auth.getUser();
    if (user?.id) dbPatch.actor_id = user.id;
    dbPatch.updated_at = new Date().toISOString();
    const { error } = await sb.from('abordaje_tareas_columnas').update(dbPatch).eq('id', id);
    if (error) throw error;
  },

  async deleteColumna(id) {
    const { error } = await sb.from('abordaje_tareas_columnas').delete().eq('id', id);
    if (error) throw error;
  },

  // ── Tareas Kanban ──
  async createTarea({ columnaId, prospectoId = null, titulo = '', fechaRecordatorio = null, horaRecordatorio = null, observacion = '' }) {
    const user = await auth.getUser();
    const agenteId = await auth.getEffectiveAgenteId();
    const { data, error } = await sb.from('abordaje_tareas').insert({
      columna_id: columnaId,
      agente_id: agenteId,
      actor_id: user.id,
      prospecto_id: prospectoId,
      titulo,
      observacion,
      fecha_recordatorio: fechaRecordatorio,
      hora_recordatorio: horaRecordatorio
    }).select().single();
    if (error) throw error;
    return mapTareaFromDB(data);
  },

  async updateTarea(id, patch) {
    const dbPatch = {};
    if ('columnaId' in patch) dbPatch.columna_id = patch.columnaId;
    if ('titulo' in patch) dbPatch.titulo = patch.titulo;
    if ('observacion' in patch) dbPatch.observacion = patch.observacion;
    if ('fechaRecordatorio' in patch) dbPatch.fecha_recordatorio = patch.fechaRecordatorio;
    if ('horaRecordatorio' in patch) dbPatch.hora_recordatorio = patch.horaRecordatorio;
    if ('googleEventId' in patch) dbPatch.google_event_id = patch.googleEventId;
    if ('archivada' in patch) dbPatch.archivada = !!patch.archivada;
    if (Object.keys(dbPatch).length === 0) return;
    // Solo marcamos actor cuando el cambio incluye campos user-visible. Si el
    // patch es exclusivamente `googleEventId` (sync interno tras crear el evento
    // en Google) no pisamos el actor original.
    const onlyGoogleSync = Object.keys(dbPatch).length === 1 && 'google_event_id' in dbPatch;
    if (!onlyGoogleSync) {
      const user = await auth.getUser();
      if (user?.id) dbPatch.actor_id = user.id;
    }
    const { error } = await sb.from('abordaje_tareas').update(dbPatch).eq('id', id);
    if (error) throw error;
  },

  async deleteTarea(id) {
    const { error } = await sb.from('abordaje_tareas').delete().eq('id', id);
    if (error) throw error;
  },

  // Lista tareas archivadas del agente efectivo. Se usa on-demand cuando el
  // user tilda "Incluir archivadas" en el buscador global.
  async listTareasArchivadas() {
    const agenteId = await auth.getEffectiveAgenteId();
    if (!agenteId) return [];
    const TAREA_COLS = 'id, columna_id, prospecto_id, agente_id, actor_id, titulo, observacion, fecha_recordatorio, hora_recordatorio, google_event_id, archivada, created_at, updated_at';
    const { data, error } = await sb.from('abordaje_tareas')
      .select(TAREA_COLS)
      .eq('agente_id', agenteId)
      .eq('archivada', true)
      .order('updated_at', { ascending: false });
    if (error) { console.error('listTareasArchivadas:', error.message); return []; }
    return (data || []).map(mapTareaFromDB);
  },

  // ── Agendados ──
  // Solo se usan en modo NO piloto. En piloto, el calendar es Google directo
  // y no se persisten agendados en Supabase.
  async createAgendado(prospectoId, fechaISO, nota) {
    const user = await auth.getUser();
    const agenteId = await auth.getEffectiveAgenteId();
    const { data, error } = await sb.from('abordaje_agendados').insert({
      prospecto_id: prospectoId,
      agente_id: agenteId,
      actor_id: user.id,
      fecha: fechaISO,
      nota: nota || ''
    }).select().single();
    if (error) throw error;
    return mapAgendadoFromDB(data);
  },

  async deleteAgendado(id) {
    const { error } = await sb.from('abordaje_agendados').delete().eq('id', id);
    if (error) throw error;
  },

  async updateAgendado(id, patch) {
    const dbPatch = {};
    if ('fecha' in patch) dbPatch.fecha = patch.fecha;
    if ('nota' in patch)  dbPatch.nota  = patch.nota;
    if (Object.keys(dbPatch).length === 0) return null;
    const user = await auth.getUser();
    if (user?.id) dbPatch.actor_id = user.id;
    const { data, error } = await sb.from('abordaje_agendados').update(dbPatch).eq('id', id).select().single();
    if (error) throw error;
    return mapAgendadoFromDB(data);
  }
};

// Wrapper de la edge function gcal-events. Habla con Google Calendar via
// Domain-Wide Delegation (users del dominio Workspace) o OAuth user-level
// (gmail externos). La edge function valida el JWT y resuelve qué calendar
// tocar (incluyendo modo asistente, que opera sobre el del principal).
const gcalApi = {
  async list(timeMin, timeMax) {
    const { data, error } = await sb.functions.invoke('gcal-events', {
      body: { op: 'list', timeMin, timeMax }
    });
    if (error) throw error;
    if (data?.skip) return null;
    return data.events || [];
  },
  // Inyecta actor/agente en extendedProperties.private del evento de Google.
  // Esto permite que el calendar muestre la estrella en eventos creados o
  // editados por un asistente (incluso aunque el evento físicamente quede en
  // el calendar del principal). El extractor lee esos campos al renderizar.
  async _decorate(event) {
    if (!event) return event;
    const user = await auth.getUser();
    const agenteId = await auth.getEffectiveAgenteId();
    if (!user?.id) return event;
    const prevExt = event.extendedProperties || {};
    const prevPriv = prevExt.private || {};
    const priv = { ...prevPriv, abordaje_actor_id: user.id };
    if (agenteId) priv.abordaje_agente_id = agenteId;
    return { ...event, extendedProperties: { ...prevExt, private: priv } };
  },
  async create(event, calendarId) {
    const decorated = await this._decorate(event);
    const { data, error } = await sb.functions.invoke('gcal-events', {
      body: { op: 'create', event: decorated, calendarId }
    });
    if (error) throw error;
    if (data?.skip) return null;
    return data.event;
  },
  async update(eventId, event, calendarId) {
    const decorated = await this._decorate(event);
    const { data, error } = await sb.functions.invoke('gcal-events', {
      body: { op: 'update', eventId, event: decorated, calendarId }
    });
    if (error) throw error;
    if (data?.skip) return null;
    return data.event;
  },
  async delete(eventId, calendarId) {
    const { data, error } = await sb.functions.invoke('gcal-events', {
      body: { op: 'delete', eventId, calendarId }
    });
    if (error) throw error;
    return data;
  },
  // Borra el refresh_token del caller y baja gcal_enabled en su profile.
  // El delete directo a `user_google_tokens` desde el cliente falla silencioso
  // porque la tabla tiene RLS sin policies (los tokens viven solo en
  // service_role); por eso pasamos por la edge function.
  async unlink() {
    const { data, error } = await sb.functions.invoke('gcal-events', {
      body: { op: 'unlink' }
    });
    if (error) throw error;
    return data;
  }
};

// Dominio Workspace cubierto por Domain-Wide Delegation. Users con email del

const WORKSPACE_DOMAIN = 'ifs-broker.com';

// Indica si el calendar de Abordaje usa Google como fuente para este agente.
// Vale para los dos modos (Workspace + DWD, o externo + OAuth user-level).
function isGoogleCalendarUser(profile) {
  return !!profile?.gcal_enabled;
}

// True si el email es del dominio Workspace: en ese caso el toggle se activa
// sin pasar por OAuth (DWD). Para gmails externos se usa el botón "Vincular".
function isWorkspaceUser(profile) {
  return (profile?.email || '').toLowerCase().endsWith('@' + WORKSPACE_DOMAIN);
}

// True si la cuenta tiene una pinta tal que podría vincularse a Google. Los
// que no tienen ningún Google (ej. correos custom no-Gmail) caen acá como false.
function canLinkGoogleCalendar(profile) {
  const email = (profile?.email || '').toLowerCase();
  if (!email) return false;
  if (email.endsWith('@' + WORKSPACE_DOMAIN)) return true;
  if (email.endsWith('@gmail.com')) return true;
  // Otros dominios (Google Workspace de otra empresa) podrían funcionar también
  // si están como test users — los dejamos optar y Google decidirá.
  return true;

// Construye el body de un evento de Google Calendar.
//   startIso: ISO con TZ (ej. local Argentina serializado con toISOString())
//   durationMin: duración en minutos (default 60)
//   prospectId / tareaId: opcionales, se guardan en extendedProperties.private
//     para que el calendar pueda identificar a qué entidad de Abordaje corresponden.

// Necesario para Google Calendar: si mandamos dateTime con Z (UTC) + timeZone,

// el browser del cel está en una zona distinta, ve un desfase (ej. 14 ARG
// guardado como 17 UTC se mostraba como 17 al user). Mandar dateTime local
// + timeZone le dice a Google "este es el instante en esa zona", no ambiguo.
function dateToGcalLocal(d) {
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;

  const start = new Date(startIso);
  const end = new Date(start.getTime() + durationMin * 60_000);
  const body = {
    summary: summary || 'Agenda IFS',
    description: description || '',
    start: { dateTime: dateToGcalLocal(start), timeZone: GCAL_TZ },
    end:   { dateTime: dateToGcalLocal(end),   timeZone: GCAL_TZ },
  };
  const ext = {};
  if (prospectId) ext.abordaje_prospect_id = prospectId;
  if (tareaId)    ext.abordaje_tarea_id    = tareaId;
  if (Object.keys(ext).length) body.extendedProperties = { private: ext };

  },

const MESES_CORTOS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function diasEntre(a, b) {
  return Math.round((startOfDay(a) - startOfDay(b)) / (1000*60*60*24));
}
function pad2(n) { return String(n).padStart(2,'0'); }

// Parsea YYYY-MM-DD como fecha local (no UTC). new Date('2026-05-18') interpreta
// como UTC midnight, que en TZ negativa (UTC-3) cae en el día anterior local.
function parseFechaLocal(iso) {
  if (!iso) return null;
  if (typeof iso === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(iso)) {
    return new Date(parseInt(iso.slice(0,4), 10), parseInt(iso.slice(5,7), 10) - 1, parseInt(iso.slice(8,10), 10));
  }
  return new Date(iso);
}

function formatFechaCorta(iso) {
  if (!iso) return '';
  const d = parseFechaLocal(iso);
  // DD/MM/AA — formato consistente en toda la app (lista de abordaje, timeline,
  // bitácora, notifs, buscador). Si la fecha es hoy se agrega "(hoy)" para
  // resaltarla; ayer/mañana se muestran como cualquier otra fecha.
  const fecha = `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${String(d.getFullYear()).slice(-2)}`;
  const diff = diasEntre(d, new Date());
  return diff === 0 ? `${fecha} (hoy)` : fecha;
}

// Detecta si el iso original incluye componente de hora. Si solo trae fecha
// (YYYY-MM-DD), no hay sentido en imprimir "00:00" porque ese cero es ruido
// del parseo, no una hora real elegida por el user.
function isoTieneHora(iso) {
  return typeof iso === 'string' && iso.includes('T');
}

function formatFechaHora(iso) {
  if (!iso) return '';
  if (!isoTieneHora(iso)) return formatFechaCorta(iso);
  const d = parseFechaLocal(iso);
  return `${formatFechaCorta(iso)} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function describeProximo(iso) {
  if (!iso) return { texto: '', urgencia: null };
  const d = parseFechaLocal(iso);
  const hoy = new Date();
  const diffMs = d - hoy;
  const diffDias = diasEntre(d, hoy);
  // Vencido: prefijo "vencido" para que se distinga rápido en la lista.
  // En cualquier otro caso mostramos la fecha directamente — el "(hoy)" del
  // formato ya marca el caso especial.

    texto: formatFechaHora(iso),

// ── PARSERS FLEXIBLES ──────────────────────────────────────────
// Acepta dd/mm/aa, dd/mm/aaaa, d/m/aa, dd-mm-yyyy, dd.mm.aa, etc.
function parseFechaFlex(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (!s) return null;
  const parts = s.split(/[^\d]+/).filter(p => p.length > 0);
  if (parts.length < 2) return null;
  let [d, m, y] = parts.map(p => parseInt(p, 10));
  if (!d || !m) return null;
  if (y === undefined || isNaN(y)) y = new Date().getFullYear();
  else if (y < 100) y = 2000 + y;
  if (d < 1 || d > 31 || m < 1 || m > 12 || y < 1900 || y > 2200) return null;
  const date = new Date(y, m-1, d);
  if (date.getFullYear() !== y || date.getMonth() !== m-1 || date.getDate() !== d) return null;

}

// Acepta "9", "9:30", "930", "1430", "14:30", "14.30"
function parseHoraFlex(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (!s) return null;
  const cleaned = s.replace(/[^\d]/g, '');
  if (cleaned.length === 0) return null;
  let h, m;
  if (cleaned.length <= 2) { h = parseInt(cleaned, 10); m = 0; }
  else if (cleaned.length === 3) { h = parseInt(cleaned[0], 10); m = parseInt(cleaned.slice(1), 10); }
  else if (cleaned.length === 4) { h = parseInt(cleaned.slice(0,2), 10); m = parseInt(cleaned.slice(2), 10); }
  else return null;
  if (h < 0 || h > 23 || m < 0 || m > 59) return null;
  return { h, m };
}

  let i = arr.length - 1;

  if (i < 0) return 'nuevo';
  const cfg = tipoConfig(arr[i].tipo);
  return cfg ? cfg.estado : 'nuevo';

function dateToLocalIso(d) {
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function calcAgendadoPara(tipo, custom) {
  switch (tipo) {
    case 'llamar_15min': {
      const d = new Date();
      d.setMinutes(d.getMinutes() + 15);
      return dateToLocalIso(d);
    }
    case 'contestador': {
      // Cuando deja contestador, lo re-agendamos solo para el próximo lunes 9am.
      // Si HOY es lunes antes de las 9, se programa para hoy. Si es lunes a/después
      // de las 9, salta al lunes siguiente.
      const d = new Date();
      const day = d.getDay(); // 0=Dom, 1=Lun, ..., 6=Sáb
      let diasHastaLunes;
      if (day === 1 && d.getHours() < 9) {
        diasHastaLunes = 0;
      } else if (day === 0) {
        diasHastaLunes = 1;
      } else {
        diasHastaLunes = 8 - day; // 1..7
      }
      d.setDate(d.getDate() + diasHastaLunes);
      d.setHours(9, 0, 0, 0);
      return dateToLocalIso(d);
    }
    case 'mensaje_sin_respuesta': {
      // Mensaje enviado sin respuesta: damos un día para que conteste y reintentamos mañana 9am.
      const d = new Date();
      d.setDate(d.getDate() + 1); d.setHours(9, 0, 0, 0);
      return dateToLocalIso(d);
    }
    case 'llamar_tarde': {
      const d = new Date();
      if (d.getHours() < 16) { d.setHours(17, 0, 0, 0); }
      else { d.setDate(d.getDate() + 1); d.setHours(17, 0, 0, 0); }
      return dateToLocalIso(d);
    }
    case 'llamar_manana': {
      const d = new Date();
      d.setDate(d.getDate() + 1); d.setHours(9, 0, 0, 0);
      return dateToLocalIso(d);
    }
    case 'llamar_semana': {
      const d = new Date();
      d.setDate(d.getDate() + 7); d.setHours(9, 0, 0, 0);
      return dateToLocalIso(d);
    }
    case 'llamar_dentro_de':
    case 'fecha_exacta':
    case 'agendado':
      return custom || null;
    default:
      return null;
  }
}

function showToast(msg, opts = {}) {
  const { actionLabel, action, duration = 2400, dismissible = false } = opts;
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';

  const txt = document.createElement('span');
  txt.textContent = msg;
  el.appendChild(txt);

  if (actionLabel && typeof action === 'function') {
    const btn = document.createElement('button');
    btn.className = 'toast-action';
    btn.textContent = actionLabel;
    btn.onclick = () => { action(); if (el.parentNode) el.remove(); };
    el.appendChild(btn);
  }
  if (dismissible) {
    const close = document.createElement('button');
    close.className = 'toast-close';
    close.textContent = '×';
    close.setAttribute('aria-label', 'Cerrar');
    close.onclick = () => { if (el.parentNode) el.remove(); };
    el.appendChild(close);
  }

  document.body.appendChild(el);
  if (duration > 0) {
    setTimeout(() => { if (el.parentNode) el.remove(); }, duration);
  }
}

// ── INPUTS DE FECHA / HORA NATIVOS ────────────────────────────
// Decisión 2026-05-21: después de varios intentos con tipeo predictivo
// custom (auto-format "/", select-all on focus, etc.) que se sentían
// "mágicos demás" o inconsistentes según el browser, volvimos a usar los
// inputs HTML nativos. Ventajas: en mobile abre el picker del SO (wheel
// iOS, calendar Android), en desktop spinner o tipeo directo, validación
// gratis, cero código nuestro que se rompa. La interface hacia el padre
// no cambia: onChange recibe 'YYYY-MM-DD' para fecha y 'HH:MM' para hora.
function FechaTexto({ valueIso, onChange, placeholder = '' }) {
  // valueIso es "yyyy-mm-dd" o ISO completo o ''. El input type=date
  // requiere exactamente "yyyy-mm-dd".
  const v = valueIso ? (valueIso.length >= 10 ? valueIso.slice(0, 10) : valueIso) : '';
  return (
    <input type="date" value={v}
      onChange={e => onChange(e.target.value || '')}
    />
  );
}

// HoraTexto: 4 slots de 1 dígito cada uno (H H : M M), agrupados visualmente
// como un solo input. Cada slot se edita independiente: click en él lo
// selecciona, tipeás un dígito y reemplaza ese carácter. Auto-jump al
// siguiente slot SOLO cuando tipeás (no cuando borrás). Formato 24hs
// garantizado.
function HoraTexto({ value, onChange }) {
  // Slots: [h1, h2, m1, m2]. Inicializa desde value "HH:MM" o vacío.
  const fromValue = (v) => (v && v.length >= 5)
    ? [v[0], v[1], v[3], v[4]]
    : ['', '', '', ''];
  const [slots, setSlots] = useState(() => fromValue(value));
  const refs = [useRef(null), useRef(null), useRef(null), useRef(null)];

  useEffect(() => { setSlots(fromValue(value)); }, [value]);

  const updateSlot = (idx, v) => {
    const next = [...slots];
    next[idx] = v;
    setSlots(next);
    // Emit al padre solo si los 4 slots están llenos y forman tiempo válido.
    if (next.every(s => s !== '')) {
      const hh = parseInt(next[0] + next[1], 10);
      const mm = parseInt(next[2] + next[3], 10);
      if (hh <= 23 && mm <= 59) onChange(`${pad2(hh)}:${pad2(mm)}`);
    } else if (next.every(s => s === '')) {
      onChange('');
    }
    // Casos intermedios (algunos slots llenos): no emit, padre mantiene valor previo.
  };

  const onSlotChange = (idx) => (e) => {
    const v = (e.target.value || '').replace(/\D/g, '').slice(0, 1);
    updateSlot(idx, v);
    // Auto-jump al siguiente slot SOLO si efectivamente tipeó un dígito (v
    // no vacío). Si borró, queda en el slot actual para que pueda re-tipear.
    if (v && idx < 3) {
      setTimeout(() => {
        const next = refs[idx + 1].current;
        if (next) { next.focus(); try { next.select(); } catch (_) {} }
      }, 0);
    }
  };
  const onSlotFocus = (e) => {
    const el = e.target;
    setTimeout(() => { try { el.select(); } catch (_) {} }, 0);
  };

  return (
    <span className="hora-slots">
      <input ref={refs[0]} type="text" inputMode="numeric" maxLength={1} value={slots[0]}
        aria-label="Decena de hora" onChange={onSlotChange(0)} onFocus={onSlotFocus} />
      <input ref={refs[1]} type="text" inputMode="numeric" maxLength={1} value={slots[1]}
        aria-label="Unidad de hora" onChange={onSlotChange(1)} onFocus={onSlotFocus} />
      <span className="hora-slots-sep">:</span>
      <input ref={refs[2]} type="text" inputMode="numeric" maxLength={1} value={slots[2]}
        aria-label="Decena de minutos" onChange={onSlotChange(2)} onFocus={onSlotFocus} />
      <input ref={refs[3]} type="text" inputMode="numeric" maxLength={1} value={slots[3]}
        aria-label="Unidad de minutos" onChange={onSlotChange(3)} onFocus={onSlotFocus} />
    </span>
  );
}

// ── FILTROS ────────────────────────────────────────────────────
// Devuelve el tipo (id) del último contacto registrado, o null si no hay.
function ultimoContactoTipo(p) {
  if (!p.contactos || p.contactos.length === 0) return null;
  let last = null;
  for (const c of p.contactos) {
    if (!last || (c.createdAt || '') > (last.createdAt || '')) last = c;
  }
  return last?.tipo || null;
}

function aplicarFiltros(prospectos, filterEstado, filterFecha, filterEtiqueta = [], ordenFecha = 'ninguno') {
  const hoy = new Date();
  // filterEtiqueta es array (vacío = todas). Aceptamos también el formato
  // legacy de string ('todos' o un único id) por compatibilidad.
  const etiquetasSeleccionadas = Array.isArray(filterEtiqueta)
    ? filterEtiqueta
    : (filterEtiqueta === 'todos' || !filterEtiqueta ? [] : [filterEtiqueta]);
  let r = prospectos.filter(p => {
    const estado = deriveEstado(p);
    if (filterEstado !== 'todos' && estado !== filterEstado) return false;
    if (etiquetasSeleccionadas.length > 0) {
      const tipo = ultimoContactoTipo(p);
      const matches = etiquetasSeleccionadas.some(et =>
        et === 'sin_etiqueta' ? !tipo : tipo === et
      );
      if (!matches) return false;
    }
    if (filterFecha !== 'todos') {
      const proxIso = p.proximoContacto;
      if (filterFecha === 'sin_fecha') { if (proxIso) return false; }
      else {
        if (!proxIso) return false;
        const prox = new Date(proxIso);
        const diff = diasEntre(prox, hoy);
        if (filterFecha === 'vencidos' && !(prox < hoy)) return false;
        if (filterFecha === 'hoy' && diff !== 0) return false;
        if (filterFecha === 'semana' && !(diff >= 0 && diff <= 7)) return false;
      }
    }
    return true;
  });
  if (ordenFecha === 'asc' || ordenFecha === 'desc') {
    r = [...r].sort((a, b) => {
      const ax = a.proximoContacto || '';
      const bx = b.proximoContacto || '';
      // Sin fecha al final en ambos órdenes.
      if (!ax && !bx) return 0;
      if (!ax) return 1;
      if (!bx) return -1;
      return ordenFecha === 'asc' ? ax.localeCompare(bx) : bx.localeCompare(ax);
    });
  }
  return r;
}

// ── TAREAS HELPERS ──────────────────────────────────────────────
function newTarea({ columnaId, titulo = '', fechaRecordatorio = null, horaRecordatorio = null, observacion = '' }) {
  const now = new Date().toISOString();
  return {
    id: 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    columnaId,
    titulo: titulo || '',
    fechaRecordatorio,
    horaRecordatorio,
    observacion: observacion || '',
    createdAt: now,
    updatedAt: now,
  };
}

function newColumna(titulo) {
  return {
    id: 'col_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    titulo: titulo || 'Nueva columna',
    orden: 999,
  };
}

function reordenarColumnas(columnas) {
  return [...columnas]
    .sort((a, b) => (a.orden ?? 999) - (b.orden ?? 999))
    .map((c, i) => ({ ...c, orden: i }));
}

let _ifsLogoCache = null;
async function loadIFSLogoPNG(targetWidth = 1200) {
  if (_ifsLogoCache && _ifsLogoCache.width === targetWidth) return _ifsLogoCache;
  return new Promise((resolve, reject) => {
    const blob = new Blob([IFS_LOGO_SVG], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const aspect = img.naturalWidth / img.naturalHeight || 2;
      const w = targetWidth, h = Math.round(targetWidth / aspect);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      _ifsLogoCache = { dataURL: canvas.toDataURL('image/png'), width: w, height: h };
      resolve(_ifsLogoCache);
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}


function _filaProspectoParaExport(p) {
  const ult = (p.contactos || []).slice(-1)[0];
  const cfgUlt = ult ? tipoConfig(ult.tipo) : null;
  const proxIso = p.proximoContacto;
  return {
    Nombre:        p.nombre || '',
    Telefono:      p.telefono || '',
    Estado:        ESTADO_META[deriveEstado(p)]?.label || '',
    UltimaGestion: cfgUlt?.label || '',
    UltimaFecha:   ult?.createdAt ? new Date(ult.createdAt).toLocaleDateString('es-AR') : '',
    Proximo:       proxIso ? new Date(proxIso).toLocaleString('es-AR', { dateStyle: 'short', timeStyle: 'short' }) : '',
    Observacion:   ult?.observacion || '',
    Referente:     p.referente || '',
    Preferencia:   p.preferenciaContacto || '',
  };
}

function exportarProspectosExcel(prospectos) {
  if (!window.XLSX) { alert('XLSX library no cargada'); return; }
  const filas = prospectos.map(_filaProspectoParaExport);
  const ws = XLSX.utils.json_to_sheet(filas);
  ws['!cols'] = [
    { wch: 24 }, { wch: 14 }, { wch: 12 }, { wch: 16 },
    { wch: 12 }, { wch: 16 }, { wch: 40 }, { wch: 16 }, { wch: 12 },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Prospectos');
  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `IFS_Abordaje_${ts}.xlsx`);
}

function _hex2rgb(hex) {
  if (!hex) return [80, 80, 100];
  const m = hex.replace('#', '').match(/^([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return [80, 80, 100];
  return [parseInt(m[1], 16), parseInt(m[2], 16), parseInt(m[3], 16)];
}

// Devuelve los últimos N contactos del prospecto en el orden que los queremos pintar
// (más reciente primero — el más nuevo arriba sin sangría).
function _ultimasGestiones(p, max = 3) {
  return [...(p.contactos || [])].reverse().slice(0, max);
}

async function exportarProspectosPDF(prospectos, user) {
  if (!window.jspdf || !window.jspdf.jsPDF) { alert('jsPDF library no cargada'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();

  // Cargar el logo IFS (SVG → PNG)
  let logo = null;
  try { logo = await loadIFSLogoPNG(1200); }
  catch (e) { console.error('no se pudo cargar logo IFS:', e); }

  // Header con logo IFS real
  const drawHeader = () => {
    // Banda navy superior
    doc.setFillColor(30, 27, 75);
    doc.rect(0, 0, pageW, 16, 'F');

    if (logo) {
      // Logo IFS — alto fijo 10mm, ancho calculado por aspect ratio
      const aspect = logo.width / logo.height;
      const logoH = 10, logoW = logoH * aspect;
      doc.addImage(logo.dataURL, 'PNG', 10, 3, logoW, logoH);
    } else {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(13);
      doc.setTextColor(145, 216, 247);
      doc.text('IFS', 12, 10);
    }

    // Título derecha
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(255, 255, 255);
    doc.text('Lista de Abordaje', pageW - 12, 10, { align: 'right' });

    // Sub-banda info
    doc.setFontSize(8);
    doc.setTextColor(80, 80, 100);
    doc.setFont('helvetica', 'normal');
    const fecha = new Date().toLocaleString('es-AR', { dateStyle: 'short', timeStyle: 'short' });
    doc.text(`Asesor: ${user?.email || 'IFS'}`, 12, 22);
    doc.text(`Generado: ${fecha}`, pageW - 12, 22, { align: 'right' });
  };

  const drawFooter = (pageNum, pageCount) => {
    doc.setFontSize(7.5);
    doc.setTextColor(120, 120, 140);
    doc.setFont('helvetica', 'normal');
    doc.text('www.broker-ifs.com — Confidencial', 12, pageH - 6);
    doc.text(`Página ${pageNum} de ${pageCount}`, pageW - 12, pageH - 6, { align: 'right' });
  };

  // Datos de la tabla. La columna 4 (Últimas gestiones) la dibujamos a mano en didDrawCell.
  const head = [['#', 'Nombre', 'Teléfono', 'Estado', 'Últimas gestiones', 'Ref.', 'Pref.']];
  const body = prospectos.map((p, i) => {
    return [
      i + 1,
      p.nombre || '',
      p.telefono || '',
      ESTADO_META[deriveEstado(p)]?.label || '',
      '', // se dibuja en didDrawCell
      p.referente || '',
      p.preferenciaContacto || '',
    ];
  });

  // Constantes del rendering manual de la celda 4
  const ROW_H_GESTION = 4.6;     // alto por gestión (mm)
  const SANGRIA_PX = 5;          // sangría progresiva (mm) por nivel

  doc.autoTable({
    head, body,
    startY: 28,
    margin: { left: 10, right: 10, top: 28, bottom: 12 },
    styles: { font: 'helvetica', fontSize: 7.5, cellPadding: 2.5, overflow: 'linebreak', valign: 'middle' },
    headStyles: { fillColor: [62, 64, 149], textColor: 255, fontSize: 7.5, fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [245, 247, 252] },
    columnStyles: {
      0: { cellWidth: 8,  halign: 'right' },
      1: { cellWidth: 42, fontStyle: 'bold' },
      2: { cellWidth: 24 },
      3: { cellWidth: 22 },
      4: { cellWidth: 'auto', minCellHeight: 18, valign: 'top' },
      5: { cellWidth: 18, overflow: 'ellipsize' },
      6: { cellWidth: 22, overflow: 'ellipsize' },
    },
    didDrawPage: () => { drawHeader(); },
    didDrawCell: (data) => {
      // Render manual de la columna 4 (Últimas gestiones)
      if (data.column.index !== 4 || data.section !== 'body') return;
      const p = prospectos[data.row.index];
      if (!p) return;
      const ultimos = _ultimasGestiones(p, 3);
      if (ultimos.length === 0) {
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(7);
        doc.setTextColor(150, 150, 165);
        doc.text('Sin gestiones', data.cell.x + 2, data.cell.y + 5);
        return;
      }
      const baseX = data.cell.x + 2;
      const startY = data.cell.y + 4;
      ultimos.forEach((c, i) => {
        const cfg = tipoConfig(c.tipo);
        const x = baseX + i * SANGRIA_PX;
        const y = startY + i * ROW_H_GESTION;

        // 1) Fecha del registro
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(6.5);
        doc.setTextColor(110, 110, 130);
        const fechaReg = c.createdAt
          ? new Date(c.createdAt).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' })
          : '';
        doc.text(fechaReg, x, y);
        let cursor = x + (fechaReg ? doc.getTextWidth(fechaReg) + 2 : 0);

        // 2) Chip etiqueta con color
        const label = (cfg?.label || c.tipo || '').toUpperCase();
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(5.8);
        const labelW = doc.getTextWidth(label) + 2.5;
        const bg = _hex2rgb(cfg?.bg || '#eef4fb');
        const fg = _hex2rgb(cfg?.color || '#3E4095');
        doc.setFillColor(bg[0], bg[1], bg[2]);
        doc.roundedRect(cursor, y - 2.7, labelW, 3.4, 0.8, 0.8, 'F');
        doc.setTextColor(fg[0], fg[1], fg[2]);
        doc.text(label, cursor + 1.25, y);
        cursor += labelW + 1.5;

        // 3) Fecha objetivo (si tiene). Uso >> en vez de → porque jsPDF default no tiene la flecha unicode.
        if (c.agendadoPara) {
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(6.5);
          doc.setTextColor(62, 64, 149);
          const d = new Date(c.agendadoPara);
          const fechaObj = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
          const objTxt = '>> ' + fechaObj;
          doc.text(objTxt, cursor, y);
          cursor += doc.getTextWidth(objTxt) + 1.5;
        }

        // 4) Observación (truncada al ancho disponible)
        if (c.observacion) {
          doc.setFont('helvetica', 'italic');
          doc.setFontSize(6.5);
          doc.setTextColor(70, 70, 90);
          const maxW = (data.cell.x + data.cell.width) - cursor - 2;
          if (maxW > 5) {
            const linea = doc.splitTextToSize(c.observacion, maxW)[0] || '';
            doc.text(linea, cursor, y);
          }
        }
      });
    },
  });

  // Footer en cada página (con paginación final)
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    drawFooter(i, pageCount);
  }

  const ts = new Date().toISOString().slice(0,10);
  doc.save(`IFS_Abordaje_${ts}.pdf`);
}

// Helper para montar children en un elemento del DOM ya existente (slot
// fuera del árbol React). Se usa para inyectar el buscador en el header HTML.
function MountInSlot({ slotId, children }) {
  const [target, setTarget] = useState(null);
  useEffect(() => { setTarget(document.getElementById(slotId)); }, [slotId]);
  if (!target) return null;
  return ReactDOM.createPortal(children, target);
}

// ── BUSCADOR GLOBAL ────────────────────────────────────────────
// Busca en prospectos, tareas y agendados. Resultados unificados con categoría
// y handlers de click que llevan al lugar de acción correspondiente.
const CATEGORIA_LABEL = { lista: 'Lista', tarea: 'Tarea', tarea_archivada: 'Tarea archivada', calendario: 'Calendario' };

function buscarGlobal(state, query, gcalSearchEvents = null, tareasArchivadas = null, max = 12) {
  const q = query.trim().toLowerCase();
  if (q.length < 2) return [];
  const resultados = [];

  // Prospectos (lista de abordaje). El haystack incluye también las
  // observaciones de cada gestión registrada (contactos[].observacion), así
  // un texto cargado en una gestión vieja te lleva al prospect que la tiene.
  for (const p of state.prospectos || []) {
    const obsContactos = (p.contactos || [])
      .map(c => c.observacion)
      .filter(Boolean)
      .join(' ');
    const haystack = [p.nombre, p.telefono, p.detalle, p.observaciones, p.referente, p.preferenciaContacto, obsContactos]
      .filter(Boolean).join(' ').toLowerCase();
    if (haystack.includes(q)) {
      resultados.push({
        key: 'p_' + p.id,
        categoria: 'lista',
        titulo: p.nombre || '(sin nombre)',
        sub: p.telefono || '',
        prospectoId: p.id,
        sortScore: (p.nombre || '').toLowerCase().startsWith(q) ? 0 : 1,
      });
    }
  }
  // Tareas (Kanban)
  for (const t of state.tareas?.items || []) {
    const haystack = [t.titulo, t.observacion].filter(Boolean).join(' ').toLowerCase();
    if (haystack.includes(q)) {
      resultados.push({
        key: 't_' + t.id,
        categoria: 'tarea',
        titulo: t.titulo || '(sin título)',
        sub: t.observacion || '',
        tareaId: t.id,
        prospectoId: t.prospectoId || null,
        sortScore: (t.titulo || '').toLowerCase().startsWith(q) ? 0 : 1,
      });
    }
  }
  // Tareas archivadas (solo si el user tildó "Incluir archivadas").
  if (Array.isArray(tareasArchivadas)) {
    for (const t of tareasArchivadas) {
      const haystack = [t.titulo, t.observacion].filter(Boolean).join(' ').toLowerCase();
      if (haystack.includes(q)) {
        resultados.push({
          key: 'ta_' + t.id,
          categoria: 'tarea_archivada',
          titulo: t.titulo || '(sin título)',
          sub: t.observacion || '',
          tareaId: t.id,
          tareaObj: t,
          prospectoId: t.prospectoId || null,
          sortScore: (t.titulo || '').toLowerCase().startsWith(q) ? 0 : 1,
        });
      }
    }
  }
  // Agendados (calendario) — solo para users non-piloto. Los pilot users tienen
  // sus eventos en Google y se buscan más abajo.
  for (const a of state.agendados || []) {
    const prospect = (state.prospectos || []).find(p => p.id === a.prospectoId);
    const haystack = [a.nota, prospect?.nombre].filter(Boolean).join(' ').toLowerCase();
    if (haystack.includes(q)) {
      const fechaTxt = formatFechaHora(a.fecha);
      resultados.push({
        key: 'a_' + a.id,
        categoria: 'calendario',
        titulo: prospect?.nombre || a.nota || 'Cita',
        sub: fechaTxt,
        prospectoId: a.prospectoId,
        sortScore: (prospect?.nombre || '').toLowerCase().startsWith(q) ? 0 : 1,
      });
    }
  }

  // Eventos de Google Calendar (modo piloto) — buscamos en summary y
  // description. Los gcalSearchEvents se cargan lazy desde BuscadorGlobal en un
  // rango amplio (-3 a +12 meses).
  if (Array.isArray(gcalSearchEvents)) {
    const seenIds = new Set();
    for (const ev of gcalSearchEvents) {
      if (!ev || ev.status === 'cancelled' || seenIds.has(ev.id)) continue;
      seenIds.add(ev.id);
      const summary = ev.summary || '';
      const description = ev.description || '';
      const haystack = (summary + ' ' + description).toLowerCase();
      if (!haystack.includes(q)) continue;
      const startIso = ev.start?.dateTime || ev.start?.date;
      if (!startIso) continue;
      const fechaTxt = formatFechaHora(startIso);
      const ext = ev.extendedProperties?.private || {};
      resultados.push({
        key: 'g_' + ev.id,
        categoria: 'calendario',
        titulo: summary || '(sin título)',
        sub: fechaTxt + (description ? ' · ' + description.slice(0, 60) : ''),
        prospectoId: ext.abordaje_prospect_id || null,
        tareaId: ext.abordaje_tarea_id || null,
        googleEvent: ev,
        sortScore: summary.toLowerCase().startsWith(q) ? 0 : 1,
      });
    }
  }

  resultados.sort((x, y) => x.sortScore - y.sortScore || x.titulo.localeCompare(y.titulo));
  return resultados.slice(0, max);
}

function BuscadorGlobal({ state, isPilot, onClickItem }) {
  const [query, setQuery] = useState('');
  // Debounce de 200ms: el input refleja la query al instante (responsive),
  // pero el filtrado solo corre cuando el user deja de tipear 200ms. Evita
  // recorrer todo el state en cada keystroke con 500+ prospectos.
  const [debouncedQuery, setDebouncedQuery] = useState('');
  useEffect(() => {
    const t = setTimeout(() => setDebouncedQuery(query), 200);
    return () => clearTimeout(t);
  }, [query]);
  const [open, setOpen] = useState(false);
  // Cache de eventos de Google para búsqueda (rango amplio, lazy load).
  // Se carga cuando el user escribe ≥2 chars; se mantiene hasta cerrar el
  // dropdown o pasados 5 min. Solo aplica en modo piloto.
  const [gcalSearchEvents, setGcalSearchEvents] = useState(null);
  const gcalFetchAtRef = useRef(0);
  // Tareas archivadas — fetch on-demand cuando el user tilda el check.
  // Persistido por sesión: si el user lo dejó tildado, se mantiene.
  const [incluirArchivadas, setIncluirArchivadas] = useState(() => {
    try { return localStorage.getItem('abordaje_buscar_archivadas') === '1'; } catch { return false; }
  });
  const [tareasArchivadas, setTareasArchivadas] = useState(null);
  const [loadingArchivadas, setLoadingArchivadas] = useState(false);
  const archivadasFetchAtRef = useRef(0);
  const wrapRef = useRef(null);
  const items = useMemo(
    () => buscarGlobal(state, debouncedQuery, gcalSearchEvents, incluirArchivadas ? tareasArchivadas : null),
    [state, debouncedQuery, gcalSearchEvents, incluirArchivadas, tareasArchivadas]
  );

  // Cuando el user escribe ≥2 chars Y estamos en piloto, cargamos eventos de
  // Google con rango amplio (-3 a +12 meses) una sola vez. Cache 5 min.
  // Usamos debouncedQuery para no triggear fetch en cada keystroke.
  useEffect(() => {
    if (!isPilot) return;
    if (debouncedQuery.trim().length < 2) return;
    const now = Date.now();
    if (now - gcalFetchAtRef.current < 5 * 60 * 1000 && gcalSearchEvents) return;
    let cancelled = false;
    const timeMin = new Date(now - 90 * 24 * 3600 * 1000).toISOString();
    const timeMax = new Date(now + 365 * 24 * 3600 * 1000).toISOString();
    gcalApi.list(timeMin, timeMax)
      .then(evts => { if (!cancelled) { setGcalSearchEvents(evts || []); gcalFetchAtRef.current = Date.now(); } })
      .catch(err => console.warn('buscador gcal:', err?.message || err));
    return () => { cancelled = true; };
  }, [isPilot, debouncedQuery]);

  // Fetch on-demand de tareas archivadas: solo si el check está tildado y hay
  // query ≥ 2 chars. Cache 5 min para no machacar Supabase.
  useEffect(() => {
    if (!incluirArchivadas) return;
    if (debouncedQuery.trim().length < 2) return;
    const now = Date.now();
    if (now - archivadasFetchAtRef.current < 5 * 60 * 1000 && tareasArchivadas) return;
    let cancelled = false;
    setLoadingArchivadas(true);
    storage.listTareasArchivadas()
      .then(items => { if (!cancelled) { setTareasArchivadas(items || []); archivadasFetchAtRef.current = Date.now(); } })
      .catch(err => console.warn('buscador archivadas:', err?.message || err))
      .finally(() => { if (!cancelled) setLoadingArchivadas(false); });
    return () => { cancelled = true; };
  }, [incluirArchivadas, debouncedQuery]);

  useEffect(() => {
    const onClick = (e) => {
      if (!wrapRef.current) return;
      if (!wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, []);

  const seleccionar = (it) => {
    onClickItem(it);
    setQuery('');
    setOpen(false);
  };

  const toggleIncluirArchivadas = (val) => {
    setIncluirArchivadas(val);
    try { localStorage.setItem('abordaje_buscar_archivadas', val ? '1' : '0'); } catch {}
    if (!val) setTareasArchivadas(null);
  };

  return (
    <div className="buscador-wrap" ref={wrapRef}>
      <input
        className="buscador-input"
        type="search"
        aria-label="Buscar prospectos, tareas y eventos"
        placeholder="Buscar prospecto, tarea, cita…"
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onKeyDown={e => {
          if (e.key === 'Escape') { setQuery(''); setOpen(false); e.target.blur(); }
          if (e.key === 'Enter' && items[0]) seleccionar(items[0]);
        }}
      />
      {open && query.trim().length >= 2 && (
        <div className="buscador-dropdown">
          <label className="buscador-toggle">
            <input type="checkbox" checked={incluirArchivadas}
              onChange={e => toggleIncluirArchivadas(e.target.checked)} />
            <span>Incluir archivadas{loadingArchivadas ? ' (cargando…)' : ''}</span>
          </label>
          {items.length === 0 ? (
            <div className="buscador-empty">Sin resultados para "{query}"</div>
          ) : items.map(it => (
            <div key={it.key} className={`buscador-item${it.categoria === 'tarea_archivada' ? ' es-archivada' : ''}`} onClick={() => seleccionar(it)}>
              <div className="buscador-item-body">
                <div className="buscador-item-titulo">
                  {it.titulo}
                  <span className="buscador-item-cat"> — {CATEGORIA_LABEL[it.categoria]}</span>
                </div>
                {it.sub && <div className="buscador-item-sub">{it.sub}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── NOTIFICACIONES (campanita) ─────────────────────────────────
// Calcula la lista de eventos pendientes (vencidos + hoy + próximos 24h + semana)
// a partir del state actual. No consulta DB — todo viene de prospectos, tareas
// y agendados ya cargados.
function clasificarUrgenciaNotif(fecha, now, en24h) {
  if (fecha < now) return 'vencido';
  if (isToday(fecha)) return 'hoy';
  if (fecha <= en24h) return '24h';
  return 'semana';
}

// `dismissed` es un map { itemKey: 'YYYY-MM-DD' } con notificaciones dismisseadas
// hoy. Al cambiar de día, los dismisses caducan y la notificación reaparece si
// el evento sigue pendiente.
function calcularNotificaciones(state, isPilot = false, dismissed = {}) {
  const now = new Date();
  const en24h = new Date(now.getTime() + 24 * 3600 * 1000);
  const en7d = new Date(now.getTime() + 7 * 24 * 3600 * 1000);
  const todayKey = `${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())}`;

  const items = [];

  // Agendados (citas formales — eventos azules en calendario).
  // En piloto la fuente canónica son los eventos de Google Calendar; los rows
  // que sobrevivan en abordaje_agendados son stale/huérfanos y no deben leakear
  // a notificaciones (el calendar tampoco los muestra en piloto).
  const skipAgendadosDB = isPilot;
  for (const a of (skipAgendadosDB ? [] : (state.agendados || []))) {
    const fecha = new Date(a.fecha);
    if (fecha > en7d) continue;
    const prospect = state.prospectos.find(p => p.id === a.prospectoId);
    items.push({
      key: 'ag_' + a.id,
      tipo: 'agendado',
      fecha,
      titulo: prospect?.nombre || '(sin nombre)',
      detalle: a.nota || 'Cita agendada',
      prospectoId: a.prospectoId,
      urgencia: clasificarUrgenciaNotif(fecha, now, en24h),
    });
  }

  // Tareas con vencimiento
  for (const t of state.tareas?.items || []) {
    if (!t.fechaRecordatorio) continue;
    const fecha = t.horaRecordatorio
      ? new Date(`${t.fechaRecordatorio}T${t.horaRecordatorio}:00`)
      : new Date(`${t.fechaRecordatorio}T23:59:59`);
    if (fecha > en7d) continue;
    items.push({
      key: 'ta_' + t.id,
      tipo: 'tarea',
      fecha,
      titulo: t.titulo || '(tarea sin título)',
      detalle: t.observacion || '',
      tareaId: t.id,
      prospectoId: t.prospectoId || null,
      urgencia: clasificarUrgenciaNotif(fecha, now, en24h),
    });
  }

  items.sort((a, b) => a.fecha - b.fecha);
  return items.filter(it => dismissed[it.key] !== todayKey);
}

const URGENCIA_META = {
  vencido: { label: 'Vencidos',         color: '#dc2626', bg: '#fef2f2', emoji: '🔴' },
  hoy:     { label: 'Hoy',              color: '#ea580c', bg: '#fff7ed', emoji: '🟠' },
  '24h':   { label: 'Próximas 24 hs',   color: '#a16207', bg: '#fefce8', emoji: '🟡' },
  semana:  { label: 'Esta semana',      color: '#1e40af', bg: '#eff6ff', emoji: '🔵' },
};

function NotificacionesDropdown({ items, onClose, onClickItem, onDismiss }) {
  // Agrupar por urgencia
  const grupos = ['vencido', 'hoy', '24h', 'semana']
    .map(u => ({ urgencia: u, items: items.filter(i => i.urgencia === u) }))
    .filter(g => g.items.length > 0);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    const onClick = (e) => {
      if (!e.target.closest('.bell-dropdown') && !e.target.closest('.bell-btn')) onClose();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('mousedown', onClick);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('mousedown', onClick);
    };
  }, [onClose]);

  return (
    <div className="bell-dropdown">
      <div className="bell-dropdown-header">
        <strong>Notificaciones</strong>
        <span style={{fontSize:'0.72rem', color:'var(--texto-suave)'}}>
          {items.length} {items.length === 1 ? 'evento' : 'eventos'}
        </span>
      </div>
      {grupos.length === 0 && (
        <div className="bell-empty">Sin eventos pendientes 🎉</div>
      )}
      {grupos.map(g => {
        const meta = URGENCIA_META[g.urgencia];
        return (
          <div key={g.urgencia} className="bell-group">
            <div className="bell-group-header" style={{color: meta.color, background: meta.bg}}>
              {meta.emoji} {meta.label} <span className="bell-group-count">{g.items.length}</span>
            </div>
            {g.items.map(it => {
              const dt = it.fecha;
              const hh = String(dt.getHours()).padStart(2,'0');
              const mm = String(dt.getMinutes()).padStart(2,'0');
              const hoy = isToday(dt);
              const fechaStr = hoy
                ? `${hh}:${mm}`
                : `${dateToDDMMYY(dt)} ${hh}:${mm}`;
              const catLabel = it.tipo === 'agendado' ? 'Calendario' : 'Tarea';
              return (
                <div key={it.key} className="bell-item" onClick={() => onClickItem(it)}>
                  <div className="bell-item-body">
                    <div className="bell-item-titulo">
                      <span className="bell-item-cat">{catLabel} —</span> {it.titulo}
                    </div>
                    {it.detalle && <div className="bell-item-detalle">{it.detalle}</div>}
                  </div>
                  <div className="bell-item-fecha">{fechaStr}</div>
                  {onDismiss && (
                    <button
                      type="button"
                      className="bell-item-dismiss"
                      title="Marcar como vista (reaparece mañana si sigue pendiente)"
                      aria-label="Marcar notificación como vista"
                      onClick={(e) => { e.stopPropagation(); onDismiss(it.key); }}
                    >
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                        <path d="M10 11v6M14 11v6"></path>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                      </svg>
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App({ user, agente, setAgente, viewAs, onViewAs, onExitViewAs, onLogout }) {
  const readOnly = !!viewAs;
  // Modo asistente: el user logueado es asistente de otro agente. Carga datos
  // del principal y banner sutil arriba que indica de quién está siendo
  // asistente. La marca visual (★) en cards/listas se basa en actor_id.
  const isAssistant = !!agente?.assistant_of_id;
  const [principalProfile, setPrincipalProfile] = useState(null);
  // Trigger para refrescar principalProfile durante la sesión. Si el principal
  // cambia `shares_calendar_with_assistant` o desactiva `gcal_enabled` mientras
  // el asistente está logueado, el asistente seguía intentando hablar con
  // Google hasta el siguiente refresh manual. Ahora se refresca al cambiar
  // de tab (junto con loadState).
  const [principalReloadKey, setPrincipalReloadKey] = useState(0);
  useEffect(() => {
    if (!isAssistant) { setPrincipalProfile(null); return; }
    let cancelled = false;
    sb.from('profiles')
      .select('id, email, display_name, gcal_enabled, shares_calendar_with_assistant')
      .eq('id', agente.assistant_of_id).maybeSingle()
      .then(({ data }) => { if (!cancelled) setPrincipalProfile(data || null); });
    return () => { cancelled = true; };
  }, [isAssistant, agente?.assistant_of_id, principalReloadKey]);

  // Cache de actor_id → { display_name, email } para mostrar nombres en el
  // tooltip de la estrella. Carga lazy: solo fetch los profiles que aparecen
  // como actor_id en el state actual y no están ya en el map. Evita traer
  // todos los profiles (que para admin pueden ser muchos) cuando solo
  // necesitamos los que efectivamente actuaron sobre las entidades visibles.
  const [actorMap, setActorMap] = useState({});
  // Set de actorIds que vienen de eventos Google (extendedProperties).
  // CalendarioView lo popula tras cada fetch; useEffect del actorMap los
  // incluye así ActorStar resuelve el nombre real para eventos externos.
  const [gcalActorIds, setGcalActorIds] = useState(() => new Set());
  const handleGcalActorIdsLoaded = useCallback((ids) => {
    setGcalActorIds(prev => {
      let changed = false;
      const next = new Set(prev);
      for (const id of ids) if (!next.has(id)) { next.add(id); changed = true; }
      return changed ? next : prev;
    });
  }, []);
  // `isPilot` = true cuando el calendar usa Google como fuente de verdad.
  // Originalmente era flag exclusivo de nortiz@ifs-broker.com durante el
  // piloto de Fase 1; hoy es simplemente "user con gcal_enabled=true". El
  // nombre quedó por compatibilidad con todos los call sites que ya lo usan.
  //
  // Casos:
  //   - viewAs admin: false (admin viendo a otro no toca Google).
  //   - Asistente: true si su principal compartió calendar Y lo tiene activo.
  //   - Agente normal: true si tiene gcal_enabled en su profile.
  const isPilot = !viewAs && (
    isAssistant
      ? !!(principalProfile?.shares_calendar_with_assistant && principalProfile?.gcal_enabled)
      : isGoogleCalendarUser(agente)
  );
  // Bumpea para forzar re-fetch de eventos de Google tras crear/editar/borrar.
  const [gcalReloadKey, setGcalReloadKey] = useState(0);
  const bumpGcal = () => setGcalReloadKey(k => k + 1);

  // Toggle de vinculación con Google Calendar para users del dominio Workspace
  // (Ajustes). DWD ya autoriza, solo persistimos profiles.gcal_enabled.
  const handleToggleGcal = async (enabled) => {
    if (!agente?.id) return;
    const { error } = await sb.from('profiles').update({ gcal_enabled: enabled }).eq('id', agente.id);
    if (error) throw error;
    setAgente(a => a ? { ...a, gcal_enabled: enabled } : a);
    bumpGcal();
    showToast(enabled ? 'Google Calendar vinculado' : 'Google Calendar desvinculado');
  };

  // Para users con gmail externo: iniciar OAuth user-level. La edge function
  // gcal-oauth-init genera la URL de consentimiento; el browser redirige a
  // Google. Después del consent, Google llama a gcal-oauth-callback que guarda
  // el refresh_token y nos manda de vuelta con ?gcal_linked=1.
  const handleLinkOAuth = async () => {
    const returnTo = window.location.origin + window.location.pathname;
    const { data, error } = await sb.functions.invoke('gcal-oauth-init', {
      body: { returnTo }
    });
    if (error || !data?.url) throw new Error(error?.message || 'No se pudo iniciar OAuth');
    window.location.href = data.url;
  };
  const handleUnlinkOAuth = async () => {
    if (!agente?.id) return;
    // Pasamos por la edge function (service_role) porque user_google_tokens
    // tiene RLS sin policies y un delete directo desde el cliente fallaba
    // silencioso, dejando el refresh_token zombi.
    await gcalApi.unlink();
    setAgente(a => a ? { ...a, gcal_enabled: false } : a);
    bumpGcal();
    showToast('Google Calendar desvinculado');
  };

  // El principal puede dar/retirar consentimiento para que su asistente vea
  // su Google Calendar personal (no solo lo agendado en Abordaje). Se persiste
  // en profiles.shares_calendar_with_assistant; el backend (gcal-events) lo
  // chequea cuando un asistente hace requests sobre el calendario del principal.
  const handleToggleShareCalWithAssistant = async (enabled) => {
    if (!agente?.id) return;
    const { error } = await sb.from('profiles')
      .update({ shares_calendar_with_assistant: enabled })
      .eq('id', agente.id);
    if (error) throw error;
    setAgente(a => a ? { ...a, shares_calendar_with_assistant: enabled } : a);
    showToast(enabled
      ? 'Tu asistente ahora puede ver tu Google Calendar'
      : 'Tu asistente ya no ve tu Google Calendar');
  };

  // Detecta el retorno del flujo OAuth (querystring) y refresca el agente.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    let cancelled = false;
    if (params.get('gcal_linked') === '1') {
      showToast('Google Calendar vinculado!');
      if (user?.id) {
        sb.from('profiles').select('id,email,display_name,role,advisor_name_ole,abordaje_settings,gcal_enabled,assistant_of_id,shares_calendar_with_assistant').eq('id', user.id).maybeSingle()
          .then(({ data }) => { if (cancelled) return; if (data) setAgente(data); bumpGcal(); });
      }
      const url = new URL(window.location.href);
      url.searchParams.delete('gcal_linked');
      window.history.replaceState({}, '', url.toString());
    } else if (params.get('gcal_error')) {
      const errCode = params.get('gcal_error');
      showToast('No se pudo vincular Google Calendar: ' + errCode, { duration: 5000 });
      const url = new URL(window.location.href);
      url.searchParams.delete('gcal_error');
      window.history.replaceState({}, '', url.toString());
    }
    return () => { cancelled = true; };
  }, [user?.id]);
