<!DOCTYPE html>
<html class="staticrypt-html" lang="es">
<head>
<meta charset="utf-8" />
<title>Planificador de Abordaje IFS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="pragma" content="no-cache" />
<style>
  html, body { height: 100%; margin: 0; padding: 0; }
  body.staticrypt-body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1e1b4b;
    color: white;
  }
  .staticrypt-spinner-container {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1e1b4b;
  }
  .staticrypt-spinner {
    display: inline-block; width: 2rem; height: 2rem;
    border: 0.25em solid rgba(255,255,255,0.25);
    border-right-color: transparent; border-radius: 50%;
    animation: spinner-border 0.75s linear infinite;
  }
  @keyframes spinner-border { 100% { transform: rotate(360deg); } }
  .staticrypt-content {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; position: relative;
    background: #1e1b4b;
  }
  .hidden { display: none !important; }
  .ifs-logo {
    width: min(380px, 90vw); height: auto; display: block; margin-bottom: 10px;
    filter: brightness(1.1) drop-shadow(0 4px 24px rgba(0,152,218,0.25));
  }
  .ifs-rule {
    width: 56px; height: 3px; background: #5CC6D0; border-radius: 2px;
    margin: 18px 0 26px;
  }
  .ifs-tagline {
    color: rgba(255,255,255,0.35); font-size: 11px;
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px;
  }
  #staticrypt-form { width: 100%; max-width: 320px; }
  .ifs-pwd-wrap { position: relative; margin-bottom: 12px; }
  #staticrypt-password {
    width: 100%; padding: 13px 18px; border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.07); color: white;
    font-size: 15px; outline: none; letter-spacing: 2px;
    box-sizing: border-box; transition: border-color 0.2s;
  }
  #staticrypt-password:focus { border-color: rgba(0,152,218,0.6); }
  .staticrypt-toggle-password-visibility { display: none; }
  .staticrypt-decrypt-button {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #0098DA, #3E4095);
    color: white; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(0,152,218,0.3);
    transition: transform 0.1s, filter 0.15s;
  }
  .staticrypt-decrypt-button:hover { filter: brightness(1.08); }
  .staticrypt-decrypt-button:active { transform: translateY(1px); }
  #staticrypt-decrypt-error {
    color: #ef4444; font-size: 12px; text-align: center;
    margin: 10px 0; min-height: 16px;
  }
  .staticrypt-remember {
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5); font-size: 12px;
    margin: 14px 0; cursor: pointer;
  }
  .staticrypt-remember.hidden { display: none; }
  #staticrypt-remember { margin-right: 8px; transform: scale(1.1); accent-color: #0098DA; }
  .ifs-footer {
    position: absolute; bottom: 24px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 28px;
  }
  .ifs-footer-l { color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 1px; }
  .ifs-footer-r {
    color: rgba(255,255,255,0.18); font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
  }
  .ifs-shake { animation: shake 0.3s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(7px); }
    75% { transform: translateX(-7px); }
  }
</style>
</head>

  <div class="ifs-rule"></div>
  <div class="ifs-tagline">Acceso Privado</div>

  <form id="staticrypt-form" action="#" method="post" autocomplete="off">
    <div class="ifs-pwd-wrap">
      <input
        id="staticrypt-password"
        type="password"
        name="password"
        placeholder="Contraseña"
        autofocus
        autocomplete="off"
      />
      <img class="staticrypt-toggle-password-visibility" alt="" />
    </div>

    <div id="staticrypt-decrypt-error"></div>

    <input type="submit" class="staticrypt-decrypt-button" value="Ingresar" />

    <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
      <input id="staticrypt-remember" type="checkbox" name="remember" />
      Recordarme en este dispositivo
    </label>
  </form>

  <div class="ifs-footer">
    <div class="ifs-footer-l">www.broker-ifs.com</div>
    <div class="ifs-footer-r">Planificador de Abordaje</div>
  </div>
</div>

<script>
  const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
  const templateError = "/*[|template_error|]*/0",
        templateToggleAltShow = "",
        templateToggleAltHide = "",
        isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
        staticryptConfig = /*[|staticrypt_config|]*/ 0;

  const templateConfig = {
    rememberExpirationKey: "staticrypt_expiration",
    rememberPassphraseKey: "staticrypt_passphrase",
    replaceHtmlCallback: null,
    clearLocalStorageCallback: null,
  };

  const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

  window.onload = async function () {
    const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
    if (!isSuccessful) {
      document.getElementById("staticrypt_loading").classList.add("hidden");
      document.getElementById("staticrypt_content").classList.remove("hidden");
      document.getElementById("staticrypt-password").focus();
      if (isRememberEnabled) {
        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
      }
    }
  };

  document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const password = document.getElementById("staticrypt-password").value,
          isRememberChecked = document.getElementById("staticrypt-remember").checked;
    const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
    if (!isSuccessful) {
      const errEl = document.getElementById("staticrypt-decrypt-error");
      const formEl = document.getElementById("staticrypt-form");
      errEl.textContent = "Contraseña incorrecta";
      formEl.classList.remove("ifs-shake");
      void formEl.offsetWidth;
      formEl.classList.add("ifs-shake");
      setTimeout(() => { errEl.textContent = ""; }, 3000);
    }
  });
</script>
